function DashCard({icon,label,value,sub,action,actionLabel,onClick,accent}){
  const bg=accent==="gold"?"linear-gradient(135deg,#fdf8ef,#fdf5e8)":accent==="sage"?"linear-gradient(135deg,#eef4e8,#f4f7f1)":"linear-gradient(135deg,#f0edf8,#eef2ea)";
  const border=accent==="gold"?"var(--gold-lt)":accent==="sage"?"var(--sage-bg)":"#ddd8ce";
  return(
    <div style={{flex:"1 1 0",minWidth:0,background:bg,border:`1.5px solid ${border}`,borderRadius:14,padding:"13px 10px 11px",display:"flex",flexDirection:"column",alignItems:"center",gap:5,cursor:onClick?"pointer":"default"}} onClick={onClick}>
      <div style={{width:46,height:46,borderRadius:"50%",background:"var(--white)",boxShadow:"0 2px 8px rgba(44,44,44,.09)",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:2}}>{icon}</div>
      <div style={{fontFamily:"'Lato',sans-serif",fontSize:".58rem",textTransform:"uppercase",letterSpacing:".1em",color:"var(--muted)",textAlign:"center",lineHeight:1.3}}>{label}</div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.35rem",color:"var(--navy)",lineHeight:1,fontWeight:600}}>{value||<span style={{color:"var(--muted)",fontSize:".9rem"}}>—</span>}</div>
      {sub&&<div style={{fontFamily:"'Lato',sans-serif",fontSize:".6rem",color:"var(--muted)",textAlign:"center",lineHeight:1.3,marginTop:-2}}>{sub}</div>}
      {action&&<button style={{marginTop:3,background:"var(--white)",border:`1.5px solid ${border}`,borderRadius:20,padding:"4px 11px",fontFamily:"'Lato',sans-serif",fontSize:".63rem",fontWeight:700,color:"var(--navy)",cursor:"pointer",letterSpacing:".05em"}}>{actionLabel}</button>}
    </div>
  );
}

function getWeekKeySimple(){const d=new Date();const day=d.getDay();const diff=d.getDate()-(day===0?-6:day-1);const mon=new Date(new Date(d).setDate(diff));return mon.toISOString().slice(0,10);}

// ─────────────────────────────────────────────────────────────────────────────
// HOME DAY SCHEDULE — full expandable schedule shown on home screen
// ─────────────────────────────────────────────────────────────────────────────
function HomeDaySchedule({td,todayBlocks,schedule,onNav}){
  // Local check state — mirrors the schedule but kept separately so home screen
  // checks stay in sync with the Trello board's block.checks
  const [expanded,setExpanded]=useState({}); // blockId -> bool
  const totalItems=todayBlocks.reduce((s,b)=>s+b.items.length,0);
  const doneItems=todayBlocks.reduce((s,b)=>s+b.items.filter((_,i)=>b.checks[i]).length,0);
  const allDone=totalItems>0&&doneItems===totalItems;
  const pct=totalItems>0?Math.round((doneItems/totalItems)*100):0;

  if(todayBlocks.length===0){
    return(
      <div className="card" style={{marginBottom:".9rem"}}>
        <div className="card-hdr"><div className="card-icon ci-sage"><IcoCardSchedule/></div><div><div className="card-ttl">Today \u2014 {td}</div><div className="card-sub">No blocks yet</div></div></div>
        <div className="card-body"><div className="empty" style={{padding:".5rem 0"}}><div className="empty-icon" style={{color:"var(--sage)"}}><IcoCardSprout/></div><p>Open the Schedule board to set up your day.</p></div></div>
        <div className="card-foot"><button className="btn btn-sage" onClick={()=>onNav("schedule")}>Open Schedule Board</button></div>
      </div>
    );
  }

  return(
    <div className="card" style={{marginBottom:".9rem"}}>
      {/* Header */}
      <div className="card-hdr" style={{flexWrap:"wrap",gap:6}}>
        <div className="card-icon ci-sage"><IcoCardSchedule/></div>
        <div style={{flex:1}}>
          <div className="card-ttl">Today \u2014 {td}</div>
          <div className="card-sub">{doneItems} of {totalItems} items complete</div>
        </div>
        {allDone&&<span style={{fontFamily:"'Lato',sans-serif",fontSize:".62rem",background:"var(--sage)",color:"#fff",padding:"3px 9px",borderRadius:20,fontWeight:700}}>\u2713 All done!</span>}
      </div>

      {/* Progress bar */}
      <div style={{height:5,background:"var(--sage-bg)",margin:"0",overflow:"hidden"}}>
        <div style={{height:"100%",background:allDone?"var(--gold)":"var(--sage)",width:`${pct}%`,transition:"width .4s ease"}}/>
      </div>

      {/* All blocks */}
      <div style={{padding:".6rem .9rem .8rem"}}>
        {todayBlocks.map((block,bi)=>{
          const col=BLOCK_TYPES[block.type]||BLOCK_TYPES.life;
          const blockDone=block.items.filter((_,i)=>block.checks[i]).length;
          const isExp=expanded[block.id]!==false; // default expanded
          return(
            <div key={block.id} style={{marginBottom:bi<todayBlocks.length-1?8:0}}>
              {/* Block header row */}
              <div
                onClick={()=>setExpanded(p=>({...p,[block.id]:!isExp}))}
                style={{display:"flex",alignItems:"center",gap:7,padding:"6px 9px",borderRadius:8,background:col.bg,border:`1.5px solid ${col.border}`,cursor:"pointer",userSelect:"none"}}
              >
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontFamily:"'Lato',sans-serif",fontSize:".62rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:col.text}}>{col.label}</span>
                    {block.time&&<span style={{fontFamily:"'Lato',sans-serif",fontSize:".58rem",color:col.text,opacity:.65}}>{block.time}</span>}
                  </div>
                </div>
                <span style={{fontFamily:"'Lato',sans-serif",fontSize:".62rem",color:blockDone===block.items.length&&block.items.length>0?col.border:col.text,opacity:.75,flexShrink:0}}>{blockDone}/{block.items.length}</span>
                <span style={{fontSize:".7rem",color:col.text,opacity:.6,flexShrink:0,lineHeight:1}}>{isExp?"\u25be":"\u25b8"}</span>
              </div>
              {/* Items list */}
              {isExp&&(
                <div style={{paddingLeft:10,paddingTop:3}}>
                  {block.items.map((item,ii)=>{
                    const checked=!!block.checks[ii];
                    return(
                      <div key={ii} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"5px 4px",borderBottom:ii<block.items.length-1?"1px solid var(--sage-bg)":"none",opacity:checked?.55:1}}>
                        <div style={{width:17,height:17,borderRadius:4,flexShrink:0,marginTop:2,border:`1.5px solid ${checked?col.border:"#ddd8ce"}`,background:checked?col.border:"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"default"}}>
                          {checked&&<span style={{color:"#fff",fontSize:9,lineHeight:1}}>\u2713</span>}
                        </div>
                        <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".9rem",color:"var(--navy)",lineHeight:1.4,textDecoration:checked?"line-through":"none",flex:1}}>{item}</span>
                      </div>
                    );
                  })}

              )}
            </div>
          );
        })}
      </div>

      <div className="card-foot">
        <button className="btn btn-sage btn-sm" onClick={()=>onNav("schedule")}>Open Full Board</button>
        <button className="btn btn-ghost btn-sm" onClick={()=>onNav("schedule")}>Edit / Check Off</button>
      </div>
    </div>
  );
}

function Home({children,narrations,schedule,beautyLoop,daySchedules,onNav,mode,rsItems,setRsItems,rsChecked,setRsChecked,outdoorHours,setOutdoorHours,habit,habitLog}){

  const habitStreak=(()=>{if(!habit)return 0;let s=0;const d=new Date();while(true){const k=d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});if(habitLog?.[k]?.done){s++;d.setDate(d.getDate()-1);}else break;}return s;})();

  const {done:schedDone,total:schedTotal}=dayProgress(todayBlocks);

  if(mode==="student"){
    const [subjectChecked,setSubjectChecked]=useState({});
    const doneCount=Object.values(subjectChecked).filter(Boolean).length;
    const hr=new Date().getHours();
    const child=children[0];
    return(
      <div>
        <div style={{textAlign:"center",padding:".5rem 0 .75rem"}}>
          <div style={{fontSize:"2rem",marginBottom:".25rem"}}>{hr<12?"◎":"◉"}</div>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:"clamp(1.3rem,5vw,1.8rem)",color:"var(--navy)"}}>{(hr<12?"Good morning":"Good afternoon")+", "+(child?.name||"friend")}</h1>
          <p style={{color:"var(--muted)",fontStyle:"italic",fontSize:".88rem",marginTop:2}}>{td}</p>
        </div>
        <DashRow/>

// ─────────────────────────────────────────────────────────────────────────────
// NARRATION COACH (simplified — core functionality)
// ─────────────────────────────────────────────────────────────────────────────
function NarrationCoach({children,narrations,setNarrations,mode}){
  const [tab,setTab]=useState("coach");
  const [step,setStep]=useState("setup");
  const [childId,setChildId]=useState(children[0]?.id||null);
  const [customBook,setCustomBook]=useState("");
  const [readType,setReadType]=useState("Independent");
  const [level,setLevel]=useState("find");
  const [narText,setNarText]=useState("");
  const [exchanges,setExchanges]=useState([]);
  const [loading,setLoading]=useState(false);
  const [allNarText,setAllNarText]=useState("");
  const LEVEL_ORDER=["find","follow","frame"];
  const nextLevel=l=>LEVEL_ORDER[LEVEL_ORDER.indexOf(l)+1]||null;
  const child=children.find(c=>c.id===childId)||children[0];
  const childForm=child?.form||"";
  const randPrompt=OPEN_PROMPTS[Math.floor(Math.random()*OPEN_PROMPTS.length)];
  const levelLabels={find:"Find It",follow:"Follow It",frame:"Frame It"};

  const FORM_SYSTEM={
    "Form I (Grades 1–3)":{follow:"You are coaching a young child (grades 1–3, Charlotte Mason Form I). Ask ONE gentle follow-up question — simple, warm, concrete.",frame:"Now ask this young child ONE connecting question — can they connect to their own life?"},
    "Form II (Grades 4–6)":{follow:"You are coaching a Form II student. Ask ONE follow-up about pattern, cause-and-effect, or character motivation. Be warm and Socratic.",frame:"Ask ONE framing question — help this student connect to a big idea or another book."},
    "Form III (Grades 7–9)":{follow:"You are coaching a Form III student. Ask ONE pointed follow-up pressing on an assumption or ambiguity. Be intellectually respectful.",frame:"Ask ONE synthesis question — push to articulate theme or tension."},
    "Form IV–VI (Grades 10–12)":{follow:"You are coaching a senior Form student. Ask ONE rigorous follow-up probing the text's logic or moral claims.",frame:"Ask ONE essay-level framing question demanding synthesis or original judgment."},
  };
  function getFormSys(lvl){const f=FORM_SYSTEM[childForm];if(!f)return lvl==="follow"?FORM_SYSTEM["Form II (Grades 4–6)"].follow:FORM_SYSTEM["Form II (Grades 4–6)"].frame;return lvl==="follow"?f.follow:f.frame;}
  function start(){if(!customBook)return;setStep("session");setExchanges([]);setLevel("find");setNarText("");setAllNarText("");}
  async function submit(){
    if(!narText.trim())return;
    setLoading(true);
    const systemPrompt=getFormSys(level==="follow"?"follow":"frame");
    const context=exchanges.map(e=>`Student: ${e.narration}\nCoach: ${e.coachReply}`).join("\n\n");
    const userMsg=`Book/subject: ${customBook}\n\nNarration so far:\n${allNarText}\n\n${context?`Previous exchange:\n${context}\n\n`:""}Student's new response:\n${narText}`;
    try{
      const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,system:systemPrompt,messages:[{role:"user",content:userMsg}]})});
      const data=await resp.json();
      const reply=data.content[0].text;
      setExchanges(p=>[...p,{level,narration:narText,coachReply:reply}]);
      setAllNarText(p=>p+(p?" | ":"")+narText);
      setNarText("");
      const nl=nextLevel(level);if(nl)setLevel(nl);
    }catch{
      const pool=MOCK_RESPONSES[level];
      const reply=pool[Math.floor(Math.random()*pool.length)];
      setExchanges(p=>[...p,{level,narration:narText,coachReply:reply}]);
      setAllNarText(p=>p+(p?" | ":"")+narText);
      setNarText("");
      const nl=nextLevel(level);if(nl)setLevel(nl);
    }
    setLoading(false);
  }
  function finish(){setNarrations(p=>[...p,{id:uid(),studentName:child?.name||"Student",childId,book:customBook,readType,narrationText:allNarText,exchanges,date:todayStr()}]);setStep("done");}
  function reset(){setStep("setup");setNarText("");setExchanges([]);setLevel("find");setAllNarText("");setCustomBook("");}

  return(
    <div>
      <div style={{marginBottom:"1rem"}}><h2 style={{color:"var(--navy)"}}>Narration Coach</h2><p style={{color:"var(--muted)",fontStyle:"italic",fontSize:".91rem"}}>Find It · Follow It · Frame It</p></div>
      <div className="tabs">
        <button className={`tab ${tab==="coach"?"active":""}`} onClick={()=>setTab("coach")}>Live Session</button>
        <button className={`tab ${tab==="history"?"active":""}`} onClick={()=>setTab("history")}>History</button>
      </div>
      {tab==="coach"&&(<>
        {step==="setup"&&(
          <div className="card">
            <div className="card-hdr"><div className="card-icon ci-gold"><IcoCardNarrate/></div><div><div className="card-ttl">New Session</div></div></div>
            <div className="card-body">
              {children.length>0&&<div className="field"><label>Student</label><div className="pills">{children.map(c=><span key={c.id} className={`pill ${childId===c.id?"on":""}`} onClick={()=>setChildId(c.id)}>{c.name}</span>)}</div></div>}
              {childForm&&<div style={{background:"var(--sage-bg)",borderRadius:8,padding:"7px 10px",marginBottom:10,fontFamily:"'Lato',sans-serif",fontSize:".68rem",color:"var(--sage)"}}>✦ Questions tailored for <strong>{childForm}</strong></div>}
              <div className="field"><label>Reading Type</label><div className="pills">{READ_TYPES.map(t=><span key={t} className={`pill ${readType===t?"gold-on":""}`} onClick={()=>setReadType(t)}>{t}</span>)}</div></div>
              <div className="field"><label>Book / Subject</label><input placeholder="Book title or subject" value={customBook} onChange={e=>setCustomBook(e.target.value)}/></div>
            </div>
            <div className="card-foot"><button className="btn btn-gold" onClick={start} disabled={!customBook}>Begin Session</button></div>
          </div>
        )}
        {step==="session"&&(
          <div className="card">
            <div className="card-hdr"><div className="card-icon ci-gold"><IcoCardNarrate/></div><div style={{flex:1}}><div className="card-ttl">{customBook}</div><div className="card-sub">{child?.name} · {readType}</div></div>
              <div style={{display:"flex",gap:3}}>{["find","follow","frame"].map(l=>(<div key={l} style={{width:9,height:9,borderRadius:"50%",background:exchanges.find(e=>e.level===l)?"var(--sage)":level===l?"var(--gold)":"#ddd8ce"}}/>))}</div>
            </div>
            <div className="card-body">
              {exchanges.length===0&&<div style={{background:"var(--sage-bg)",borderRadius:8,padding:"9px 11px",marginBottom:".75rem",fontSize:".9rem",color:"var(--navy)"}}>{randPrompt}</div>}
              {exchanges.map((e,i)=>(
                <div key={i}>
                  <div style={{background:"var(--cream)",border:"1px solid var(--sage-bg)",borderRadius:"8px 8px 0 0",padding:"8px 11px",marginBottom:2}}>
                    <div style={{fontFamily:"'Lato',sans-serif",fontSize:".6rem",textTransform:"uppercase",color:"var(--muted)",marginBottom:2}}>{levelLabels[e.level]||""}</div>
                    <div style={{fontSize:".9rem",lineHeight:1.5}}>{e.narration}</div>
                  </div>
                  <div className="coach-box" style={{borderRadius:"0 0 8px 8px",marginBottom:".7rem"}}><strong>✦ Coach</strong>{e.coachReply}</div>
                </div>
              ))}
              {exchanges.length<3&&<>
                <div style={{fontFamily:"'Lato',sans-serif",fontSize:".62rem",textTransform:"uppercase",letterSpacing:".09em",color:"var(--muted)",marginBottom:6}}>{levelLabels[level]}</div>
                <div className="field" style={{marginBottom:0}}><textarea placeholder={level==="find"?"Tell me what you read…":level==="follow"?"What thread do you notice…":"What does this connect to…"} value={narText} onChange={e=>setNarText(e.target.value)} style={{minHeight:80}}/></div>
              </>}
              {exchanges.length>=3&&<div style={{background:"var(--sage-bg)",borderRadius:8,padding:"9px 11px",textAlign:"center",fontStyle:"italic",color:"var(--sage)",fontSize:".88rem"}}>You've moved through all three levels. Beautiful work.</div>}
            </div>
            <div className="card-foot">
              {exchanges.length<3&&<button className="btn btn-gold" onClick={submit} disabled={!narText.trim()||loading}>{loading?<><span className="spin"/> Coaching…</>:level==="find"?"Submit & Follow It":level==="follow"?"Submit & Frame It":"Submit"}</button>}
              {exchanges.length>=3&&<button className="btn btn-sage" onClick={finish}>Save Session</button>}
              <button className="btn btn-ghost btn-sm" onClick={reset}>Cancel</button>
            </div>
          </div>
        )}
        {step==="done"&&<div className="card"><div className="card-body" style={{textAlign:"center",padding:"1.75rem 1rem"}}><div style={{fontSize:"1.5rem",color:"var(--sage)"}}>✦</div><h2 style={{color:"var(--navy)"}}>Well done.</h2><p style={{color:"var(--muted)",fontStyle:"italic"}}>Session saved.</p></div><div className="card-foot" style={{justifyContent:"center"}}><button className="btn btn-gold" onClick={reset}>New Session</button></div></div>}
      </>)}
      {tab==="history"&&(<div>{narrations.length>0?narrations.slice().reverse().map((n,i)=>(<div key={i} className="he" style={{background:"var(--white)",borderRadius:9,padding:"10px 12px",marginBottom:7,border:"1.5px solid var(--sage-bg)"}}><div className="he-row"><span className="he-ttl">{n.book}</span><span className="he-date">{n.date}</span></div><div className="he-meta">{n.studentName}</div><div className="he-pre">{n.narrationText?.slice(0,90)}…</div></div>)):<div className="empty"><div className="empty-icon" style={{color:"var(--gold)"}}><IcoCardNarrate/></div><p>No sessions yet.</p></div>}</div>)}
    </div>
  );
}

  );
}

function HabitTracker({habit,setHabit,log,setLog}){
  const [picking,setPicking]=useState(false);
  const [tab,setTab]=useState("today");
  const [expanded,setExpanded]=useState(null);
  const td=todayStr();
  const todayLog=log[td]||{done:false};
  const streak=(()=>{let s=0;const d=new Date();while(true){const k=d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});if(log[k]?.done){s++;d.setDate(d.getDate()-1);}else break;}return s;})();
  const last30=(()=>{const days=[];const d=new Date();for(let i=0;i<30;i++){const k=d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});days.unshift({date:k,done:!!log[k]?.done,isToday:i===0});d.setDate(d.getDate()-1);}return days;})();
  function selectHabit(h){setHabit({...h,startDate:todayStr()});setLog({});setPicking(false);}
  const CAT_COLOR={Mind:"var(--navy-lt)",Will:"var(--sage)",Moral:"var(--gold)",Work:"#8a7060",Social:"var(--lilac)"};
  const CAT_BG={Mind:"rgba(93,116,143,.1)",Will:"var(--sage-bg)",Moral:"var(--gold-bg)",Work:"#f4ede6",Social:"#f0edf8"};
  return(
    <div>
      <div style={{marginBottom:"1rem"}}><h2 style={{color:"var(--navy)"}}>Habit Tracker</h2><p style={{color:"var(--muted)",fontStyle:"italic",fontSize:".91rem"}}>One habit at a time — Charlotte Mason's way</p></div>
      <div style={{background:"var(--navy)",borderRadius:10,padding:"13px 15px",marginBottom:".9rem"}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem",color:"var(--cream)",fontStyle:"italic",lineHeight:1.55,marginBottom:5}}>"Habit is ten natures."</div>
        <div style={{fontFamily:"'Lato',sans-serif",fontSize:".65rem",color:"var(--gold-lt)",textTransform:"uppercase",letterSpacing:".08em"}}>— Charlotte Mason</div>
      </div>
      {(!habit||picking)&&(
        <div>
          {picking&&habit&&<div style={{marginBottom:".75rem"}}><button className="btn btn-ghost btn-sm" onClick={()=>setPicking(false)}>← Back</button></div>}
          <div style={{fontFamily:"'Lato',sans-serif",fontSize:".65rem",textTransform:"uppercase",letterSpacing:".09em",color:"var(--muted)",marginBottom:10}}>Charlotte Mason's Five Foundational Habits</div>
          {CM_HABITS.map((h,i)=>{
            const isOpen=expanded===i;
            return(
              <div key={i} style={{background:"var(--white)",borderRadius:12,marginBottom:".65rem",boxShadow:"var(--sh)",overflow:"hidden",border:`1.5px solid ${isOpen?CAT_COLOR[h.category]:"transparent"}`}}>
                <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer"}} onClick={()=>setExpanded(isOpen?null:i)}>
                  <div style={{width:36,height:36,borderRadius:8,background:CAT_BG[h.category],display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><div style={{width:12,height:12,borderRadius:"50%",background:CAT_COLOR[h.category]}}/></div>
                  <div style={{flex:1}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:".95rem",color:"var(--navy)",marginBottom:2}}>{h.name}</div><div style={{fontFamily:"'Lato',sans-serif",fontSize:".6rem",textTransform:"uppercase",letterSpacing:".08em",color:CAT_COLOR[h.category]}}>{h.category}</div></div>
                  <div style={{fontFamily:"'Lato',sans-serif",fontSize:".65rem",color:"var(--muted)",transform:isOpen?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</div>
                </div>
                {isOpen&&(
                  <div style={{borderTop:`1px solid ${CAT_BG[h.category]}`,padding:"14px"}}>
                    <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".97rem",lineHeight:1.7,color:"var(--ink)",fontStyle:"italic",marginBottom:12}}>{h.why}</p>
                    <div style={{background:CAT_BG[h.category],borderRadius:8,padding:"10px 12px",marginBottom:10}}>
                      <div style={{fontFamily:"'Lato',sans-serif",fontSize:".58rem",textTransform:"uppercase",letterSpacing:".1em",color:CAT_COLOR[h.category],marginBottom:5}}>How to Introduce</div>
                      <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".92rem",lineHeight:1.65,color:"var(--navy)",margin:0}}>{h.introduce}</p>
                    </div>
                    <div style={{borderRadius:8,padding:"9px 12px",background:"var(--navy)",marginBottom:12}}>
                      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".9rem",color:"var(--cream)",fontStyle:"italic",lineHeight:1.6}}>"{h.mason_quote}"</div>
                      <div style={{fontFamily:"'Lato',sans-serif",fontSize:".58rem",color:"var(--gold-lt)",textTransform:"uppercase",letterSpacing:".08em",marginTop:5}}>— Charlotte Mason</div>
                    </div>
                    <button className="btn btn-sage" style={{width:"100%"}} onClick={()=>selectHabit(h)}>Begin Tracking This Habit</button>
                  </div>
                )}

            );

      )}

        <>
          <div className="tabs">

            <button className={`tab ${tab==="guide"?"active":""}`} onClick={()=>setTab("guide")}>How to Teach</button>
            <button className={`tab ${tab==="calendar"?"active":""}`} onClick={()=>setTab("calendar")}>30 Days</button>
          </div>
          {tab==="today"&&(
            <div className="card">
              <div className="card-hdr"><div className="card-icon ci-sage"><IcoCardHabit/></div><div style={{flex:1}}><div className="card-ttl">{habit.name}</div><div className="card-sub">{habit.category} · started {habit.startDate}</div></div><button className="btn btn-ghost btn-xs" onClick={()=>setPicking(true)}>Change</button></div>

                <div className="habit-ring-wrap">
                  <div className="habit-streak">{streak}</div>
                  <div className="habit-streak-lbl">day streak</div>

                  <div style={{fontFamily:"'Lato',sans-serif",fontSize:".72rem",color:"var(--muted)"}}>{todayLog.done?"Marked complete today ✦":"Tap to mark today done"}</div>
                </div>
                {habit.why&&<div style={{marginTop:12,background:"var(--cream)",borderRadius:8,padding:"10px 12px",fontFamily:"'Cormorant Garamond',serif",fontSize:".92rem",color:"var(--navy)",fontStyle:"italic",lineHeight:1.65}}>{habit.why}</div>}
              </div>
            </div>
          )}
          {tab==="guide"&&(
            <div style={{background:"var(--white)",borderRadius:12,boxShadow:"var(--sh)",overflow:"hidden",marginBottom:".75rem"}}>
              <div style={{background:CAT_BG[habit.category]||"var(--sage-bg)",padding:"14px"}}>
                <div style={{fontFamily:"'Lato',sans-serif",fontSize:".6rem",textTransform:"uppercase",letterSpacing:".1em",color:CAT_COLOR[habit.category]||"var(--sage)",marginBottom:6}}>How to Introduce</div>
                <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".97rem",lineHeight:1.7,color:"var(--navy)",margin:0}}>{habit.introduce}</p>
              </div>
              <div style={{background:"var(--navy)",padding:"13px 14px"}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".95rem",color:"var(--cream)",fontStyle:"italic",lineHeight:1.65}}>"{habit.mason_quote}"</div>
                <div style={{fontFamily:"'Lato',sans-serif",fontSize:".6rem",color:"var(--gold-lt)",textTransform:"uppercase",letterSpacing:".08em",marginTop:5}}>— Charlotte Mason</div>
              </div>
            </div>
          )}
          {tab==="calendar"&&(
            <div className="card">
              <div className="card-hdr"><div className="card-icon ci-sage"><IcoCardSchedule/></div><div><div className="card-ttl">Last 30 Days</div></div></div>
              <div className="card-body">
                <div className="habit-cal">{last30.map((d,i)=><div key={i} className={`hcal-day ${d.done?"done":""} ${d.isToday?"today":""}`}/>)}</div>
                <div style={{marginTop:10,fontFamily:"'Lato',sans-serif",fontSize:".65rem",color:"var(--muted)"}}>{last30.filter(d=>d.done).length} of 30 days completed</div>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function OutdoorTimeScreen({outdoorHours,setOutdoorHours,mode}){
  const [editingDay,setEditingDay]=useState(null);
  const [draftVal,setDraftVal]=useState("");
  const [editGoal,setEditGoal]=useState(false);
  const [draftGoal,setDraftGoal]=useState("");
  const wk=getWeekKeySimple();
  const days=outdoorHours?.days?.[wk]||{};
  const goal=outdoorHours?.goal||10;
  const weeklyTotal=Object.values(days).reduce((s,v)=>s+(parseFloat(v)||0),0);
  const td=todayStr();
  const todayHrs=days[td]||0;
  const pct=Math.min(weeklyTotal/goal,1);
  const r=54,circ=2*Math.PI*r;
  const PROMPTS=["Find one thing you've never noticed before in your usual spot.","Sit still for 5 minutes and write down everything you hear.","Sketch one plant from observation — roots to tip if possible.","Count the kinds of birds you see or hear.","Look for signs of change — what is different from last week?","Find water. Watch it for five full minutes."];
  const randPrompt=PROMPTS[new Date().getDate()%PROMPTS.length];
  function setDayHours(dateStr,val){const num=parseFloat(val);setOutdoorHours(prev=>({...prev,days:{...(prev.days||{}),[wk]:{...(prev.days?.[wk]||{}),[dateStr]:isNaN(num)?0:num}}}));}
  function saveGoal(){const num=parseFloat(draftGoal);if(!isNaN(num)&&num>0)setOutdoorHours(p=>({...p,goal:num}));setEditGoal(false);}
  const last7=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return{label:d.toLocaleDateString("en-US",{weekday:"short"}),dateStr:d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),isToday:d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})===td};});
  return(
    <div>
      <div style={{marginBottom:"1rem"}}><h2 style={{color:"var(--navy)"}}>Outdoor Time</h2><p style={{color:"var(--muted)",fontStyle:"italic",fontSize:".91rem"}}>Charlotte Mason required outdoor time daily — rain or shine.</p></div>
      <div className="cm-tip"><div className="cm-tip-lbl">✦ Mason's standard</div><p>Three to six hours per day for young children. For older students, at least 20 minutes of sustained nature attention.</p></div>
      <div className="card">
        <div className="card-hdr"><div className="card-icon ci-sage"><IcoCardLeaf/></div><div style={{flex:1}}><div className="card-ttl">This Week's Outdoor Hours</div><div className="card-sub">Tap any day to edit</div></div>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            {editGoal?(
              <><input autoFocus value={draftGoal} onChange={e=>setDraftGoal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveGoal()} style={{width:50,border:"1.5px solid var(--sage)",borderRadius:6,padding:"3px 6px",fontFamily:"'Lato',sans-serif",fontSize:".8rem",textAlign:"center",background:"var(--cream)",outline:"none"}}/><button className="btn btn-sage btn-xs" onClick={saveGoal}>✓</button></>
            ):(
              <button className="btn btn-ghost btn-xs" onClick={()=>{setDraftGoal(String(goal));setEditGoal(true);}}>Goal: {goal}h</button>
            )}
          </div>
        </div>
        <div className="card-body">
          <div style={{display:"flex",alignItems:"center",gap:"1.2rem",marginBottom:"1.1rem"}}>
            <div className="outdoor-ring">
              <svg width="140" height="140" viewBox="0 0 140 140" style={{transform:"rotate(-90deg)"}}>
                <circle cx="70" cy="70" r={r} fill="none" stroke="var(--sage-bg)" strokeWidth="10"/>
                <circle cx="70" cy="70" r={r} fill="none" stroke={pct>=1?"var(--gold)":"var(--sage)"} strokeWidth="10" strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round" style={{transition:"stroke-dashoffset .5s ease"}}/>
              </svg>
              <div className="outdoor-ring-center"><div className="outdoor-ring-hrs">{weeklyTotal%1===0?weeklyTotal:weeklyTotal.toFixed(1)}</div><div className="outdoor-ring-lbl">of {goal}h</div></div>
            </div>
            <div style={{flex:1}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1rem",color:"var(--navy)",marginBottom:4}}>{pct>=1?"✦ Goal reached!":`${(goal-weeklyTotal).toFixed(1)}h to go`}</div>
              <div style={{fontFamily:"'Lato',sans-serif",fontSize:".72rem",color:"var(--muted)",lineHeight:1.5}}>Today: <strong style={{color:"var(--navy)"}}>{todayHrs}h</strong></div>
              <div style={{fontFamily:"'Lato',sans-serif",fontSize:".7rem",color:"var(--muted)",marginTop:2}}>Tap a bar to edit.</div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7, 1fr)",gap:5}}>
            {last7.map(({label,dateStr,isToday})=>{
              const hrs=parseFloat(days[dateStr])||0;
              const barPct=Math.min(hrs/Math.max(goal/5,2),1);
              const isEditing=editingDay===dateStr;
              return(
                <div key={dateStr} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                  <div onClick={()=>{if(!isEditing){setEditingDay(dateStr);setDraftVal(hrs>0?String(hrs):"");}}} style={{width:"100%",height:52,borderRadius:6,background:"var(--sage-bg)",position:"relative",cursor:"pointer",overflow:"hidden",outline:isToday?"2px solid var(--gold)":isEditing?"2px solid var(--sage)":"none",outlineOffset:1}}>
                    <div style={{position:"absolute",bottom:0,left:0,right:0,height:`${barPct*100}%`,background:pct>=1?"var(--gold)":"var(--sage)",borderRadius:"4px 4px 0 0",transition:"height .4s ease"}}/>
                    <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Lato',sans-serif",fontSize:".6rem",fontWeight:700,color:hrs>0.3?"var(--white)":"var(--muted)",zIndex:1}}>{hrs>0?`${hrs}h`:""}</div>
                  </div>
                  {isEditing?(
                    <input autoFocus value={draftVal} onChange={e=>setDraftVal(e.target.value)} onBlur={()=>{setDayHours(dateStr,draftVal);setEditingDay(null);}} onKeyDown={e=>{if(e.key==="Enter"){setDayHours(dateStr,draftVal);setEditingDay(null);}if(e.key==="Escape")setEditingDay(null);}} placeholder="0" style={{width:"100%",textAlign:"center",border:"1.5px solid var(--sage)",borderRadius:5,padding:"2px 0",fontFamily:"'Lato',sans-serif",fontSize:".72rem",background:"var(--cream)",outline:"none"}}/>
                  ):(
                    <div style={{fontFamily:"'Lato',sans-serif",fontSize:".62rem",color:isToday?"var(--gold)":"var(--muted)",fontWeight:isToday?700:400,textAlign:"center"}}>{label}</div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>
      <div className="card">
        <div className="card-hdr"><div className="card-icon ci-sage"><IcoCardLeaf/></div><div><div className="card-ttl">Nature Prompt</div><div className="card-sub">For today's outdoor time</div></div></div>
        <div className="card-body"><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.05rem",color:"var(--navy)",fontStyle:"italic",lineHeight:1.6,padding:"4px 0"}}>{randPrompt}</div></div>
        <div className="card-foot"><a className="btn btn-sage btn-sm" href="https://delightandsavor.com" target="_blank">Nature Study Resources</a></div>
      </div>
    </div>
  );
}

// Renders a single coaching section with a bold label, prose, and optional tips
function CoachSection({label,labelColor,labelBg,body,tips,quote}){
  return(
    <div style={{marginBottom:"1.1rem"}}>
      {label&&(
        <div style={{display:"inline-flex",alignItems:"center",gap:5,background:labelBg||"var(--sage-bg)",borderRadius:20,padding:"3px 11px",marginBottom:9}}>
          <span style={{fontFamily:"'Lato',sans-serif",fontSize:".6rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".1em",color:labelColor||"var(--sage)"}}>{label}</span>
        </div>
      )}
      {/* Main prose — split on newlines for readable paragraphs */}
      {(body||[]).map((para,i)=>(
        <p key={i} style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.05rem",lineHeight:1.8,color:"var(--ink)",marginBottom:i<body.length-1?10:0}}>{para}</p>
      ))}
      {/* Tip callouts */}
      {(tips||[]).map((tip,i)=>(
        <div key={i} style={{marginTop:10,display:"flex",gap:9,alignItems:"flex-start",background:"var(--cream)",borderRadius:8,padding:"9px 11px",borderLeft:"3px solid var(--gold)"}}>
          <span style={{color:"var(--gold)",fontSize:"1rem",flexShrink:0,lineHeight:1.2}}>✦</span>
          <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".95rem",color:"var(--navy)",lineHeight:1.65,fontStyle:"italic"}}>{tip}</span>
        </div>
      ))}
      {/* Palette or short quoted notes */}
      {(quote)&&(
        <div style={{marginTop:10,background:"var(--navy)",borderRadius:8,padding:"10px 13px"}}>
          <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".92rem",color:"var(--cream)",fontStyle:"italic",lineHeight:1.6}}>{quote}</span>
        </div>
      )}
    </div>
  );
}

function PaletteRow({palette}){
  if(!palette||!palette.length)return null;
  return(
    <div style={{marginTop:4,marginBottom:"1rem",background:"var(--cream)",borderRadius:10,padding:"11px 13px",border:"1px solid #e8e4dc"}}>
      <div style={{fontFamily:"'Lato',sans-serif",fontSize:".6rem",textTransform:"uppercase",letterSpacing:".1em",color:"var(--muted)",marginBottom:8}}>Palette for this subject</div>
      {palette.map((p,i)=>(
        <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,paddingBottom:i<palette.length-1?7:0,marginBottom:i<palette.length-1?7:0,borderBottom:i<palette.length-1?"1px solid #e8e4dc":"none"}}>
          <div style={{width:10,height:10,borderRadius:"50%",background:"var(--gold)",flexShrink:0,marginTop:5}}/>
          <div>
            <span style={{fontFamily:"'Lato',sans-serif",fontSize:".72rem",fontWeight:700,color:"var(--navy)"}}>{p.name}</span>
            {p.why&&<span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".88rem",color:"var(--muted)",fontStyle:"italic"}}> — {p.why}</span>}
          </div>
        </div>
      ))}
    </div>
  );
}

function CoachGuide({guidance,photoPreview,onReset,onDone}){
  const [phase,setPhase]=useState(0); // 0=look, 1=sketch, 2=paint
  const phases=["look","sketch","paint"];
  const phaseLabels=["1. How to Look","2. How to Sketch","3. How to Paint"];
  const phaseColors=["var(--sage)","var(--navy-lt)","var(--gold)"];
  const phaseBgs=["var(--sage-bg)","var(--lilac)","var(--gold-bg)"];

  const current=guidance[phases[phase]];

  return(
    <div>
      {photoPreview&&(
        <img src={photoPreview} alt="" style={{width:"100%",borderRadius:10,marginBottom:".9rem",objectFit:"cover",maxHeight:200,display:"block"}}/>
      )}

      {/* Opening observation */}
      {guidance.opening&&(
        <div style={{borderRadius:10,padding:"13px 15px",marginBottom:"1rem",background:"var(--navy)",border:"none"}}>
          <div style={{fontFamily:"'Lato',sans-serif",fontSize:".58rem",textTransform:"uppercase",letterSpacing:".12em",color:"var(--sage-lt)",marginBottom:6}}>What you're looking at</div>
          <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.05rem",color:"var(--cream)",lineHeight:1.75,margin:0,fontStyle:"italic"}}>{guidance.opening}</p>
        </div>
      )}

      {/* Phase tab switcher */}
      <div style={{display:"flex",gap:4,marginBottom:"1.1rem"}}>
        {phaseLabels.map((label,i)=>(
          <button key={i} onClick={()=>setPhase(i)} style={{flex:1,padding:"8px 4px",borderRadius:8,border:`2px solid ${phase===i?phaseColors[i]:"#e8e4dc"}`,background:phase===i?phaseBgs[i]:"var(--white)",fontFamily:"'Lato',sans-serif",fontSize:".58rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:phase===i?phaseColors[i]:"var(--muted)",cursor:"pointer",textAlign:"center",lineHeight:1.3,transition:"all .15s"}}>
            {label}
          </button>
        ))}
      </div>

      {/* Phase content */}
      {current&&(
        <div style={{animation:"fadeUp .25s ease"}}>
          {/* Intro sentence for this phase */}
          {current.intro&&(
            <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.05rem",color:"var(--muted)",fontStyle:"italic",lineHeight:1.7,marginBottom:"1rem"}}>{current.intro}</p>
          )}
          {/* Sections */}
          {(current.sections||[]).map((sec,i)=>(
            <CoachSection key={i} label={sec.label} labelColor={phaseColors[phase]} labelBg={phaseBgs[phase]} body={sec.body} tips={sec.tips} quote={sec.quote}/>
          ))}
          {/* Palette only on paint phase */}
          {phase===2&&guidance.palette&&<PaletteRow palette={guidance.palette}/>}
          {/* Common mistake */}
          {current.mistake&&(
            <div style={{marginTop:4,borderRadius:8,padding:"10px 13px",background:"#fdf0ef",border:"1px solid #f5c6c2",display:"flex",gap:9}}>
              <span style={{color:"var(--red)",fontSize:".9rem",flexShrink:0}}>⚠</span>
              <div>
                <div style={{fontFamily:"'Lato',sans-serif",fontSize:".6rem",textTransform:"uppercase",letterSpacing:".09em",color:"var(--red)",marginBottom:3}}>The most common mistake here</div>
                <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".95rem",color:"var(--ink)",lineHeight:1.65,margin:0}}>{current.mistake}</p>
              </div>
            </div>
          )}
        </div>
      )}

      {/* Navigation */}
      <div style={{display:"flex",gap:8,marginTop:"1.2rem"}}>
        {phase>0&&<button onClick={()=>setPhase(p=>p-1)} style={{flex:1,padding:"10px",borderRadius:8,border:"1.5px solid #ddd8ce",background:"var(--white)",fontFamily:"'Lato',sans-serif",fontSize:".72rem",cursor:"pointer",color:"var(--muted)"}}>← Back</button>}
        {phase<2&&<button onClick={()=>setPhase(p=>p+1)} style={{flex:2,padding:"10px",borderRadius:8,border:"none",background:phaseColors[phase+1]||"var(--sage)",color:"white",fontFamily:"'Lato',sans-serif",fontSize:".72rem",fontWeight:700,cursor:"pointer"}}>{phaseLabels[phase+1]} →</button>}
        {phase===2&&<button onClick={onDone} style={{flex:2,padding:"10px",borderRadius:8,border:"none",background:"var(--sage)",color:"white",fontFamily:"'Lato',sans-serif",fontSize:".72rem",fontWeight:700,cursor:"pointer"}}>I finished my painting ✓</button>}
      </div>

      <button onClick={onReset} style={{marginTop:8,width:"100%",padding:"9px",borderRadius:8,border:"1.5px solid #ddd8ce",background:"var(--white)",fontFamily:"'Lato',sans-serif",fontSize:".68rem",cursor:"pointer",color:"var(--muted)"}}>Start over with something else</button>
    </div>
  );
}

function buildLocalGuidance(desc){
  const d=(desc||"").toLowerCase();
  const isLeaf=d.includes("leaf")||d.includes("leaves")||d.includes("fern")||d.includes("frond");
  const isFlower=d.includes("flower")||d.includes("petal")||d.includes("bloom")||d.includes("blossom")||d.includes("rose")||d.includes("daisy")||d.includes("lily");
  const isFeather=d.includes("feather");
  const isShell=d.includes("shell")||d.includes("snail")||d.includes("spiral")||d.includes("conch");
  const isBark=d.includes("bark")||d.includes("branch")||d.includes("twig")||d.includes("wood")||d.includes("tree");
  const isRock=d.includes("rock")||d.includes("stone")||d.includes("pebble");
  const isBerry=d.includes("berry")||d.includes("berries")||d.includes("seed")||d.includes("pod")||d.includes("acorn");
  const isWater=d.includes("water")||d.includes("creek")||d.includes("pond")||d.includes("puddle")||d.includes("dew")||d.includes("stream");

  if(isLeaf)return{
    opening:"A leaf is an engineering marvel disguised as a simple thing. Before you touch your pencil, you're going to spend two full minutes just looking — because what you're about to discover will completely change what you draw.",
    look:{
      intro:"Most people draw their idea of a leaf. You're going to draw this leaf. Here's how to see it.",
      sections:[
        {label:"Find the skeleton first",body:["Hold the leaf up to the light if you can, or simply look. Every leaf has a midrib — the central spine running from stem to tip. This is the most important line in the whole drawing. It tells you which way the leaf is leaning, whether it curves, how strong it is. Before anything else, trace it with your eyes.","Now look at the secondary veins branching off it. Do they go out at a steep angle or a shallow one? Are they evenly spaced or crowded near the base? Do they reach the edge or fade before they get there?"],tips:["Most leaves are NOT symmetrical. The two halves on either side of the midrib are slightly different — look for that difference. It's what makes your leaf look like this leaf."]},
        {label:"Squint at it",body:["Squint your eyes until the leaf is slightly blurry. What you see now is the basic shape — not the details, just the silhouette. Notice: is it widest at the top third, the middle, or the bottom? Does it taper to a sharp point or a rounded one? Is the base rounded, heart-shaped, or does it narrow toward the stem?","This squinting shape is what you draw first — and most beginners skip straight to the details and get lost."],tips:["The silhouette is 80% of the drawing. Get it wrong and no amount of vein detail will save you."]},
        {label:"Read the edges and surface",body:["Now look at the margin — the edge of the blade. Is it smooth? Gently wavy? Sharply toothed like a saw? The edge tells you what kind of leaf it is and gives it character. Run your finger along it if you can.","Look at the surface. Is it matte or does it have a slight sheen? Are there small hairs? Does it curve upward or downward at the edges, forming a shallow cup? Where is the light hitting it — what's the brightest spot?"],tips:["The brightest spot on your leaf will stay as bare white paper. Find it now and remember it."]}
      ],
      mistake:"Drawing veins before you have the shape. Veins are decoration. Shape is structure. Get the silhouette right first, always."
    },
    sketch:{
      intro:"You've looked. Now you're going to put down marks that are based on what you actually saw — not what you think a leaf looks like.",
      sections:[
        {label:"Draw the midrib first",body:["Make one confident, slightly curved line. This is your leaf's spine. If you hesitate, the line will be timid. Be decisive — you can adjust. This line sets the angle of the entire leaf, so get the lean and curve right before moving on."]},
        {label:"Block in the silhouette",body:["Now draw the outer edge of the leaf as a simple shape around the midrib. Use your squinted memory of the silhouette. Don't draw veins yet. Just the outline — two sides that meet at the tip and meet at the stem. Notice where the leaf is widest and place that point correctly."],tips:["Work in light pencil for now. You're mapping territory, not making final marks."]},
        {label:"Add the secondary veins — selectively",body:["You don't draw every vein. You draw enough to show the pattern. Usually five to seven secondary veins on each side is plenty. Space them the way you see them — if they're closer together near the base, draw them that way. Let the tips of the veins fade into the paper rather than running them all the way to the edge."],tips:["Veins that fade look more natural than veins that stop abruptly."]}
      ],
      mistake:"Making every line the same weight. The midrib is your darkest, most confident line. Everything else is lighter."
    },
    paint:{
      intro:"Leaves are translucent. Light passes through them. Your painting needs to feel lit from within, not just coloured in.",
      sections:[
        {label:"Wet the paper first",body:["Before any colour, wet the leaf area with clean water using a soft brush. You want it damp but not pooling. This gives you soft edges and lets colours blend into each other — which is what a leaf actually looks like."]},
        {label:"First wash — your lightest green",body:["Mix lemon yellow with a small amount of sap green to get a yellow-green. Apply this broadly across the whole leaf while the paper is still damp. Don't be timid — cover it. Leave your brightest spot (that highlight you found earlier) as bare paper or barely touched."],tips:["The first wash is always lighter than you think you need. Watercolour dries lighter. Be brave with the second layer."]},
        {label:"Build the depth while damp",body:["While that first wash is still wet (work quickly), drop a stronger sap green into the shadow areas — where the leaf curves away from the light, near the midrib on the shadow side, at the base. Let it spread and bloom. You're not painting — you're guiding.","Once dry, you can add a third, deeper glaze of sap green with a tiny touch of burnt sienna where the very deepest shadows are."]}
      ],
      mistake:"Trying to control every bloom and spread while the paper is wet. The water does the work. Your job is to put the right colour in the right place and step back."
    },
    palette:[
      {name:"Lemon Yellow (PY3 or PY175)",why:"The warm, transparent yellow base that gives leaves their lit-from-within quality"},
      {name:"Sap Green",why:"The workhorse green — mix with lemon yellow for the light, use stronger for shadows"},
      {name:"Burnt Sienna",why:"A tiny drop in your darkest shadow green adds warmth and stops it looking flat"},
      {name:"Payne's Grey",why:"For the very deepest vein shadows — just a touch, it dulls beautifully"}
    ]
  };

  if(isFlower)return{
    opening:"A flower is basically a cup or bowl of petals arranged around a center — but every flower has a personality, a specific way it faces the world. Before you draw, you need to understand how this particular flower is built.",
    look:{
      intro:"Flowers are harder than they look because we have a strong idea of what a flower 'should' look like. Your job is to forget that and see what's actually in front of you.",
      sections:[
        {label:"Find the center and the overall shape",body:["Squint. What is the overall silhouette — a circle? An oval? Does it face you straight on, or is it tilting? The center is your anchor. Find it and mark it mentally before you draw anything else.","Now count the petals, or at least estimate. Are they all the same size, or do some overlap others? Which petals are in front?"],tips:["The petals that overlap others are in front. Draw those last — they sit on top."]},
        {label:"Look at individual petals — they are NOT all the same",body:["Each petal has its own shape and its own relationship to the light. Look at one petal closely: is the edge ruffled or smooth? Does it curve backward or forward? Where does it attach to the center — is that connection narrow or wide?","The petals furthest from you are foreshortened — they look compressed, shorter than they really are. Draw them that way."],tips:["Beginners draw petals as if they're all facing them flat. Look for the petals that are angling away — those are the ones that give the flower dimension."]},
        {label:"The center is a world of its own",body:["Before you draw, really look at the center. Is it a flat button? A raised dome? A fuzzy mass of stamens? What colour is it — is it a different temperature (warmer or cooler) than the petals? The center is usually where your darkest darks and lightest lights live together."]}
      ],
      mistake:"Drawing petals as separate shapes that don't connect to the center. Start at the center and work outward — each petal grows FROM the center."
    },
    sketch:{
      intro:"Sketch the flower the way it's built — from the inside out.",
      sections:[
        {label:"Mark the center, then the boundary",body:["Draw a small circle or oval for the center. Then lightly sketch the overall outer boundary of the whole flower — how wide, how tall. You now have a container to fill."]},
        {label:"Divide the space",body:["Lightly divide the space between center and edge into petal segments, like slices of a pie. These are guides, not final lines. You're just blocking where each petal lives."],tips:["Flowers are almost never perfectly symmetrical. Let your guides be slightly irregular — that's honest."]},
        {label:"Draw the petals from base to tip",body:["Now draw each petal, starting from where it attaches at the center and moving outward to the tip. Pay attention to the width at the base, how it widens or narrows, and what the tip does. Let overlapping petals cross over each other."]}
      ],
      mistake:"Outlining the whole flower first as one shape and then trying to add petals inside it. Petals define the shape — they don't fit inside a pre-drawn outline."
    },
    paint:{
      intro:"Flowers are lit differently on every petal. Your painting should feel like light is moving across the surface.",
      sections:[
        {label:"Protect your lightest light",body:["Before any paint touches the paper, decide where your brightest highlight is. For most flowers this is on the petal or two that face you most directly. Leave this as bare paper, or apply masking fluid if you have it."]},
        {label:"Work petal by petal, wet-on-wet",body:["Wet one petal at a time and drop your lightest colour in. While it's wet, add a slightly stronger version at the base where the petal meets the center — this is almost always the darkest part of a petal. Let the colour bloom toward the tip."],tips:["The base of each petal, where it meets the center, is usually cooler and darker. A small touch of violet or blue there goes a long way."]},
        {label:"Paint the center last — it earns its darkness",body:["The center is often your darkest value. Paint it with confidence after all the petals are done. This contrast — dark center against lighter petals — is what makes the flower pop."]}
      ],
      mistake:"Painting every petal the same value. Some petals face the light and are bright; others turn away and are in shadow. Let that difference show — it's what creates the three-dimensional illusion.",
      palette:[
        {name:"Your flower's local colour — pale version",why:"First wash — always paler than you think you need, dries lighter"},
        {name:"Same colour, stronger",why:"The shadow wash dropped wet-into-wet at petal bases"},
        {name:"A complementary touch (violet for yellow, orange for blue)",why:"A tiny drop in the center adds richness without going muddy"},
        {name:"Yellow Ochre or Burnt Sienna",why:"Warm the center — most flower centers are warmer than the petals"}
      ]
    }
  };

  if(isFeather)return{
    opening:"A feather is a masterpiece of structure — a central shaft with hundreds of barbs all pointing in the same direction. Before you draw, understand how it's built, because the structure tells you exactly how to paint it.",
    look:{
      intro:"Look at the feather as an engineer would: understand its parts before you make a single mark.",
      sections:[
        {label:"Find the rachis and its character",body:["The rachis is the central shaft. It is not perfectly straight — it has a gentle curve, usually bowing slightly to one side. Look at it: does it taper evenly from base to tip, or does it stay thick for most of its length and then taper quickly at the end? Where is it widest?","Notice the colour of the rachis itself — it's often different from the vane. It may be cream, tan, brown, or have a warm highlight running along one edge."]},
        {label:"Look at the vane — which side is wider?",body:["The vane (the flat part on either side of the rachis) is almost never symmetrical. One side is usually noticeably narrower than the other. This asymmetry is how birds control airflow. Find the wider and narrower sides of your feather."],tips:["The narrow side is usually the leading edge — the side that cuts through the air first. Draw that one slightly more compressed."]},
        {label:"Find where the barbs are perfect and where they're disrupted",body:["Healthy barbs interlock perfectly and give the vane a smooth, continuous surface. But most feathers we find have some disruption — barbs that have separated, creating gaps or ruffled sections. Find one disrupted area and remember it. It will be the most interesting part of your drawing."]}
      ],
      mistake:"Drawing the barbs as hundreds of individual lines all the way down the feather. Suggest the barb direction with a few confident lines near the base and tip and let the middle breathe — your eye will complete it."
    },
    sketch:{
      intro:"The feather sketch is all about the center line and the silhouette — everything else follows from those two things.",
      sections:[
        {label:"Draw the rachis in one stroke",body:["One confident, slightly curved line. Start at the calamus (the bare quill at the bottom) and draw upward to the tip. The curve of this line is the personality of the feather — get it right and everything else falls into place."]},
        {label:"Add the silhouette on each side",body:["Now draw the outer edges of the vane on each side. Remember: they're different widths. The edges of a healthy feather taper from widest (usually in the lower third) to a narrow tip. The edge is not perfectly straight — it has a very slight inward curve on a healthy feather."]},
        {label:"Suggest the barb direction — don't map every barb",body:["Draw a few barb lines near the base: they angle upward from the rachis at about 45 degrees. Draw a few near the tip: they angle more steeply. In between, leave space. Add any disruption you noticed — a few separated barbs, a slight ruffle."]}
      ],
      mistake:"Making the rachis line too thick and stiff. It should look alive — taper it slightly from base to tip and let it flex."
    },
    paint:{
      intro:"Feathers have a subtle iridescence and texture that comes from layering thin, transparent washes — never from one opaque coat.",
      sections:[
        {label:"First wash — the overall tone",body:["Lay a pale wash over the entire vane in one go. For most feathers this is a warm buff, pale grey, or the lightest version of whatever colour the feather is. Leave the rachis slightly lighter."]},
        {label:"While damp, stroke in the barb direction",body:["While the first wash is still wet, use a damp brush (not wet, damp) to stroke thin lines of slightly darker colour following the barb direction — from the rachis outward. You're not drawing every barb, just suggesting the motion of them."],tips:["Work from rachis outward with each stroke — never the other direction."]},
        {label:"The rachis gets its own layer",body:["Once the vane is dry, paint the rachis itself. Use a warm brown or grey — darker on the shadow side, lighter on the lit side. The rachis has a subtle highlight running along its length: leave a thin line of the first wash visible for this."]}
      ],
      mistake:"Painting the barbs as dark lines on a light background. Feathers are the other way — the barbs are the same value as the vane, with slightly darker spaces between them. Work light to dark, not dark onto light.",
      palette:[
        {name:"Raw Umber",why:"The workhorse for most earth-toned feathers — warm and transparent"},
        {name:"Payne's Grey",why:"For cool-toned feathers, or to dull your warm tone slightly in shadows"},
        {name:"Burnt Sienna",why:"A touch in the rachis and base barbs adds warmth and life"},
        {name:"Yellow Ochre",why:"The highlight on the rachis and the pale barb tips on many bird feathers"}
      ]
    }
  };

  // Default — for unknown subjects
  return{
    opening:"You're about to draw something specific. The most important thing you can do right now is spend two minutes just looking before you touch your pencil. Everything that follows depends on what you notice in those two minutes.",
    look:{
      intro:"Most drawing mistakes happen before a single mark is made — they happen in the looking. Here's how to see your subject properly.",
      sections:[
        {label:"Squint and find the big shape",body:["Squint your eyes until the subject goes slightly blurry. What you see now is the essential silhouette — not the details, just the overall shape. Is it tall and narrow? Wide and low? Round? Irregular? This big shape is what you draw first. Get it wrong and no amount of detail will save you."],tips:["If you can hold up your thumb and pencil at arm's length to measure proportions, do it. How wide is the subject compared to how tall?"]},
        {label:"Find where the light is coming from",body:["Look at your subject and find the single brightest spot on it. That's where the light is hitting most directly. Now find the darkest area — usually on the side turned away from the light, or where the subject meets the surface it rests on (the contact shadow). These two extremes — brightest light and deepest dark — are the skeleton of your painting."],tips:["The brightest spot will stay as bare paper. Find it now and remember it."]},
        {label:"Look for the main textures and edges",body:["Run your eyes across the surface. Are the edges of this subject sharp and crisp, or soft and fuzzy? Where does one material meet another? Are there repeated patterns — scales, ridges, veins, fibres? Pick two or three of the most distinctive textures. You don't draw every texture — you draw the most characteristic ones in the most characteristic places."]}
      ],
      mistake:"Drawing what you know is there instead of what you can actually see from where you're sitting. If a detail is in shadow, draw it in shadow — don't reveal it just because you know it's there."
    },
    sketch:{
      intro:"Your sketch is a map, not a finished drawing. You're laying out the territory so you don't get lost when you paint.",
      sections:[
        {label:"Draw the big shape first",body:["Using light pencil, sketch just the outer silhouette. No details yet. Get the proportions right — check your squinted memory of the shape. Is it correct? Adjust until it is."]},
        {label:"Find the most important internal division",body:["What is the single most important line or boundary inside the shape? The edge between light and shadow? A central stem? A fold or crease? Add that one line. Then the next most important. Work from general to specific, always."],tips:["A sketch with five well-observed lines is better than one with fifty rushed ones."]},
        {label:"Add texture in shadow only",body:["If you want to indicate texture, do it in the shadow areas — lightly, as suggestion. Texture in the light area of a sketch tends to flatten the drawing. Save your texture energy for the shadow side."]}
      ],
      mistake:"Working too small. The smaller you draw, the more you fight your own hand. If you can, draw at actual size or larger — you'll see more, and the marks will feel freer."
    },
    paint:{
      intro:"Watercolour works best when you know where you're going before you start — because you can't paint light over dark. Plan your lightest lights first.",
      sections:[
        {label:"Know your lights before you begin",body:["The lightest area of your painting is bare paper. Decide exactly where that is and protect it mentally (or with masking fluid if needed). Every layer of paint you add will be darker than what's underneath."]},
        {label:"First wash — broader and lighter than you think",body:["Apply your first wash over the whole subject — lighter and more dilute than feels right. This sets the overall tone. Let it dry completely before adding anything."],tips:["Watercolour dries at least 30% lighter than it looks wet. Mix it stronger than you think you need."]},
        {label:"Build depth in layers",body:["Add your second layer only in the mid-tone and shadow areas. Let dry. Add your darkest layer last, in the smallest area. Each layer should cover less area than the one before it — you're building toward a point of maximum darkness, not coating the whole surface."]}
      ],
      mistake:"Painting wet paint into wet paint too many times. Each time you re-wet an area that's already drying, you disturb the pigment and create muddy backwashes. Be patient between layers.",
      palette:[
        {name:"Your lightest overall colour — very dilute",why:"First wash, applied broadly"},
        {name:"Same colour, stronger concentration",why:"Second wash, applied to mid-tones and shadows"},
        {name:"Your darkest dark — used sparingly",why:"Final layer, applied only to deepest shadow areas"},
        {name:"A warm accent",why:"Add life — a touch of warmth in shadow stops it looking flat and grey"}
      ]
    }
  };
}

function WatercolorCoach(){
  const [screen,setScreen]=useState("choice");
  const [subject,setSubject]=useState("");
  const [photoData,setPhotoData]=useState(null);
  const [photoPreview,setPhotoPreview]=useState(null);
  const [guidance,setGuidance]=useState(null);
  const [loading,setLoading]=useState(false);
  const fileRef=useRef();

  function reset(){setScreen("choice");setGuidance(null);setPhotoData(null);setPhotoPreview(null);setSubject("");setLoading(false);}

  function handlePhotoSelect(e){
    const file=e.target.files?.[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      setPhotoPreview(ev.target.result);
      setPhotoData(ev.target.result.split(",")[1]);
      setScreen("photo");
    };
    reader.readAsDataURL(file);
  }

  async function getGuidance(usePhoto){
    setScreen("loading");setLoading(true);

    const SYSTEM=`You are a master watercolour and nature journaling teacher whose approach is rooted in Charlotte Mason's philosophy of careful, loving observation. Your coaching has a specific philosophy: YOU TEACH PEOPLE HOW TO SEE BEFORE YOU TEACH THEM HOW TO DRAW.

Your coaching is NOT a list of steps. It is intimate, specific, and written as if you are sitting beside this person, looking at this exact subject with them.

Your language is warm but precise. You name what you actually observe. You explain WHY each thing matters — not just what to do. You tell the person what most beginners get wrong with THIS specific subject, not generic mistakes.

CRITICAL RULES:
- Never say "sketch your subject" — say EXACTLY what to sketch first and why
- Never say "add details" — say which specific detail, where, and how
- Never recommend a colour by generic name — use real pigment names (Sap Green, Burnt Sienna, Yellow Ochre, Ultramarine Blue, Payne's Grey, Raw Umber, etc.)
- Never give advice that would apply equally to any subject — every sentence must be specific to THIS subject
- The LOOK phase is the most important. Teach them to see before they draw.
- Mention specific things you observe in the image or description — actual colours, actual edges, actual structures

Output ONLY valid JSON. No markdown. No explanation outside the JSON.`;

    const SHAPE=`{
  "opening": "2-3 sentences describing exactly what this subject IS and what makes it worth the effort of drawing — mention something specific you observe",
  "look": {
    "intro": "1-2 sentences framing the act of looking at THIS subject before drawing",
    "sections": [
      {
        "label": "short label for this looking task (e.g. 'Find the dominant shape', 'Read the light', 'Notice the edges')",
        "body": ["paragraph 1 — specific to this subject", "paragraph 2 if needed"],
        "tips": ["optional: one specific tip as a callout"]
      }
    ],
    "mistake": "The single most common mistake beginners make when looking at THIS specific subject — be concrete"
  },
  "sketch": {
    "intro": "1-2 sentences framing the sketching approach for THIS subject",
    "sections": [
      {
        "label": "short label",
        "body": ["specific instruction paragraph"],
        "tips": ["optional tip"]
      }
    ],
    "mistake": "The most common sketching mistake for THIS subject specifically"
  },
  "paint": {
    "intro": "1-2 sentences about the key challenge of painting THIS subject in watercolour",
    "sections": [
      {
        "label": "short label",
        "body": ["specific painting instruction — name actual pigments, actual techniques"],
        "tips": ["optional tip"]
      }
    ],
    "mistake": "The most common painting mistake for THIS subject specifically"
  },
  "palette": [
    {"name": "Pigment Name (with colour index code if known)", "why": "specific reason for this subject"},
    {"name": "Pigment Name", "why": "specific reason"}
  ]
}`;

    try{
      let messages;
      if(usePhoto&&photoData){
        const focus=subject.trim()?` The artist wants to focus on: "${subject}".`:"";
        messages=[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:"image/jpeg",data:photoData}},
          {type:"text",text:`Study this image very carefully and in detail. Identify exactly what you see — the specific subject, its structure, its colours and colour temperature (warm or cool), where the light is coming from, which edges are hard and which are soft, what the dominant textures are, and what makes this particular specimen interesting or unusual.${focus}

Now write coaching that teaches someone who has NEVER painted before how to see and paint THIS exact subject. Your coaching must reference things you actually observe in this image. Do not be generic.

${SHAPE}`}
        ]}];
      } else {
        messages=[{role:"user",content:`The subject is: "${subject.trim()}".

Imagine you are looking at this subject right now, in good light. Describe it to yourself internally — its structure, colour temperature, the way light hits it, whether its edges are hard or soft, what its dominant textures are, what makes it distinctive.

Now write coaching that teaches someone who has never painted before how to see and paint THIS exact subject. Every sentence must be specific to this subject. Reference its particular structural logic, characteristic colours, and the specific challenges it presents.

${SHAPE}`}];
      }

      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,system:SYSTEM,messages})
      });
      const data=await resp.json();
      if(data.error)throw new Error(data.error.message);
      const raw=(data.content[0]?.text||"").replace(/^```json\s*/,"").replace(/\s*```$/,"").trim();
      const parsed=JSON.parse(raw);
      setGuidance(parsed);setScreen("guide");
    }catch(err){
      const desc=usePhoto?(subject.trim()||"nature subject"):subject.trim();
      setGuidance(buildLocalGuidance(desc));setScreen("guide");
    }
    setLoading(false);
  }

  if(screen==="choice")return(
    <div>
      <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem",color:"var(--muted)",fontStyle:"italic",lineHeight:1.7,marginBottom:"1.1rem"}}>Show me what you want to paint — or describe it — and I'll teach you how to <em>see</em> it before you draw a single line.</p>
      <div onClick={()=>fileRef.current?.click()} style={{border:"2px dashed var(--sage-lt)",borderRadius:12,padding:"22px 16px",marginBottom:".75rem",textAlign:"center",cursor:"pointer",background:"var(--sage-bg)",transition:"background .15s"}}
        onMouseOver={e=>e.currentTarget.style.background="var(--sage-bg)"}
      >
        <svg width="32" height="32" viewBox="0 0 20 20" fill="none" stroke="var(--sage)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{display:"block",margin:"0 auto 10px"}}><path d="M18 15a1.5 1.5 0 01-1.5 1.5h-13A1.5 1.5 0 012 15V8a1.5 1.5 0 011.5-1.5H6l1.5-2.5h5L14 6.5h2.5A1.5 1.5 0 0118 8v7z"/><circle cx="10" cy="11" r="2.5"/></svg>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.05rem",color:"var(--navy)",marginBottom:5}}>Upload a Photo of Your Subject</div>
        <div style={{fontFamily:"'Lato',sans-serif",fontSize:".7rem",color:"var(--muted)",lineHeight:1.6,marginBottom:10}}>The AI studies exactly what's in it — the actual colours, textures, light — and coaches you on that specific thing.</div>
        <div style={{display:"flex",gap:7,justifyContent:"center"}}>
          <span style={{fontFamily:"'Lato',sans-serif",fontSize:".65rem",background:"var(--white)",border:"1.5px solid var(--sage-lt)",borderRadius:20,padding:"4px 12px",color:"var(--sage)",fontWeight:700}}>📁 From Library</span>
          <span style={{fontFamily:"'Lato',sans-serif",fontSize:".65rem",background:"var(--white)",border:"1.5px solid var(--sage-lt)",borderRadius:20,padding:"4px 12px",color:"var(--sage)",fontWeight:700}}>📷 Take a Photo</span>
        </div>
        <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handlePhotoSelect}/>
      </div>
      <div onClick={()=>setScreen("text")} style={{border:"2px dashed #ddd8ce",borderRadius:12,padding:"16px",textAlign:"center",cursor:"pointer",background:"var(--white)"}}>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:".98rem",color:"var(--navy)",marginBottom:4}}>Describe It Instead</div>
        <div style={{fontFamily:"'Lato',sans-serif",fontSize:".7rem",color:"var(--muted)",lineHeight:1.5}}>Tell me what you're looking at — the more specific and sensory, the better the coaching.</div>
      </div>
    </div>
  );

  if(screen==="photo")return(
    <div>
      {photoPreview&&<img src={photoPreview} alt="" style={{width:"100%",borderRadius:10,marginBottom:".85rem",objectFit:"cover",maxHeight:240,display:"block"}}/>}
      <div style={{marginBottom:".85rem"}}>
        <div style={{fontFamily:"'Lato',sans-serif",fontSize:".62rem",textTransform:"uppercase",letterSpacing:".09em",color:"var(--muted)",marginBottom:5}}>Optional: what specifically do you want to focus on?</div>
        <input value={subject} onChange={e=>setSubject(e.target.value)} placeholder="e.g. the dried oak leaf in the foreground, the texture of the bark on the right…" style={{width:"100%",border:"1.5px solid #ddd8ce",borderRadius:8,padding:"9px 11px",fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem",background:"var(--cream)",outline:"none",color:"var(--ink)"}}/>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>{setPhotoData(null);setPhotoPreview(null);setScreen("choice");}} style={{flex:1,padding:"10px",borderRadius:8,border:"1.5px solid #ddd8ce",background:"var(--white)",fontFamily:"'Lato',sans-serif",fontSize:".72rem",cursor:"pointer",color:"var(--muted)"}}>← Different photo</button>
        <button onClick={()=>getGuidance(true)} style={{flex:2,padding:"10px",borderRadius:8,border:"none",background:"var(--sage)",color:"white",fontFamily:"'Lato',sans-serif",fontSize:".75rem",fontWeight:700,cursor:"pointer",letterSpacing:".04em"}}>Teach me to see this →</button>
      </div>
    </div>
  );

  if(screen==="text")return(
    <div>
      <div style={{fontFamily:"'Lato',sans-serif",fontSize:".62rem",textTransform:"uppercase",letterSpacing:".09em",color:"var(--muted)",marginBottom:8}}>What are you looking at right now?</div>
      <textarea value={subject} onChange={e=>setSubject(e.target.value)} autoFocus
        placeholder="Be sensory and specific. Not just 'a leaf' but: 'a fallen live oak leaf, curled slightly upward at the edges, dried to a deep rust-brown with the midrib still pale cream, about four inches long…'"
        style={{width:"100%",minHeight:120,border:"1.5px solid #ddd8ce",borderRadius:10,padding:"10px 12px",fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem",color:"var(--ink)",lineHeight:1.7,resize:"vertical",outline:"none",marginBottom:10}}/>
      <div style={{background:"var(--gold-bg)",borderRadius:8,padding:"9px 12px",marginBottom:12,borderLeft:"3px solid var(--gold)"}}>
        <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".88rem",color:"var(--ink)",fontStyle:"italic",lineHeight:1.6,margin:0}}>The more specific you are, the more specific the coaching. What colour is it really? Where is the light coming from? Is it smooth or rough? Does it have a smell?</p>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setScreen("choice")} style={{flex:1,padding:"10px",borderRadius:8,border:"1.5px solid #ddd8ce",background:"var(--white)",fontFamily:"'Lato',sans-serif",fontSize:".72rem",cursor:"pointer",color:"var(--muted)"}}>← Back</button>
        <button onClick={()=>getGuidance(false)} disabled={!subject.trim()} style={{flex:2,padding:"10px",borderRadius:8,border:"none",background:subject.trim()?"var(--sage)":"#ccc",color:"white",fontFamily:"'Lato',sans-serif",fontSize:".75rem",fontWeight:700,cursor:subject.trim()?"pointer":"default",letterSpacing:".04em"}}>Teach me to see this →</button>
      </div>
    </div>
  );

  if(screen==="loading")return(
    <div style={{textAlign:"center",padding:"3rem 1rem"}}>
      {photoPreview&&<img src={photoPreview} alt="" style={{width:"100%",borderRadius:10,marginBottom:"1.2rem",objectFit:"cover",maxHeight:200,opacity:.6,display:"block"}}/>}
      <div className="analyzing-dots" style={{justifyContent:"center",marginBottom:14}}>
        <span className="analyzing-dot"/><span className="analyzing-dot"/><span className="analyzing-dot"/>
      </div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.1rem",color:"var(--navy)",fontStyle:"italic",marginBottom:6}}>Learning to look at your subject…</div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".9rem",color:"var(--muted)",fontStyle:"italic",lineHeight:1.6}}>{photoData?"Studying the colours, edges, and light in your photo…":"Thinking carefully about this specific subject…"}</div>
    </div>
  );

  if(screen==="guide"&&guidance){
    return(
      <CoachGuide guidance={guidance} photoPreview={photoPreview} onReset={reset} onDone={()=>setScreen("done")}/>
    );
  }

  if(screen==="done")return(
    <div style={{textAlign:"center",padding:"2rem 1rem"}}>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.3rem",color:"var(--navy)",marginBottom:8}}>Well done.</div>
      <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem",color:"var(--muted)",fontStyle:"italic",lineHeight:1.7,marginBottom:20,maxWidth:280,margin:"0 auto 20px"}}>"Small and imperfect is right. A notation is worth a thousand descriptions."</p>
      <button onClick={reset} style={{padding:"11px 28px",borderRadius:8,border:"none",background:"var(--navy)",color:"var(--cream)",fontFamily:"'Lato',sans-serif",fontSize:".75rem",fontWeight:700,cursor:"pointer",letterSpacing:".06em"}}>Paint Something Else</button>
    </div>
  );

  return null;
}
