// ── Helpers ───────────────────────────────────────────────────────────────────
let _uid=1;
const uid=()=>String(_uid++);
function todayName(){const d=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][new Date().getDay()];return DAYS.includes(d)?d:"Monday";}
function todayStr(){return new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function getWeekKey(){const n=new Date(),j=new Date(n.getFullYear(),0,1);return `${n.getFullYear()}-W${Math.ceil(((n-j)/86400000+j.getDay()+1)/7)}`;}
function formatWeekRange(){const n=new Date(),d=n.getDay(),diff=n.getDate()-(d===0?6:d-1);const m=new Date(new Date(n).setDate(diff));const f=new Date(m);f.setDate(m.getDate()+4);const fmt=x=>x.toLocaleDateString("en-US",{month:"numeric",day:"numeric"});return `${fmt(m)} – ${fmt(f)}`;}
function cloneSched(s){return Object.fromEntries(Object.entries(s).map(([d,bs])=>[d,bs.map(b=>({...b,items:[...b.items],checks:{...b.checks}}))]));}
function dayProgress(blocks){let total=0,done=0;blocks.forEach(b=>{b.items.forEach((_,i)=>{total++;if(b.checks[i])done++;});});return{total,done};}

// ── Note storage (free-floating by date) ──────────────────────────────────────
function getNoteKey(){return 'lrp_notes_'+new Date().toISOString().slice(0,10);}
function loadNotes(k){try{return JSON.parse(localStorage.getItem(k)||'{}')}catch{return {};}}
function saveNotes(k,n){try{localStorage.setItem(k,JSON.stringify(n));}catch{}}
function getAllNoteKeys(){try{return Object.keys(localStorage).filter(k=>k.startsWith('lrp_notes_')).sort();}catch{return [];}}

// ── Auth ──────────────────────────────────────────────────────────────────────
function getStoredUser(){try{const s=localStorage.getItem('lrp_user');return s?JSON.parse(s):null;}catch{return null;}}
function storeUser(u){try{localStorage.setItem('lrp_user',JSON.stringify(u));}catch{}}
function clearStoredUser(){try{localStorage.removeItem('lrp_user');}catch{}}
function saveData(id,data){try{localStorage.setItem('lrp_data_'+id,JSON.stringify(data));}catch{}}
function loadData(id){try{const s=localStorage.getItem('lrp_data_'+id);return s?JSON.parse(s):null;}catch{return null;}}

async function subscribeToMailerLite(email,name,tag){
  try{
    const ex=JSON.parse(localStorage.getItem('lrp_emails')||'[]');
    if(!ex.find(e=>e.email===email)){ex.push({email,name,tag,date:new Date().toISOString()});localStorage.setItem('lrp_emails',JSON.stringify(ex));}
    await fetch('/.netlify/functions/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,name,tag})});
  }catch(e){console.log('Subscribe (non-fatal):',e);}
}

// ── AUTH SCREEN ───────────────────────────────────────────────────────────────
function AuthScreen({onAuth}){
  const [step,setStep]=useState("welcome");
  const [name,setName]=useState("");
  const [email,setEmail]=useState("");
  const [code,setCode]=useState("");
  const [role,setRole]=useState("parent");
  const [error,setError]=useState("");
  const [sending,setSending]=useState(false);

  async function handleEmailSubmit(e){
    e.preventDefault();
    if(!email.trim()||!name.trim())return;
    setSending(true);
    await subscribeToMailerLite(email.trim(),name.trim(),"beta");
    setSending(false);
    setStep("sent");
  }

  function handleCodeSubmit(e){
    e.preventDefault();
    const c=code.trim().toUpperCase();
    if(c===FAMILY_CODE||c===BETA_CODE||c===ADMIN_CODE){
      const user={name:name.trim()||"Friend",email:email.trim(),role,id:(name.trim()||"friend").toLowerCase().replace(/\s+/g,"-"),isAdmin:c===ADMIN_CODE};
      storeUser(user);
      onAuth(user);
    }else{
      setError("That code isn\u2019t right \u2014 check your email and try again.");
    }
  }

  if(step==="welcome")return(
    <div className="auth-wrap">
      <div className="auth-card">
        <div style={{textAlign:"center",marginBottom:"1rem"}}>
          <div style={{fontFamily:"'Lato',sans-serif",fontSize:".6rem",textTransform:"uppercase",letterSpacing:".2em",color:C.gold,marginBottom:4}}>\u2756 Delight &amp; Savor</div>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"1.5rem",color:C.navy}}>Living <em style={{color:"#7a8f6f"}}>Rhythm</em></h2>
          <p className="auth-sub">A Charlotte Mason planner for your homeschool family</p>
        </div>
        <div style={{background:"linear-gradient(135deg,#fbf5e0,#eef4ee)",borderRadius:10,padding:"12px 14px",margin:"1rem 0",border:"1px solid #e8ca7a"}}>
          <div style={{fontFamily:"'Lato',sans-serif",fontSize:".58rem",textTransform:"uppercase",letterSpacing:".12em",color:C.gold,marginBottom:4}}>\u2756 Early Roots Founding Membership</div>
          <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".92rem",color:C.navy,lineHeight:1.6,margin:"0 0 4px",fontStyle:"italic"}}>Join a small founding group of Charlotte Mason families helping shape this planner.</p>
          <p style={{fontFamily:"'Lato',sans-serif",fontSize:".72rem",color:C.navy,margin:0,fontWeight:700}}>$24 through August 2025 \u2014 then $47/year</p>
        </div>
        <form onSubmit={handleEmailSubmit}>
          <div className="field"><label>Your first name</label><input autoFocus value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Kim" required/></div>
          <div className="field"><label>Your email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" required/></div>
          <button type="submit" className="btn btn-sage btn-full" style={{padding:"12px",fontSize:".8rem",marginBottom:10}} disabled={sending}>{sending?"Sending your code\u2026":"Send me my access code \u2192"}</button>
        </form>
        <div style={{display:"flex",alignItems:"center",gap:8,margin:".75rem 0 .5rem"}}>
          <div style={{flex:1,height:1,background:"#e8e4dc"}}/>
          <span style={{fontFamily:"'Lato',sans-serif",fontSize:".6rem",color:C.slateL,textTransform:"uppercase",letterSpacing:".08em"}}>already have a code?</span>
          <div style={{flex:1,height:1,background:"#e8e4dc"}}/>
        </div>
        <button onClick={()=>setStep("access")} style={{width:"100%",padding:"10px",borderRadius:9,border:"1.5px solid #ddd8ce",background:"#fff",fontFamily:"'Lato',sans-serif",fontSize:".75rem",cursor:"pointer",color:C.navy}}>Enter code directly \u2192</button>
        <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".75rem",color:C.slateL,fontStyle:"italic",textAlign:"center",marginTop:"1rem",lineHeight:1.5}}>Your email is only used to send your access code. Never shared.</p>
        <div style={{textAlign:"center",marginTop:".5rem"}}><a href="?reset=true" style={{fontFamily:"'Lato',sans-serif",fontSize:".58rem",color:C.slateL,textDecoration:"underline"}}>Clear saved data &amp; restart</a></div>
      </div>
    </div>
  );

  if(step==="sent")return(
    <div className="auth-wrap">
      <div className="auth-card">
        <div style={{textAlign:"center",marginBottom:"1rem"}}>
          <div style={{fontSize:"2.5rem",marginBottom:8}}>\u2709\ufe0f</div>
          <h2 style={{fontFamily:"'Playfair Display',serif",color:C.navy,marginBottom:6}}>Check your inbox</h2>
          <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".95rem",color:C.slateL,fontStyle:"italic",lineHeight:1.65}}>We sent your access code to<br/><strong style={{color:C.navy,fontStyle:"normal"}}>{email}</strong></p>
        </div>
        <div style={{background:"#eef4ee",borderRadius:9,padding:"12px 14px",marginBottom:"1.1rem",borderLeft:"3px solid #7a8f6f"}}>
          <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".9rem",color:C.navy,lineHeight:1.65,margin:0}}>Complete your $24 founding membership in the email, then return here and enter your access code.</p>
        </div>
        <button onClick={()=>setStep("access")} className="btn btn-sage btn-full" style={{padding:"12px",fontSize:".8rem"}}>I have my code \u2192</button>
        <button onClick={()=>setStep("welcome")} style={{display:"block",width:"100%",marginTop:8,background:"none",border:"none",fontFamily:"'Lato',sans-serif",fontSize:".72rem",color:C.slateL,cursor:"pointer",textAlign:"center"}}>\u2190 Back</button>
      </div>
    </div>
  );

  // access step
  return(
    <div className="auth-wrap">
      <div className="auth-card">
        <div style={{textAlign:"center",marginBottom:"1rem"}}>
          <h2 style={{fontFamily:"'Playfair Display',serif",color:C.navy,marginBottom:4}}>Enter your code</h2>
          <p className="auth-sub">From your welcome email</p>
        </div>
        <form onSubmit={handleCodeSubmit}>
          <div className="field">

            {error&&<div style={{color:C.red,fontFamily:"'Lato',sans-serif",fontSize:".72rem",marginTop:5}}>{error}</div>}
          </div>

                <div className="role-opt-label">Parent</div>
                <div className="role-opt-desc">Plan lessons, manage the day</div>
              </div>
              <div className={"role-opt "+(role==="student"?"sel":"")} onClick={()=>setRole("student")}>
                <div className="role-opt-icon">\U0001f4d6</div>
                <div className="role-opt-label">Student</div>
                <div className="role-opt-desc">Check off work, journal</div>
              </div>
            </div>
          </div>
          <button type="submit" className="btn btn-sage btn-full" style={{padding:"12px",fontSize:".8rem"}}>Enter the Planner \u2192</button>
        </form>

      </div>
    </div>
  );
}

// ── TRELLO CARD ───────────────────────────────────────────────────────────────
function TrelloCard({block,col,editMode,isDragging,onDragStart,onDragOver,onDrop,onDragEnd,onToggleCheck,onUpdateTime,onUpdateType,onUpdateItem,onAddItem,onRemoveItem,onRemove}){
  const [collapsed,setCollapsed]=useState(false);
  const [editingTime,setEditingTime]=useState(false);
  const [timeVal,setTimeVal]=useState(block.time);
  const [showTypeMenu,setShowTypeMenu]=useState(false);
  useEffect(()=>{setTimeVal(block.time);},[block.time]);
  const doneCount=block.items.filter((_,i)=>block.checks[i]).length;
  const totalCount=block.items.length;
  const allDone=doneCount===totalCount&&totalCount>0;
  return(
    <div draggable={editMode} onDragStart={editMode?onDragStart:undefined} onDragOver={onDragOver} onDrop={onDrop} onDragEnd={onDragEnd}
      style={{background:col.bg,border:`1.5px solid ${col.border}`,borderRadius:8,marginBottom:6,opacity:isDragging?.35:allDone?.7:1,cursor:editMode?"grab":"default",boxShadow:isDragging?"none":"0 1px 4px rgba(0,0,0,.08)",overflow:"hidden",userSelect:"none"}}>
      <div style={{background:col.border,padding:"5px 8px",display:"flex",alignItems:"center",gap:6}}>
        {editMode&&<span style={{color:"rgba(255,255,255,.55)",fontSize:13,cursor:"grab",flexShrink:0}}>\u28bf</span>}
        <div style={{flex:1,minWidth:0,position:"relative"}}>
          {editMode?(
            <>
              <button onClick={()=>setShowTypeMenu(m=>!m)} style={{background:"rgba(255,255,255,.18)",border:"none",borderRadius:4,padding:"2px 7px",cursor:"pointer",fontSize:11,color:"rgba(255,255,255,.95)",fontFamily:"'Cormorant Garamond',serif",fontWeight:600,letterSpacing:".04em",whiteSpace:"nowrap"}}>{BLOCK_TYPES[block.type]?.label||block.type} \u25be</button>
              {showTypeMenu&&(
                <div style={{position:"absolute",left:0,top:"100%",zIndex:50,background:C.white,border:`1px solid ${C.border}`,borderRadius:8,boxShadow:"0 6px 20px rgba(0,0,0,.18)",overflow:"hidden",minWidth:150}}>
                  {Object.entries(BLOCK_TYPES).map(([key,tc])=>(
                    <div key={key} onClick={()=>{onUpdateType(key);setShowTypeMenu(false);}} style={{padding:"7px 13px",fontSize:12,cursor:"pointer",color:tc.text,background:tc.bg,borderBottom:`1px solid ${C.borderL}`,fontFamily:"'Cormorant Garamond',serif"}}>{tc.label}</div>
                  ))}
                </div>
              )}
            </>
          ):(
            <span style={{fontSize:11,color:"rgba(255,255,255,.85)",fontFamily:"'Cormorant Garamond',serif",fontWeight:600,letterSpacing:".05em",textTransform:"uppercase"}}>{BLOCK_TYPES[block.type]?.label||block.type}</span>
          )}
        </div>
        {totalCount>0&&<span style={{fontSize:10,color:"rgba(255,255,255,.75)",flexShrink:0}}>{doneCount}/{totalCount}</span>}
        <button onClick={()=>setCollapsed(c=>!c)} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,.8)",fontSize:12,padding:"0 1px",lineHeight:1,flexShrink:0}}>{collapsed?"\u25b6":"\u25bc"}</button>
        {editMode&&<button onClick={onRemove} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,.55)",fontSize:14,padding:"0 1px",lineHeight:1,flexShrink:0}}>\u2715</button>}
      </div>
      <div style={{background:"rgba(0,0,0,.08)",padding:"3px 10px",borderBottom:`1px solid ${col.border}44`}}>
        {editingTime?(
          <input autoFocus value={timeVal} onChange={e=>setTimeVal(e.target.value)} onBlur={()=>{onUpdateTime(timeVal);setEditingTime(false);}} onKeyDown={e=>{if(e.key==="Enter"){onUpdateTime(timeVal);setEditingTime(false);}}} style={{background:"transparent",border:"none",outline:"none",fontSize:11,color:col.text,width:"100%",fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic"}}/>
        ):(
          <span onClick={editMode?()=>{setTimeVal(block.time);setEditingTime(true);}:undefined} style={{fontSize:11,color:col.text,opacity:.75,fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",cursor:editMode?"text":"default",borderBottom:editMode?`1px dashed ${col.border}`:"none",display:"inline-block"}}>{block.time||(editMode?<span style={{opacity:.45}}>+ add time</span>:"\u2014")}</span>
        )}
      </div>
      {!collapsed&&(
        <div style={{padding:"6px 8px 7px"}}>
          {block.items.map((item,idx)=>(
            <div key={idx} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"4px 0",borderBottom:idx<block.items.length-1?`1px solid ${col.border}22`:"none"}}>
              <div onClick={()=>onToggleCheck(idx)} style={{width:15,height:15,borderRadius:3,flexShrink:0,marginTop:2,cursor:"pointer",border:`1.5px solid ${block.checks[idx]?col.border:C.border}`,background:block.checks[idx]?col.border:C.white,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>
                {block.checks[idx]&&<span style={{color:C.white,fontSize:9,lineHeight:1}}>\u2713</span>}
              </div>
              {editMode?(
                <input value={item} onChange={e=>onUpdateItem(idx,e.target.value)} style={{flex:1,minWidth:0,background:"transparent",border:"none",borderBottom:`1px dashed ${col.border}`,fontSize:12,color:col.text,padding:"0 2px",outline:"none",fontFamily:"'Cormorant Garamond',serif",lineHeight:1.4}}/>
              ):(
                <span style={{flex:1,minWidth:0,fontSize:12,color:col.text,lineHeight:1.4,wordBreak:"break-word",textDecoration:block.checks[idx]?"line-through":"none",opacity:block.checks[idx]?.5:1,fontFamily:"'Cormorant Garamond',serif"}}>{item}</span>
              )}
              {editMode&&<button onClick={()=>onRemoveItem(idx)} style={{background:"none",border:"none",cursor:"pointer",color:col.border,fontSize:13,padding:0,flexShrink:0,lineHeight:1,marginTop:1}}>\u00d7</button>}
            </div>
          ))}
          {editMode&&<button onClick={onAddItem} style={{marginTop:6,background:"none",border:"none",cursor:"pointer",fontSize:11,color:col.border,fontFamily:"'Cormorant Garamond',serif",padding:"1px 0",letterSpacing:".04em",display:"block"}}>+ add item</button>}
        </div>
      )}
    </div>
  );
}

// ── TRELLO BOARD ──────────────────────────────────────────────────────────────
function TrelloBoard({schedule,editMode,onToggleCheck,onMoveBlock,onAddBlock,onRemoveBlock,onUpdateTime,onUpdateType,onUpdateItem,onAddItem,onRemoveItem,onClearDay,onCheckAll,onDayClick,onReset}){
  const today=todayName();
  const drag=useRef(null);
  const [dragOver,setDragOver]=useState(null);
  function handleDragStart(e,day,idx){drag.current={day,idx};e.dataTransfer.effectAllowed="move";}
  function handleDragOver(e,day,idx){e.preventDefault();if(!drag.current)return;if(dragOver?.day!==day||dragOver?.idx!==idx)setDragOver({day,idx});}
  function handleDrop(e,toDay,toIdx){e.preventDefault();if(!drag.current)return;const{day:fromDay,idx:fromIdx}=drag.current;if(fromDay===toDay&&fromIdx===toIdx){drag.current=null;setDragOver(null);return;}onMoveBlock(fromDay,fromIdx,toDay,toIdx);drag.current=null;setDragOver(null);}
  function handleDragEnd(){drag.current=null;setDragOver(null);}
  return(
    <div style={{padding:"12px 10px 32px",overflowX:"auto"}}>
      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10,alignItems:"center"}}>
        {Object.entries(BLOCK_TYPES).map(([key,col])=>(
          <div key={key} style={{background:col.bg,border:`1px solid ${col.border}`,borderRadius:14,padding:"2px 9px"}}>
            <span style={{fontSize:10,color:col.text,fontFamily:"'Cormorant Garamond',serif"}}>{col.label}</span>
          </div>
        ))}
        {editMode&&<span style={{fontSize:11,color:C.gold,fontStyle:"italic",marginLeft:4}}>\u270e Drag cards to reorder</span>}
        {editMode&&<button onClick={onReset} style={{background:"none",border:`1px solid ${C.red}`,color:C.red,borderRadius:6,padding:"3px 10px",cursor:"pointer",fontFamily:"'Lato',sans-serif",fontSize:10,marginLeft:"auto"}}>\u21ba Reset to default</button>}
      </div>
      <div style={{fontFamily:"'Lato',sans-serif",fontSize:".62rem",textTransform:"uppercase",letterSpacing:".1em",color:C.slateL,marginBottom:8}}>{formatWeekRange()}</div>
      <div style={{display:"flex",gap:8,alignItems:"flex-start",minWidth:680}}>
        {DAYS.map((day,di)=>{
          const blocks=schedule[day]||[];
          const isToday=day===today;
          const{done,total}=dayProgress(blocks);
          return(
            <div key={day} style={{flex:1,minWidth:0,display:"flex",flexDirection:"column"}}>
              <div onClick={()=>onDayClick(day)} style={{background:isToday?C.gold:C.navy,borderRadius:"10px 10px 0 0",padding:"10px 8px",cursor:"pointer",userSelect:"none",textAlign:"center"}}>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:13,fontWeight:700,color:isToday?C.navy:C.cream}}>{SHORT[di]}</div>
                <div style={{fontSize:10,color:isToday?C.navyL:C.sageL,marginTop:1}}>{day}</div>
                {isToday&&<div style={{fontSize:8,letterSpacing:".12em",color:C.navyL,textTransform:"uppercase",marginTop:1}}>Today</div>}
                {total>0&&(
                  <div style={{marginTop:4}}>
                    <div style={{background:"rgba(255,255,255,.22)",borderRadius:4,height:3,overflow:"hidden"}}>
                      <div style={{background:isToday?C.navy:C.gold,height:"100%",borderRadius:4,transition:"width .3s",width:`${(done/total)*100}%`}}/>
                    </div>
                    <div style={{fontSize:9,color:isToday?C.navy:C.goldL,marginTop:2}}>{done}/{total}</div>
                  </div>
                )}
              </div>
              <div style={{background:isToday?"rgba(201,168,76,.06)":C.creamy,borderLeft:`1px solid ${C.border}`,borderRight:`1px solid ${C.border}`,padding:"3px 6px",display:"flex",gap:5,justifyContent:"flex-end"}}>
                <button onClick={()=>onCheckAll(day)} style={{background:"none",border:"none",fontSize:10,color:C.sage,cursor:"pointer",fontFamily:"'Cormorant Garamond',serif",padding:"1px 3px"}}>\u2713 all</button>
                <button onClick={()=>onClearDay(day)} style={{background:"none",border:"none",fontSize:10,color:C.slateL,cursor:"pointer",fontFamily:"'Cormorant Garamond',serif",padding:"1px 3px"}}>\u21ba clear</button>
              </div>
              <div onDragOver={e=>{e.preventDefault();setDragOver({day,idx:blocks.length});}} onDrop={e=>handleDrop(e,day,blocks.length)}
                style={{background:isToday?"rgba(201,168,76,.03)":C.white,border:`1px solid ${C.border}`,borderTop:"none",borderRadius:"0 0 10px 10px",padding:"5px 5px 7px",minHeight:100,flex:1}}>
                {blocks.map((block,idx)=>{
                  const col=BLOCK_TYPES[block.type]||BLOCK_TYPES.life;
                  const isDragTarget=dragOver?.day===day&&dragOver?.idx===idx;
                  const isDragging=drag.current?.day===day&&drag.current?.idx===idx;
                  return(
                    <div key={block.id}>
                      {isDragTarget&&<div style={{height:3,background:C.gold,borderRadius:4,margin:"2px 0"}}/>}
                      <TrelloCard block={block} col={col} editMode={editMode} isDragging={isDragging}
                        onDragStart={e=>handleDragStart(e,day,idx)} onDragOver={e=>handleDragOver(e,day,idx)}
                        onDrop={e=>handleDrop(e,day,idx)} onDragEnd={handleDragEnd}
                        onToggleCheck={ii=>onToggleCheck(day,block.id,ii)}
                        onUpdateTime={t=>onUpdateTime(day,block.id,t)} onUpdateType={t=>onUpdateType(day,block.id,t)}
                        onUpdateItem={(i,v)=>onUpdateItem(day,block.id,i,v)} onAddItem={()=>onAddItem(day,block.id)}
                        onRemoveItem={i=>onRemoveItem(day,block.id,i)} onRemove={()=>onRemoveBlock(day,block.id)}/>
                    </div>
                  );
                })}
                {dragOver?.day===day&&dragOver?.idx===blocks.length&&<div style={{height:3,background:C.gold,borderRadius:4,margin:"3px 0"}}/>}
                {editMode&&<button onClick={()=>onAddBlock(day)} style={{width:"100%",marginTop:5,background:"none",border:`1px dashed ${C.border}`,borderRadius:7,padding:"6px",fontSize:11,color:C.slateL,cursor:"pointer",fontFamily:"'Cormorant Garamond',serif"}}>+ add block</button>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── DAY VIEW ──────────────────────────────────────────────────────────────────

          {focusDay===today&&<div style={{fontSize:10,color:C.gold,letterSpacing:".1em",textTransform:"uppercase"}}>Today</div>}
        </div>
        <div style={{display:"flex",gap:7}}>
          <button onClick={()=>onCheckAll(focusDay)} style={{background:C.sagePale,border:`1px solid ${C.sage}`,color:C.sage,borderRadius:6,padding:"5px 11px",cursor:"pointer",fontSize:12,fontFamily:"'Cormorant Garamond',serif"}}>\u2713 All</button>

          </div>
          <div style={{background:C.borderL,borderRadius:8,height:8,overflow:"hidden"}}>
            <div style={{background:done===total?C.sage:C.gold,height:"100%",borderRadius:8,transition:"width .4s",width:`${(done/total)*100}%`}}/>
          </div>
        </div>
      )}
      {blocks.map(block=>{
        const col=BLOCK_TYPES[block.type]||BLOCK_TYPES.life;
        return(
          <TrelloCard key={block.id} block={block} col={col} editMode={editMode} isDragging={false}
            onDragStart={()=>{}} onDragOver={()=>{}} onDrop={()=>{}} onDragEnd={()=>{}}
            onToggleCheck={ii=>onToggleCheck(focusDay,block.id,ii)}
            onUpdateTime={t=>onUpdateTime(focusDay,block.id,t)} onUpdateType={t=>onUpdateType(focusDay,block.id,t)}
            onUpdateItem={(i,v)=>onUpdateItem(focusDay,block.id,i,v)} onAddItem={()=>onAddItem(focusDay,block.id)}
            onRemoveItem={i=>onRemoveItem(focusDay,block.id,i)} onRemove={()=>onRemoveBlock(focusDay,block.id)}/>
        );
      })}
      {editMode&&<button onClick={()=>onAddBlock(focusDay)} style={{width:"100%",marginTop:8,background:"none",border:`1px dashed ${C.border}`,borderRadius:8,padding:"9px",fontSize:13,color:C.slateL,cursor:"pointer",fontFamily:"'Cormorant Garamond',serif"}}>+ add block</button>}
      {done===total&&total>0&&(
        <div style={{marginTop:18,textAlign:"center",padding:"22px",background:C.sagePale,borderRadius:12,border:`1px solid ${C.sageL}`}}>
          <div style={{fontSize:34,marginBottom:6}}>\U0001f33f</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:19,color:C.navy}}>{focusDay} complete!</div>
          <div style={{fontSize:13,color:C.slate,fontStyle:"italic",marginTop:3}}>Beauty. Meaning. Connection.</div>
        </div>
      )}
    </div>
  );
}

// ── STUDENTS TAB ──────────────────────────────────────────────────────────────

            )}
          </div>
        );
      })}
    </div>
  );
}

// ── STUDENT DASHBOARD ─────────────────────────────────────────────────────────
function StudentDashboard({student,schedule,onToggle,onBack}){
  const today=todayName();
  const [view,setView]=useState("today");
  const done=totalCompleted(student),badges=getBadges(done),next=nextBadge(done);
  const LOOP_TYPES={beauty:["beauty"],math:["math"],language:["language","morning"],core:["core","nature"]};
  function getStudentBlocks(day){return(schedule[day]||[]).filter(b=>student.loops.some(lid=>(LOOP_TYPES[lid]||[]).includes(b.type)));}
  const todayBlocks=getStudentBlocks(today);
  const todayItems=todayBlocks.flatMap(b=>b.items.map((_,ii)=>({item:b.items[ii],key:`${today}|${b.id}|${ii}`})));
  const totalToday=todayItems.length,doneToday=todayItems.filter(({key})=>student.completions[key]).length;
  return(
    <div style={{minHeight:"100vh",background:C.cream}}>
      <div style={{background:C.navy,padding:"16px 16px 22px"}}>
        <button onClick={onBack} style={{background:"none",border:`1px solid ${C.sageL}`,color:C.sageL,borderRadius:6,padding:"4px 11px",cursor:"pointer",fontFamily:"'Cormorant Garamond',serif",fontSize:11,marginBottom:12}}>\u2190 Back</button>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
          <div style={{width:46,height:46,borderRadius:"50%",background:C.navyL,border:`2px solid ${C.gold}`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Playfair Display',serif",fontSize:20,color:C.goldL,flexShrink:0}}>{student.name[0]}</div>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:21,color:C.cream}}>{student.name}'s Day</div>
            <div style={{fontSize:11,color:C.sageL,fontStyle:"italic",marginTop:2}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
          </div>
        </div>
        {totalToday>0&&(
          <>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:12,color:C.sageL}}>Today's Progress</span>
              <span style={{fontSize:12,color:C.goldL,fontWeight:600}}>{doneToday}/{totalToday}</span>
            </div>
            <div style={{background:"rgba(255,255,255,.12)",borderRadius:8,height:7,overflow:"hidden"}}>
              <div style={{background:C.gold,height:"100%",borderRadius:8,transition:"width .5s",width:`${totalToday?(doneToday/totalToday)*100:0}%`}}/>
            </div>
          </>
        )}
        {badges.length>0&&(
          <div style={{display:"flex",gap:6,marginTop:9,flexWrap:"wrap"}}>
            {badges.map(b=><div key={b.label} style={{background:"rgba(201,168,76,.22)",border:`1px solid ${C.gold}`,borderRadius:20,padding:"2px 10px",fontSize:11,color:C.goldL}}>{b.emoji} {b.label}</div>)}
          </div>
        )}
        {next&&done>0&&<div style={{fontSize:11,color:C.slateL,marginTop:4,fontStyle:"italic"}}>{next.count-done} more to earn {next.emoji} {next.label}</div>}
      </div>
      <div style={{display:"flex",background:C.white,borderBottom:`1px solid ${C.borderL}`}}>
        {[["today","\U0001f4d6 Today"],["week","\U0001f4c5 This Week"]].map(([key,label])=>(
          <button key={key} onClick={()=>setView(key)} style={{flex:1,padding:"11px",border:"none",background:"none",cursor:"pointer",fontFamily:"'Cormorant Garamond',serif",fontSize:14,color:view===key?C.navy:C.slate,fontWeight:view===key?600:400,borderBottom:view===key?`3px solid ${C.gold}`:"3px solid transparent"}}>{label}</button>
        ))}
      </div>
      <div style={{padding:"12px 12px 28px"}}>
        {view==="today"&&(
          <div>
            {todayBlocks.length===0&&<div style={{textAlign:"center",color:C.slateL,fontStyle:"italic",padding:"24px 0",fontFamily:"'Cormorant Garamond',serif"}}>No lessons assigned for today.</div>}
            {todayBlocks.map(block=>{
              const col=BLOCK_TYPES[block.type]||BLOCK_TYPES.life;
              return(
                <div key={block.id} style={{background:col.bg,border:`1.5px solid ${col.border}`,borderRadius:10,marginBottom:9,overflow:"hidden"}}>
                  <div style={{background:col.border,padding:"5px 11px"}}>
                    <span style={{fontSize:11,color:"rgba(255,255,255,.9)",fontFamily:"'Cormorant Garamond',serif"}}>{block.time&&`${block.time} \u00b7 `}{BLOCK_TYPES[block.type]?.label}</span>
                  </div>
                  <div style={{padding:"5px 9px"}}>
                    {block.items.map((item,ii)=>{
                      const key=`${today}|${block.id}|${ii}`;
                      const checked=!!student.completions[key];
                      return(
                        <div key={ii} onClick={()=>onToggle(key)} style={{display:"flex",alignItems:"center",gap:9,padding:"6px 3px",cursor:"pointer",borderRadius:6,borderBottom:ii<block.items.length-1?`1px solid ${col.border}22`:"none"}}>
                          <div style={{width:19,height:19,borderRadius:"50%",flexShrink:0,border:`1.5px solid ${checked?col.border:C.border}`,background:checked?col.border:C.white,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}>
                            {checked&&<span style={{color:C.white,fontSize:10}}>\u2713</span>}
                          </div>
                          <span style={{fontFamily:"'Playfair Display',serif",fontSize:14,color:C.navy,textDecoration:checked?"line-through":"none",opacity:checked?.5:1}}>{item}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
            {doneToday===totalToday&&totalToday>0&&(
              <div style={{marginTop:14,textAlign:"center",padding:"20px",background:C.sagePale,borderRadius:12,border:`1px solid ${C.sageL}`}}>
                <div style={{fontSize:32,marginBottom:6}}>\U0001f389</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:C.navy}}>All done, {student.name}!</div>
                <div style={{fontSize:13,color:C.slate,fontStyle:"italic",marginTop:2}}>Beauty. Meaning. Connection.</div>
              </div>
            )}
          </div>
        )}
        {view==="week"&&(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {DAYS.map(day=>{
              const isToday=day===today;
              const dayBlocks=getStudentBlocks(day);
              const items=dayBlocks.flatMap(b=>b.items.map((item,ii)=>({item,key:`${day}|${b.id}|${ii}`})));
              const d=items.filter(({key})=>student.completions[key]).length;
              return(
                <div key={day} style={{background:C.white,border:isToday?`2px solid ${C.gold}`:`1px solid ${C.border}`,borderRadius:10,padding:"10px 12px",boxShadow:isToday?`0 2px 8px rgba(201,168,76,.18)`:"none"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:items.length?7:0}}>
                    <span style={{fontFamily:"'Playfair Display',serif",fontSize:13,color:C.navy}}>{day}{isToday&&<span style={{fontSize:10,color:C.gold,fontStyle:"italic",marginLeft:5}}> \u00b7 Today</span>}</span>
                    <span style={{fontSize:11,color:d===items.length&&items.length>0?C.sage:C.slateL}}>{d}/{items.length}{d===items.length&&items.length>0?" \u2713":""}</span>
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    {items.map(({item,key})=>{
                      const checked=!!student.completions[key];
                      return(
                        <div key={key} onClick={()=>onToggle(key)} style={{background:checked?C.sagePale:C.creamy,border:`1px solid ${checked?C.sage:C.border}`,borderRadius:16,padding:"3px 10px",fontSize:12,color:checked?C.navy:C.slate,cursor:"pointer",textDecoration:checked?"line-through":"none",display:"flex",alignItems:"center",gap:4,fontFamily:"'Cormorant Garamond',serif",transition:"all .15s"}}>
                          {checked&&<span style={{color:C.sage,fontSize:10}}>\u2713</span>}
                          {item}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [authUser,setAuthUser]=useState(()=>getStoredUser());
  const [tab,setTab]=useState("trello");
  const [schedule,setSchedule]=useState(()=>makeInitialSchedule());
  const [students,setStudents]=useState(()=>makeDefaultStudents());
  const [activeStudentId,setActiveStudentId]=useState(null);
  const [newStudentName,setNewStudentName]=useState("");
  const [focusDay,setFocusDay]=useState(()=>todayName());
  const [editMode,setEditMode]=useState(false);

  // Load saved data
  useEffect(()=>{
    if(!authUser)return;
    const data=loadData(authUser.id);
    if(data){
      if(data.schedule)setSchedule(data.schedule);
      if(data.students)setStudents(data.students);
    }
  },[authUser?.id]);

  // Auto-save
  const saveTimer=useRef(null);
  useEffect(()=>{
    if(!authUser)return;
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{saveData(authUser.id,{schedule,students});},1500);
    return()=>{if(saveTimer.current)clearTimeout(saveTimer.current);};
  },[schedule,students,authUser?.id]);

  function handleAuth(user){setAuthUser(user);}
  function handleLogout(){clearStoredUser();setAuthUser(null);}

  if(!authUser)return <AuthScreen onAuth={handleAuth}/>;

  // ── Schedule mutations ──
  function toggleCheck(day,blockId,itemIdx){setSchedule(s=>({...s,[day]:s[day].map(b=>b.id!==blockId?b:{...b,checks:{...b.checks,[itemIdx]:!b.checks[itemIdx]}})}))}
  function clearDay(day){setSchedule(s=>({...s,[day]:s[day].map(b=>({...b,checks:{}}))}))}
  function checkAllDay(day){setSchedule(s=>({...s,[day]:s[day].map(b=>{const checks={};b.items.forEach((_,i)=>{checks[i]=true;});return{...b,checks};})}))}
  function updateTime(day,blockId,time){setSchedule(s=>({...s,[day]:s[day].map(b=>b.id!==blockId?b:{...b,time})}))}
  function updateType(day,blockId,type){setSchedule(s=>({...s,[day]:s[day].map(b=>b.id!==blockId?b:{...b,type})}))}
  function updateItem(day,blockId,idx,val){setSchedule(s=>({...s,[day]:s[day].map(b=>{if(b.id!==blockId)return b;const items=[...b.items];items[idx]=val;return{...b,items};})}))}
  function addItem(day,blockId){setSchedule(s=>({...s,[day]:s[day].map(b=>b.id!==blockId?b:{...b,items:[...b.items,""]})}))}
  function removeItem(day,blockId,idx){setSchedule(s=>({...s,[day]:s[day].map(b=>{if(b.id!==blockId)return b;const items=b.items.filter((_,i)=>i!==idx);const checks={};Object.entries(b.checks).forEach(([k,v])=>{const n=Number(k);if(n<idx)checks[k]=v;else if(n>idx)checks[String(n-1)]=v;});return{...b,items,checks};})}))}
  function addBlock(day){setSchedule(s=>({...s,[day]:[...s[day],{id:uid(),time:"",type:"life",items:["New item"],checks:{}}]}))}
  function removeBlock(day,blockId){setSchedule(s=>({...s,[day]:s[day].filter(b=>b.id!==blockId)}))}
  function moveBlock(fromDay,fromIdx,toDay,toIdx){setSchedule(s=>{const n=cloneSched(s);const[block]=n[fromDay].splice(fromIdx,1);n[toDay].splice(toIdx,0,block);return n;})}
  function resetSchedule(){if(window.confirm('Reset to default schedule? Your saved data will be cleared for this user.')){setSchedule(makeInitialSchedule());setStudents(makeDefaultStudents());}}

  // ── Students ──
  function addStudent(){if(!newStudentName.trim())return;setStudents(ss=>[...ss,{id:String(Date.now()),name:newStudentName.trim(),loops:["math","language"],completions:{}}]);setNewStudentName("");}
  function removeStudent(id){setStudents(ss=>ss.filter(s=>s.id!==id));}
  function toggleStudentLoop(id,loopId){setStudents(ss=>ss.map(s=>s.id!==id?s:{...s,loops:s.loops.includes(loopId)?s.loops.filter(l=>l!==loopId):[...s.loops,loopId]}))}
  function toggleCompletion(studentId,key){setStudents(ss=>ss.map(s=>s.id!==studentId?s:{...s,completions:{...s.completions,[key]:!s.completions[key]}}))}

  const sharedProps={schedule,editMode,onToggleCheck:toggleCheck,onMoveBlock:moveBlock,onAddBlock:addBlock,onRemoveBlock:removeBlock,onUpdateTime:updateTime,onUpdateType:updateType,onUpdateItem:updateItem,onAddItem:addItem,onRemoveItem:removeItem,onClearDay:clearDay,onCheckAll:checkAllDay};

  return(
    <div style={{fontFamily:"'Cormorant Garamond',serif",background:C.cream,minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:C.navy,padding:"11px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,.2)"}}>
        <div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:C.cream,letterSpacing:".03em"}}>Living <em style={{color:"#a8c5aa"}}>Rhythm</em></div>
          <div style={{fontSize:9,color:C.sageL,letterSpacing:".15em",textTransform:"uppercase",marginTop:1}}>{formatWeekRange()} \u00b7 Delight &amp; Savor</div>
        </div>
        <div style={{display:"flex",gap:7,alignItems:"center"}}>
          {(tab==="trello"||tab==="day")&&(
            <button onClick={()=>setEditMode(e=>!e)} style={{background:editMode?C.gold:"none",border:`1px solid ${editMode?C.gold:C.sageL}`,color:editMode?C.navy:C.sageL,borderRadius:6,padding:"5px 12px",cursor:"pointer",fontFamily:"'Cormorant Garamond',serif",fontSize:12,letterSpacing:".04em",transition:"all .2s"}}>
              {editMode?"\u2713 Done":"\u270e Edit"}
            </button>
          )}
          <div style={{fontFamily:"'Lato',sans-serif",fontSize:".6rem",color:C.sageL,letterSpacing:".06em"}}>{authUser.name}</div>
          <button onClick={handleLogout} style={{background:"none",border:`1px solid ${C.sageL}`,color:C.sageL,borderRadius:6,padding:"5px 10px",cursor:"pointer",fontFamily:"'Lato',sans-serif",fontSize:10,letterSpacing:".04em"}}>Sign out</button>
        </div>
      </div>

      {/* Tab bar */}
      {tab!=="dashboard"&&(
        <div style={{display:"flex",background:C.white,borderBottom:`2px solid ${C.borderL}`,padding:"0 14px",overflowX:"auto"}}>
          {[["trello","\U0001f4cb Weekly"],["day","\U0001f4d6 Day View"],["students","\U0001f46a Students"]].map(([key,label])=>(
            <button key={key} onClick={()=>setTab(key)} style={{fontFamily:"'Cormorant Garamond',serif",fontSize:14,letterSpacing:".04em",fontWeight:tab===key?600:400,color:tab===key?C.navy:C.slate,padding:"11px 14px",border:"none",background:"none",cursor:"pointer",borderBottom:tab===key?`3px solid ${C.gold}`:"3px solid transparent",marginBottom:-2,whiteSpace:"nowrap"}}>
              {label}
            </button>
          ))}
        </div>
      )}

      {tab==="trello"&&<TrelloBoard {...sharedProps} onDayClick={day=>{setFocusDay(day);setTab("day");}} onReset={resetSchedule}/>}
      {tab==="day"&&<DayView focusDay={focusDay} setFocusDay={setFocusDay} {...sharedProps}/>}
      {tab==="students"&&<StudentsTab students={students} newStudentName={newStudentName} setNewStudentName={setNewStudentName} addStudent={addStudent} removeStudent={removeStudent} toggleStudentLoop={toggleStudentLoop} onOpenDashboard={id=>{setActiveStudentId(id);setTab("dashboard");}}/>}
      {tab==="dashboard"&&students.find(s=>s.id===activeStudentId)&&<StudentDashboard student={students.find(s=>s.id===activeStudentId)} schedule={schedule} onToggle={key=>toggleCompletion(activeStudentId,key)} onBack={()=>{setTab("students");setActiveStudentId(null);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
