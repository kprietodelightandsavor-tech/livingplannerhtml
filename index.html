<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Living Rhythm"/>
<meta name="theme-color" content="#2c3650"/>
<title>Living Rhythm Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --sage:#7a8f6f;--sage-lt:#b5c4a8;--sage-bg:#eef2ea;
  --cream:#faf6ee;--gold:#C29B61;--gold-lt:#f0e0bc;--gold-bg:#fdf5e8;
  --navy:#2c3e50;--navy-lt:#4a5f73;--ink:#2C2C2C;--muted:#7a7163;
  --white:#fff;--red:#c0392b;--lilac:#e8edf3;
  --r:12px;--sh:0 2px 16px rgba(44,44,44,.09);--sh-lg:0 8px 40px rgba(44,44,44,.14);
}
html,body{height:100%;overflow-x:hidden;-webkit-text-size-adjust:100%;}
body{font-family:'Cormorant Garamond',serif;background:var(--cream);color:var(--ink);}
h1,h2,h3,h4{font-family:'Playfair Display',serif;line-height:1.2;}
.app{display:flex;flex-direction:column;min-height:100vh;}
.hdr{background:var(--navy);padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:300;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.hdr-brand{display:flex;align-items:center;gap:9px;}
.brand-name{font-family:'Playfair Display',serif;font-size:1rem;color:var(--cream);}
.brand-name em{color:var(--gold);font-style:italic;}
.hdr-right{display:flex;align-items:center;gap:6px;}
.tier{font-family:'Lato',sans-serif;font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;padding:3px 8px;border-radius:20px;font-weight:700;}
.tier.pro{background:var(--gold);color:var(--navy);}
.tier.free{background:rgba(255,255,255,.12);color:var(--sage-lt);}
.mode-toggle{display:flex;background:rgba(255,255,255,.1);border-radius:20px;padding:2px;}
.mode-btn{padding:4px 10px;border-radius:18px;border:none;cursor:pointer;font-family:'Lato',sans-serif;font-size:.65rem;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.6);background:none;transition:all .2s;}
.mode-btn.active{background:var(--gold);color:var(--navy);font-weight:700;}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--sage-bg);display:flex;z-index:300;box-shadow:0 -3px 16px rgba(0,0,0,.07);}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 2px 10px;background:none;border:none;cursor:pointer;color:var(--muted);font-family:'Lato',sans-serif;font-size:.52rem;text-transform:uppercase;letter-spacing:.05em;gap:3px;transition:color .15s;}
.bnav-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.bnav-btn.active{color:var(--sage);}
.main{flex:1;padding:1.1rem .9rem 90px;max-width:860px;margin:0 auto;width:100%;}
.main-wide{flex:1;padding:0 0 90px;width:100%;}
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:.9rem;}
.card-hdr{padding:.85rem 1.1rem .7rem;border-bottom:1px solid var(--sage-bg);display:flex;align-items:center;gap:9px;}
.card-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;color:var(--sage);}
.card-icon svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.ci-sage{background:var(--sage-bg);color:var(--sage);}
.ci-gold{background:var(--gold-lt);color:var(--gold);}
.ci-lilac{background:var(--lilac);color:var(--navy-lt);}
.card-ttl{font-size:.95rem;color:var(--navy);}
.card-sub{font-family:'Lato',sans-serif;font-size:.69rem;color:var(--muted);margin-top:1px;}
.card-body{padding:.9rem 1.1rem;}
.card-foot{padding:.7rem 1.1rem;border-top:1px solid var(--sage-bg);display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'Lato',sans-serif;font-size:.73rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;transition:all .18s;flex-shrink:0;text-decoration:none;}
.btn-sage{background:var(--sage);color:#fff;}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid #ddd8ce;}
.btn-lilac{background:var(--lilac);color:var(--navy-lt);}
.btn-danger{background:transparent;color:var(--red);border:1.5px solid #ddd;}
.btn-sm{padding:5px 10px;font-size:.68rem;}
.btn-xs{padding:3px 7px;font-size:.63rem;}
.btn-full{width:100%;justify-content:center;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.field{margin-bottom:.8rem;}
.field label{display:block;font-family:'Lato',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.field input,.field select,.field textarea{width:100%;border:1.5px solid #ddd8ce;border-radius:7px;padding:7px 10px;font-family:'Cormorant Garamond',serif;font-size:.96rem;color:var(--ink);background:var(--cream);outline:none;transition:border-color .2s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--sage);}
.field textarea{resize:vertical;min-height:70px;}
.pills{display:flex;flex-wrap:wrap;gap:5px;}
.pill{padding:4px 10px;border-radius:20px;cursor:pointer;font-family:'Lato',sans-serif;font-size:.7rem;border:1.5px solid #ddd8ce;background:var(--cream);color:var(--muted);transition:all .15s;white-space:nowrap;}
.pill.on{background:var(--sage);border-color:var(--sage);color:#fff;}
.pill.gold-on{background:var(--gold);border-color:var(--gold);color:var(--navy);}
.hero{text-align:center;padding:.2rem 0 1rem;}
.hero h1{font-size:clamp(1.35rem,5vw,2rem);color:var(--navy);}
.hero h1 em{color:var(--sage);font-style:italic;}
.hero p{font-size:.92rem;color:var(--muted);font-style:italic;margin-top:3px;}
.ornament{color:var(--gold);letter-spacing:.4em;font-size:.82rem;opacity:.7;margin:4px 0;}
.slbl{font-family:'Lato',sans-serif;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.5rem;}
.day-tab-row{display:flex;gap:3px;overflow-x:auto;padding-bottom:2px;margin-bottom:.9rem;}
.day-tab{padding:6px 12px;border-radius:8px;border:1.5px solid #ddd8ce;background:var(--cream);cursor:pointer;font-family:'Lato',sans-serif;font-size:.7rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);white-space:nowrap;transition:all .15s;}
.day-tab.active{background:var(--navy);border-color:var(--navy);color:var(--cream);}
.tabs{display:flex;gap:3px;margin-bottom:.9rem;border-bottom:2px solid var(--sage-bg);overflow-x:auto;}
.tab{padding:6px 12px;background:none;border:none;cursor:pointer;font-family:'Lato',sans-serif;font-size:.7rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap;}
.tab.active{color:var(--sage);border-bottom-color:var(--sage);}
.rs-panel{border:1.5px solid var(--gold-lt);border-radius:11px;background:linear-gradient(135deg,#fdf8ef,#faf6ee);margin-bottom:.85rem;overflow:hidden;}
.rs-panel-hdr{display:flex;align-items:center;gap:9px;padding:10px 13px;cursor:pointer;user-select:none;}
.rs-panel-ttl{font-family:'Playfair Display',serif;font-size:.88rem;color:var(--navy);flex:1;}
.rs-panel-meta{font-family:'Lato',sans-serif;font-size:.6rem;color:var(--muted);}
.rs-arrow{font-size:.75rem;color:var(--gold);transition:transform .22s;}
.rs-arrow.open{transform:rotate(180deg);}
.rs-body{border-top:1px solid var(--gold-lt);padding:10px 13px;}
.rs-progress{height:5px;background:var(--gold-lt);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.rs-progress-fill{height:100%;border-radius:10px;background:var(--gold);transition:width .4s ease;}
.rs-item{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid rgba(194,155,97,.15);}
.rs-item:last-child{border-bottom:none;}
.rs-check{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--gold-lt);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;transition:all .18s;font-size:.8rem;color:#fff;}
.rs-check.done{background:var(--gold);border-color:var(--gold);}
.rs-item-content{flex:1;}
.rs-item-label{font-family:'Playfair Display',serif;font-size:.85rem;color:var(--navy);}
.rs-item-label.done{color:var(--muted);text-decoration:line-through;opacity:.6;}
.rs-item-desc{font-family:'Lato',sans-serif;font-size:.67rem;color:var(--muted);font-style:italic;margin-top:1px;}
.rs-item-note{font-size:.8rem;color:var(--ink);font-style:italic;margin-top:2px;line-height:1.4;}
.rs-mini-input{flex:1;border:1px solid #ddd8ce;border-radius:5px;padding:4px 7px;font-family:'Cormorant Garamond',serif;font-size:.85rem;background:var(--white);outline:none;}
.rs-footer{border-top:1px solid var(--gold-lt);padding:8px 13px;display:flex;gap:7px;align-items:center;flex-wrap:wrap;background:rgba(194,155,97,.04);}
.rs-note-badge{font-family:'Lato',sans-serif;font-size:.6rem;background:var(--gold);color:var(--navy);padding:2px 8px;border-radius:10px;font-weight:700;}
.subj-block{border:1.5px solid var(--sage-bg);border-radius:9px;padding:9px 11px;margin-bottom:7px;background:var(--white);}
.subj-block-hdr{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.coach-box{background:var(--gold-lt);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:.7rem;color:var(--ink);font-size:.91rem;line-height:1.6;}
.cm-tip{background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:10px 13px;margin-bottom:.8rem;}
.cm-tip-lbl{font-family:'Lato',sans-serif;font-size:.62rem;text-transform:uppercase;letter-spacing:.09em;color:var(--gold);margin-bottom:3px;}
.cm-tip p{font-size:.87rem;color:var(--ink);font-style:italic;line-height:1.5;}
.he{padding:8px 0;border-bottom:1px solid var(--sage-bg);}
.he:last-child{border-bottom:none;}
.he-row{display:flex;justify-content:space-between;align-items:baseline;gap:6px;}
.he-ttl{font-size:.9rem;color:var(--navy);font-weight:600;}
.he-date{font-family:'Lato',sans-serif;font-size:.64rem;color:var(--muted);white-space:nowrap;}
.he-meta{font-family:'Lato',sans-serif;font-size:.68rem;color:var(--sage);margin-top:1px;}
.he-pre{font-size:.82rem;color:var(--muted);font-style:italic;margin-top:2px;line-height:1.4;}
.book-card{border:1.5px solid var(--sage-bg);border-radius:10px;padding:11px 13px;margin-bottom:8px;background:var(--white);}
.book-card-title{font-size:1rem;color:var(--navy);font-weight:600;margin-bottom:2px;}
.book-card-author{font-family:'Lato',sans-serif;font-size:.72rem;color:var(--muted);margin-bottom:6px;}
.book-card-desc{font-size:.87rem;color:var(--ink);font-style:italic;line-height:1.5;margin-bottom:7px;}
.book-tags{display:flex;flex-wrap:wrap;gap:4px;}
.book-tag{font-family:'Lato',sans-serif;font-size:.62rem;padding:2px 7px;border-radius:4px;}
.bt-age{background:var(--sage-bg);color:var(--sage);}
.bt-subj{background:var(--gold-lt);color:#8a6a35;}
.bt-align{background:#e8f4e8;color:#4a7a4a;}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite;}
@keyframes rot{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
.empty{text-align:center;padding:1.5rem 1rem;color:var(--muted);}
.empty-icon{font-size:1.6rem;margin-bottom:5px;display:flex;align-items:center;justify-content:center;width:36px;height:36px;margin:0 auto 8px;}
.empty-icon svg{width:28px;height:28px;stroke:currentColor;}
.empty p{font-style:italic;font-size:.85rem;}
.habit-ring-wrap{display:flex;flex-direction:column;align-items:center;padding:.75rem 0;}
.habit-streak{font-family:'Playfair Display',serif;font-size:2.8rem;color:var(--navy);line-height:1;}
.habit-streak-lbl{font-family:'Lato',sans-serif;font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-top:2px;}
.habit-check-btn{width:64px;height:64px;border-radius:50%;border:3px solid var(--sage);background:var(--white);cursor:pointer;font-size:1.6rem;display:flex;align-items:center;justify-content:center;transition:all .2s;margin:10px 0;}
.habit-check-btn.done{background:var(--sage);border-color:var(--sage);}
.habit-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:.5rem 0;}
.hcal-day{aspect-ratio:1;border-radius:4px;background:var(--sage-bg);}
.hcal-day.done{background:var(--sage);}
.hcal-day.today{outline:2px solid var(--gold);outline-offset:1px;}
.outdoor-ring{position:relative;width:140px;height:140px;flex-shrink:0;}
.outdoor-ring svg{transform:rotate(-90deg);}
.outdoor-ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.outdoor-ring-hrs{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--navy);line-height:1;}
.outdoor-ring-lbl{font-family:'Lato',sans-serif;font-size:.58rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);}
.analyzing-dots{display:flex;gap:6px;}
.analyzing-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulse 1.2s ease-in-out infinite;}
.analyzing-dot:nth-child(2){animation-delay:.2s;}
.analyzing-dot:nth-child(3){animation-delay:.4s;}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--navy) 0%,#3d5166 100%);padding:1rem;}
.auth-card{background:var(--white);border-radius:16px;padding:2rem 1.6rem;max-width:360px;width:100%;box-shadow:var(--sh-lg);}
.auth-card h2{font-family:'Playfair Display',serif;color:var(--navy);text-align:center;margin-bottom:.3rem;font-size:1.3rem;}
.auth-card .auth-sub{font-family:'Cormorant Garamond',serif;color:var(--muted);text-align:center;font-style:italic;font-size:.92rem;margin-bottom:1.2rem;}
.auth-toggle{display:flex;gap:3px;margin-bottom:1.2rem;border-bottom:2px solid var(--sage-bg);}
.auth-toggle button{flex:1;padding:8px;background:none;border:none;cursor:pointer;font-family:'Lato',sans-serif;font-size:.72rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}
.auth-toggle button.active{color:var(--sage);border-bottom-color:var(--sage);}
.auth-err{background:#fdf0ef;border:1px solid #f5c6c2;border-radius:8px;padding:8px 12px;font-family:'Lato',sans-serif;font-size:.72rem;color:var(--red);margin-bottom:.8rem;}
.auth-success{background:#eef5ea;border:1px solid #c2ddb5;border-radius:8px;padding:8px 12px;font-family:'Lato',sans-serif;font-size:.72rem;color:var(--sage);margin-bottom:.8rem;}
.pc-wrap{display:flex;flex-direction:column;height:calc(100vh - 240px);min-height:400px;}
.pc-messages{flex:1;overflow-y:auto;padding:.5rem 0;display:flex;flex-direction:column;gap:.6rem;}
.pc-msg{max-width:88%;padding:10px 14px;border-radius:12px;font-size:.9rem;line-height:1.6;animation:fadeUp .25s ease;}
.pc-msg.user{align-self:flex-end;background:var(--sage);color:#fff;border-bottom-right-radius:4px;}
.pc-msg.assistant{align-self:flex-start;background:var(--gold-bg);color:var(--ink);border-bottom-left-radius:4px;border:1px solid var(--gold-lt);}
.pc-msg.system{align-self:center;background:var(--lilac);color:var(--navy-lt);font-style:italic;font-size:.82rem;text-align:center;max-width:95%;}
.pc-input-row{display:flex;gap:7px;padding-top:.6rem;border-top:1px solid var(--sage-bg);}
.pc-input-row textarea{flex:1;border:1.5px solid #ddd8ce;border-radius:10px;padding:9px 12px;font-family:'Cormorant Garamond',serif;font-size:.95rem;background:var(--cream);outline:none;resize:none;min-height:44px;max-height:120px;}
.pc-input-row textarea:focus{border-color:var(--sage);}
.pc-suggestions{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.5rem;}
.pc-suggestion{padding:5px 10px;border-radius:20px;border:1.5px solid #ddd8ce;background:var(--cream);cursor:pointer;font-family:'Lato',sans-serif;font-size:.65rem;color:var(--muted);transition:all .15s;white-space:nowrap;}
.pc-suggestion:hover{border-color:var(--sage);color:var(--sage);}
.logout-btn{background:rgba(255,255,255,.12);border:none;border-radius:8px;padding:4px 8px;cursor:pointer;color:rgba(255,255,255,.7);font-family:'Lato',sans-serif;font-size:.58rem;transition:all .15s;}
.logout-btn:hover{background:rgba(255,255,255,.2);color:#fff;}
.loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--cream);gap:1rem;}
.role-selector{display:flex;gap:8px;margin-bottom:1rem;}
.role-opt{flex:1;border:2px solid var(--sage-bg);border-radius:12px;padding:14px 10px;cursor:pointer;text-align:center;transition:all .18s;background:var(--white);}
.role-opt.sel{border-color:var(--sage);background:var(--sage-bg);}
.role-opt-icon{font-size:1.2rem;margin-bottom:4px;}
.role-opt-label{font-family:'Playfair Display',serif;font-size:.92rem;color:var(--navy);margin-bottom:2px;}
.role-opt-desc{font-family:'Lato',sans-serif;font-size:.62rem;color:var(--muted);font-style:italic;line-height:1.4;}
.pw-overlay{position:fixed;inset:0;background:rgba(44,44,44,.65);display:flex;align-items:center;justify-content:center;z-index:500;padding:1rem;}
.pw-card{background:var(--white);border-radius:16px;padding:1.6rem 1.4rem;max-width:330px;width:100%;text-align:center;box-shadow:var(--sh-lg);}
.ds-banner{background:linear-gradient(135deg,var(--navy),var(--navy-lt));border-radius:10px;padding:13px 15px;display:flex;align-items:center;gap:11px;margin-bottom:.9rem;}
.ds-banner p{color:var(--cream);font-size:.85rem;flex:1;line-height:1.45;}
.ds-banner em{color:var(--gold);font-style:italic;}
.collapsible-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:.6rem 0;}
.collapsible-arrow{font-size:.8rem;color:var(--muted);transition:transform .2s;}
.collapsible-arrow.open{transform:rotate(180deg);}

/* ── Trello / Schedule styles ─────────────────────────────────── */
.trello-wrap{padding:12px 10px 32px;overflow-x:auto;}
.trello-legend{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.trello-legend-item{display:flex;align-items:center;gap:3px;border-radius:12px;padding:2px 8px;font-family:'Lato',sans-serif;font-size:.6rem;}
.trello-columns{display:flex;gap:8px;align-items:flex-start;min-width:680px;}
.trello-col{flex:1;min-width:0;display:flex;flex-direction:column;}
.trello-col-hdr{border-radius:10px 10px 0 0;padding:9px 8px 7px;cursor:pointer;user-select:none;text-align:center;}
.trello-col-actions{padding:3px 6px;display:flex;gap:4px;justify-content:flex-end;border-left:1px solid #ddd8ce;border-right:1px solid #ddd8ce;}
.trello-col-body{border:1px solid #ddd8ce;border-top:none;border-radius:0 0 10px 10px;padding:5px 5px 7px;min-height:100px;}
.trello-card{border-radius:8px;margin-bottom:5px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);transition:opacity .2s;}
.trello-card-hdr{padding:5px 8px;display:flex;align-items:center;gap:5px;min-width:0;}
.trello-card-time{padding:3px 9px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.68rem;border-bottom:1px solid rgba(0,0,0,.06);}
.trello-card-body{padding:5px 7px 6px;}
.trello-card-item{display:flex;align-items:flex-start;gap:7px;padding:3px 0;border-bottom:1px solid rgba(0,0,0,.05);}
.trello-card-item:last-child{border-bottom:none;}
.trello-check{width:14px;height:14px;border-radius:3px;flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.trello-item-label{font-family:'Cormorant Garamond',serif;font-size:.75rem;line-height:1.4;word-break:break-word;flex:1;}
.drop-indicator{height:3px;background:var(--gold);border-radius:4px;margin:2px 0;}

/* Day view schedule styles */
.sched-day-tabs{display:flex;gap:4px;margin-bottom:14px;justify-content:center;}
.sched-day-pill{flex:1;border-radius:8px;padding:6px 2px;cursor:pointer;text-align:center;border:2px solid #ddd8ce;background:var(--white);transition:all .15s;}
.sched-day-pill.active{background:var(--navy);border-color:var(--navy);}
.sched-day-pill.today-pill{border-color:var(--gold);background:var(--gold-bg);}
.day-progress-bar{background:var(--sage-bg);border-radius:8px;height:7px;overflow:hidden;margin-bottom:14px;}
.day-progress-fill{height:100%;border-radius:8px;transition:width .4s;}

/* Student Dashboard */
.student-card{background:var(--white);border:1px solid #ddd8ce;border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(44,62,80,.06);}
.student-card-row{padding:12px 14px;display:flex;align-items:center;gap:10px;}
.avatar-circle{border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Playfair Display',serif;}
.badge-pill{border-radius:20px;padding:2px 10px;font-family:'Lato',sans-serif;font-size:.6rem;}
.week-day-card{background:var(--white);border:1px solid #ddd8ce;border-radius:10px;padding:9px 11px;margin-bottom:7px;}
.week-item-chip{border-radius:14px;padding:3px 10px;font-size:.72rem;cursor:pointer;font-family:'Cormorant Garamond',serif;transition:all .15s;}

/* ── Weekly grid schedule ───────────────────────────── */
.sched-grid{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.sched-grid-inner{min-width:520px;}
.sched-col-hdr{padding:9px 6px;text-align:center;cursor:pointer;user-select:none;border-bottom:2px solid var(--navy);}
.sched-time-cell{background:var(--cream);border-right:1px solid #ddd8ce;padding:6px 5px;display:flex;align-items:flex-start;justify-content:flex-end;padding-top:9px;}
.sched-time-lbl{font-family:'Lato',sans-serif;font-size:.58rem;color:var(--muted);text-align:right;line-height:1.2;white-space:nowrap;}
.sched-block-cell{padding:2px 3px;border-right:1px solid var(--sage-bg);min-height:34px;}
.sched-block{border-radius:4px;border-left:3px solid;padding:3px 5px;margin-bottom:2px;}
.sched-block-label{font-family:'Lato',sans-serif;font-size:.52rem;text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:2px;}
.sched-item{display:flex;align-items:flex-start;gap:4px;margin-bottom:1px;}
.sched-item-check{width:10px;height:10px;border-radius:2px;flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:1px solid #ccc;background:transparent;transition:all .12s;}
.sched-item-check.done{border-color:currentColor;background:currentColor;}
.sched-item-text{font-family:'Cormorant Garamond',serif;font-size:.78rem;line-height:1.35;flex:1;}
/* Day view time-block layout */
.day-time-row{display:flex;border-bottom:1px solid var(--sage-bg);}
.day-time-col{width:68px;flex-shrink:0;padding:10px 8px 10px 12px;display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-start;border-right:2px solid var(--sage-bg);}
.day-block-col{flex:1;padding:10px 14px 10px 12px;border-left:3px solid;}

// ─────────────────────────────────────────────────────────────────────────────
// AUTH SCREEN — local only, no server needed
// ─────────────────────────────────────────────────────────────────────────────
function AuthScreen({onAuth}){
  const [name,setName]=useState(()=>{const u=getStoredUser();return u?.name||"";});
  const [role,setRole]=useState(()=>{const u=getStoredUser();return u?.role||"parent";});
  function handleEnter(e){
    e.preventDefault();
    const n=name.trim();
    if(!n)return;
    const user={name:n,role,id:n.toLowerCase().replace(/\s+/g,"-"),email:n};
    storeUser(user);
    onAuth(user);
  }
  return(
    <div className="auth-wrap">
      <div className="auth-card">
        <div style={{textAlign:"center",marginBottom:"1.1rem"}}><Logo/></div>
        <h2 style={{textAlign:"center",marginBottom:4}}>Living <span style={{color:"var(--sage)",fontStyle:"italic"}}>Rhythm</span></h2>
        <p className="auth-sub">Your Charlotte Mason planner</p>
        <form onSubmit={handleEnter} style={{marginTop:"1.2rem"}}>
          <div className="field">
            <label>Your name</label>
            <input autoFocus value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Kim" required/>
          </div>
          <div className="field">
            <label>I am a…</label>
            <div className="role-selector">
              <div className={"role-opt "+(role==="parent"?"sel":"")} onClick={()=>setRole("parent")}>
                <div className="role-opt-icon">🏡</div>
                <div className="role-opt-label">Parent</div>
                <div className="role-opt-desc">Plan lessons, manage the school day</div>
              </div>
              <div className={"role-opt "+(role==="student"?"sel":"")} onClick={()=>setRole("student")}>
                <div className="role-opt-icon">📖</div>
                <div className="role-opt-label">Student</div>
                <div className="role-opt-desc">Check off work, narrate, journal</div>
              </div>
            </div>
          </div>
          <button type="submit" className="btn btn-sage btn-full" style={{padding:"12px",fontSize:".8rem",marginTop:".3rem"}}>
            Enter the Planner →
          </button>
        </form>
        <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".8rem",color:"var(--muted)",fontStyle:"italic",textAlign:"center",marginTop:"1rem",lineHeight:1.5}}>
          Your data is saved locally on this device — no account needed.
        </p>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// TRELLO BOARD COMPONENT
// ─────────────────────────────────────────────────────────────────────────────
function TrelloCard({block,col,editMode,isDragging,onDragStart,onDragOver,onDrop,onDragEnd,onToggleCheck,onUpdateTime,onUpdateType,onUpdateItem,onAddItem,onRemoveItem,onRemove}){
  const [collapsed,setCollapsed]=useState(false);
  const [editingTime,setEditingTime]=useState(false);
  const [timeVal,setTimeVal]=useState(block.time);
  const [showTypeMenu,setShowTypeMenu]=useState(false);
  useEffect(()=>{setTimeVal(block.time);},[block.time]);
  const doneCount=block.items.filter((_,i)=>block.checks[i]).length;
  const totalCount=block.items.length;
  const allDone=doneCount===totalCount&&totalCount>0;
  return(
    <div
      draggable={true}
      onDragStart={onDragStart}
      onDragOver={onDragOver}
      onDrop={onDrop}
      onDragEnd={onDragEnd}
      className="trello-card"
      style={{background:col.bg,border:`1.5px solid ${col.border}`,opacity:isDragging?.35:allDone?.72:1,cursor:editMode?"grab":"default"}}
    >
      {/* Header bar */}
      <div className="trello-card-hdr" style={{background:col.border}}>
        {editMode&&<span style={{color:"rgba(255,255,255,.55)",fontSize:13,cursor:"grab",flexShrink:0}}>⠿</span>}
        <div style={{flex:1,minWidth:0,position:"relative"}}>
          {editMode?(
            <>
              <button onClick={()=>setShowTypeMenu(m=>!m)} style={{background:"rgba(255,255,255,.18)",border:"none",borderRadius:4,padding:"2px 7px",cursor:"pointer",fontSize:10,color:"rgba(255,255,255,.95)",fontFamily:"'Cormorant Garamond',serif",fontWeight:600,letterSpacing:".04em",whiteSpace:"nowrap"}}>
                {BLOCK_TYPES[block.type]?.label||block.type} ▾
              </button>
              {showTypeMenu&&(
                <div style={{position:"absolute",left:0,top:"100%",zIndex:50,background:"#fff",border:"1px solid #ddd8ce",borderRadius:8,boxShadow:"0 6px 20px rgba(0,0,0,.18)",overflow:"hidden",minWidth:150}}>
                  {Object.entries(BLOCK_TYPES).map(([key,tc])=>(
                    <div key={key} onClick={()=>{onUpdateType(key);setShowTypeMenu(false);}} style={{padding:"6px 12px",fontSize:11,cursor:"pointer",color:tc.text,background:tc.bg,borderBottom:"1px solid #ede9e2",fontFamily:"'Cormorant Garamond',serif"}}>{tc.label}</div>
                  ))}
                </div>
              )}
            </>
          ):(
            <span style={{fontSize:10,color:"rgba(255,255,255,.88)",fontFamily:"'Lato',sans-serif",fontWeight:700,letterSpacing:".06em",textTransform:"uppercase"}}>{BLOCK_TYPES[block.type]?.label||block.type}</span>
          )}
        </div>
        {totalCount>0&&<span style={{fontSize:9,color:"rgba(255,255,255,.7)",flexShrink:0,fontFamily:"'Lato',sans-serif"}}>{doneCount}/{totalCount}</span>}
        <button onClick={()=>setCollapsed(c=>!c)} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,.8)",fontSize:11,padding:"0 1px",lineHeight:1,flexShrink:0}}>{collapsed?"▶":"▼"}</button>
        {editMode&&<button onClick={onRemove} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,.5)",fontSize:13,padding:"0 1px",lineHeight:1,flexShrink:0}}>✕</button>}
      </div>
      {/* Time row */}
      <div className="trello-card-time" style={{background:"rgba(0,0,0,.06)",color:col.text}}>
        {editingTime?(
          <input autoFocus value={timeVal} onChange={e=>setTimeVal(e.target.value)} onBlur={()=>{onUpdateTime(timeVal);setEditingTime(false);}} onKeyDown={e=>{if(e.key==="Enter"){onUpdateTime(timeVal);setEditingTime(false);}}} style={{background:"transparent",border:"none",outline:"none",fontSize:11,color:col.text,width:"100%",fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic"}}/>
        ):(
          <span onClick={editMode?()=>{setTimeVal(block.time);setEditingTime(true);}:undefined} style={{fontSize:11,color:col.text,opacity:.75,fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",cursor:editMode?"text":"default",borderBottom:editMode?`1px dashed ${col.border}`:"none",display:"inline-block"}}>
            {block.time||(editMode?<span style={{opacity:.4}}>+ add time</span>:"—")}
          </span>
        )}
      </div>
      {/* Checklist */}
      {!collapsed&&(
        <div className="trello-card-body">
          {block.items.map((item,idx)=>(
            <div key={idx} className="trello-card-item">
              <div onClick={()=>onToggleCheck(idx)} className="trello-check" style={{border:`1.5px solid ${block.checks[idx]?col.border:"#ddd8ce"}`,background:block.checks[idx]?col.border:"#fff"}}>
                {block.checks[idx]&&<span style={{color:"#fff",fontSize:9,lineHeight:1}}>✓</span>}
              </div>
              {editMode?(
                <input value={item} onChange={e=>onUpdateItem(idx,e.target.value)} style={{flex:1,minWidth:0,background:"transparent",border:"none",borderBottom:`1px dashed ${col.border}`,fontSize:12,color:col.text,padding:"0 2px",outline:"none",fontFamily:"'Cormorant Garamond',serif",lineHeight:1.4}}/>
              ):(
                <span className="trello-item-label" style={{color:col.text,textDecoration:block.checks[idx]?"line-through":"none",opacity:block.checks[idx]?.5:1}}>{item}</span>
              )}
              {editMode&&<button onClick={()=>onRemoveItem(idx)} style={{background:"none",border:"none",cursor:"pointer",color:col.border,fontSize:13,padding:0,flexShrink:0,lineHeight:1}}>×</button>}
            </div>
          ))}
          {editMode&&<button onClick={onAddItem} style={{marginTop:5,background:"none",border:"none",cursor:"pointer",fontSize:11,color:col.border,fontFamily:"'Cormorant Garamond',serif",padding:"1px 0",display:"block"}}>+ add item</button>}
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// WEEKLY GRID — matches your printed schedule aesthetic
// Time column on left, day columns across, color-coded rows
// ─────────────────────────────────────────────────────────────────────────────
function WeeklyGrid({schedule,editMode,onToggleCheck,onAddBlock,onRemoveBlock,onUpdateTime,onUpdateType,onUpdateItem,onAddItem,onRemoveItem,onClearDay,onCheckAll,onDayClick,onMoveBlock}){
  const today=todayDayName();
  const drag=useRef(null);
  const [dragOver,setDragOver]=useState(null);

  // Collect all unique time slots across all days, sorted
  function parseTime(t){if(!t)return 9999;const m=t.match(/(\d+):(\d+)/);if(!m)return 9999;let h=parseInt(m[1]),mn=parseInt(m[2]);if(h<7)h+=12;return h*60+mn;}
  const allTimes=[...new Set(
    SCHOOL_DAYS.flatMap(d=>(schedule[d]||[]).map(b=>b.time||""))
  )].filter(Boolean).sort((a,b)=>parseTime(a)-parseTime(b));

  function handleDragStart(e,day,idx){drag.current={day,idx};e.dataTransfer.effectAllowed="move";}
  function handleDrop(e,toDay,toTime){
    e.preventDefault();
    if(!drag.current)return;
    const{day:fromDay,idx:fromIdx}=drag.current;
    drag.current=null;setDragOver(null);
    // find toIdx — insert at the end of toDay's blocks for simplicity, or find matching time
    const toBlocks=schedule[toDay]||[];
    const toIdx=toBlocks.findIndex(b=>b.time===toTime);
    onMoveBlock(fromDay,fromIdx,toDay,toIdx>=0?toIdx:toBlocks.length);
  }
  function handleDragEnd(){drag.current=null;setDragOver(null);}

  // Progress across whole week
  const weekTotal=SCHOOL_DAYS.reduce((s,d)=>s+dayProgress(schedule[d]||[]).total,0);
  const weekDone=SCHOOL_DAYS.reduce((s,d)=>s+dayProgress(schedule[d]||[]).done,0);

  return(
    <div style={{padding:"0 0 32px"}}>
      {/* Header band */}
      <div style={{background:"var(--cream)",borderBottom:"2px solid var(--sage-bg)",padding:"12px 14px 10px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.1rem",color:"var(--navy)",fontStyle:"italic"}}>Weekly Blocks</div>
          <div style={{fontFamily:"'Lato',sans-serif",fontSize:".62rem",textTransform:"uppercase",letterSpacing:".12em",color:"var(--muted)",marginTop:2}}>{formatWeekRange()}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {weekTotal>0&&<div style={{fontFamily:"'Lato',sans-serif",fontSize:".62rem",color:"var(--muted)"}}>{weekDone}/{weekTotal} items</div>}
          {editMode&&<span style={{fontFamily:"'Lato',sans-serif",fontSize:".6rem",color:"var(--gold)",fontStyle:"italic"}}>✎ editing</span>}
        </div>
      </div>

      {/* Legend row */}
      <div style={{background:"var(--cream)",padding:"7px 12px",borderBottom:"1px solid var(--sage-bg)",display:"flex",flexWrap:"wrap",gap:5}}>
        {Object.entries(BLOCK_TYPES).map(([key,col])=>(
          <div key={key} style={{display:"flex",alignItems:"center",gap:3,padding:"2px 8px",borderRadius:10,background:col.bg,border:`1px solid ${col.border}`}}>
            <span style={{fontFamily:"'Lato',sans-serif",fontSize:".58rem",color:col.text,letterSpacing:".04em"}}>{col.label}</span>
          </div>
        ))}
      </div>

      {/* Scrollable grid */}
      <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        <div style={{minWidth:520}}>

          {/* Column headers */}
          <div style={{display:"grid",gridTemplateColumns:"62px repeat(5, 1fr)",borderBottom:"2px solid var(--navy)"}}>
            <div style={{background:"var(--cream)",borderRight:"1px solid #ddd8ce",padding:"8px 4px",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontFamily:"'Lato',sans-serif",fontSize:".55rem",textTransform:"uppercase",letterSpacing:".1em",color:"var(--muted)"}}>time</span>
            </div>
            {SCHOOL_DAYS.map((day,di)=>{
              const isToday=day===today;
              const {done,total}=dayProgress(schedule[day]||[]);
              return(
                <div key={day} onClick={()=>onDayClick(day)}
                  style={{background:isToday?"var(--gold)":"var(--navy)",padding:"8px 6px",textAlign:"center",cursor:"pointer",borderRight:di<4?"1px solid rgba(255,255,255,.1)":"none",userSelect:"none"}}>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:".85rem",fontWeight:700,color:isToday?"var(--navy)":"var(--cream)"}}>{SHORT_DAYS[di]}</div>
                  <div style={{fontFamily:"'Lato',sans-serif",fontSize:".55rem",color:isToday?"rgba(44,62,80,.6)":"var(--sage-lt)",marginTop:1}}>{day}</div>
                  {total>0&&<div style={{fontFamily:"'Lato',sans-serif",fontSize:".52rem",color:isToday?"var(--navy)":"var(--gold-lt)",marginTop:2,opacity:.8}}>{done}/{total}</div>}
                  {isToday&&<div style={{fontFamily:"'Lato',sans-serif",fontSize:".48rem",textTransform:"uppercase",letterSpacing:".1em",color:"var(--navy)",marginTop:1,opacity:.7}}>today</div>}
                </div>
              );
            })}
          </div>

          {/* Rows — one per time slot */}
          {allTimes.map((timeSlot,rowIdx)=>(
            <div key={timeSlot} style={{display:"grid",gridTemplateColumns:"62px repeat(5, 1fr)",borderBottom:"1px solid var(--sage-bg)",minHeight:36}}>
              {/* Time label */}
              <div style={{background:"var(--cream)",borderRight:"1px solid #ddd8ce",padding:"6px 4px",display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:8}}>
                <span style={{fontFamily:"'Lato',sans-serif",fontSize:".6rem",color:"var(--muted)",textAlign:"center",lineHeight:1.2}}>{timeSlot}</span>
              </div>
              {/* Day cells */}
              {SCHOOL_DAYS.map((day,di)=>{
                const block=(schedule[day]||[]).find(b=>b.time===timeSlot);
                const col=block?(BLOCK_TYPES[block.type]||BLOCK_TYPES.life):null;
                const isDragTarget=dragOver?.day===day&&dragOver?.time===timeSlot;
                return(
                  <div key={day}
                    onDragOver={e=>{e.preventDefault();setDragOver({day,time:timeSlot});}}
                    onDrop={e=>handleDrop(e,day,timeSlot)}
                    style={{borderRight:di<4?"1px solid var(--sage-bg)":"none",background:isDragTarget?"rgba(194,155,97,.12)":"transparent",minHeight:36,position:"relative",transition:"background .1s"}}
                  >
                    {block&&(
                      <div
                        draggable={true}
                        onDragStart={e=>{handleDragStart(e,day,(schedule[day]||[]).indexOf(block));}}
                        onDragEnd={handleDragEnd}
                        style={{margin:"2px 3px",borderRadius:5,background:col.bg,borderLeft:`3px solid ${col.border}`,padding:"4px 6px",cursor:editMode?"grab":"default",minHeight:28}}
                      >
                        {/* Block type label */}
                        <div style={{fontFamily:"'Lato',sans-serif",fontSize:".55rem",textTransform:"uppercase",letterSpacing:".05em",color:col.border,fontWeight:700,marginBottom:2}}>{BLOCK_TYPES[block.type]?.label}</div>
                        {/* Items as checkbox list */}
                        {block.items.map((item,ii)=>(
                          <div key={ii} style={{display:"flex",alignItems:"flex-start",gap:4,marginBottom:1}}>
                            <div onClick={()=>onToggleCheck(day,block.id,ii)}
                              style={{width:10,height:10,borderRadius:2,flexShrink:0,marginTop:2,border:`1px solid ${block.checks[ii]?col.border:"#ccc"}`,background:block.checks[ii]?col.border:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                              {block.checks[ii]&&<span style={{color:"#fff",fontSize:7,lineHeight:1}}>✓</span>}
                            </div>
                            {editMode?(
                              <input value={item} onChange={e=>onUpdateItem(day,block.id,ii,e.target.value)}
                                style={{flex:1,border:"none",borderBottom:"1px dashed "+col.border,background:"transparent",fontFamily:"'Cormorant Garamond',serif",fontSize:".75rem",color:col.text,outline:"none",padding:0,lineHeight:1.3,textDecoration:block.checks[ii]?"line-through":"none",opacity:block.checks[ii]?.5:1}}/>
                            ):(
                              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".78rem",color:col.text,lineHeight:1.35,textDecoration:block.checks[ii]?"line-through":"none",opacity:block.checks[ii]?.5:1,flex:1}}>{item}</span>
                            )}
                          </div>
                        ))}
                        {editMode&&(
                          <div style={{display:"flex",gap:3,marginTop:3,flexWrap:"wrap"}}>
                            <button onClick={()=>onAddItem(day,block.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:".6rem",color:col.border,padding:0,fontFamily:"'Lato',sans-serif"}}>+ item</button>
                            <button onClick={()=>onRemoveBlock(day,block.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:".6rem",color:"var(--red)",padding:0,fontFamily:"'Lato',sans-serif",marginLeft:"auto"}}>✕</button>
                          </div>
                        )}
                      </div>
                    )}
                    {!block&&editMode&&(
                      <div style={{height:"100%",minHeight:32,display:"flex",alignItems:"center",justifyContent:"center"}}>
                        <button onClick={()=>{onAddBlock(day);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:".65rem",color:"#ddd8ce",padding:"2px 4px",fontFamily:"'Lato',sans-serif"}}>+</button>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          ))}

          {/* Any blocks WITHOUT a time slot — show below grid */}
          {SCHOOL_DAYS.some(d=>(schedule[d]||[]).some(b=>!b.time))&&(
            <div style={{padding:"8px 12px",background:"var(--cream)",borderTop:"2px solid var(--sage-bg)"}}>
              <div style={{fontFamily:"'Lato',sans-serif",fontSize:".6rem",textTransform:"uppercase",letterSpacing:".08em",color:"var(--muted)",marginBottom:6}}>Unscheduled blocks</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:4}}>
                {SCHOOL_DAYS.map((day,di)=>(
                  <div key={day}>
                    {(schedule[day]||[]).filter(b=>!b.time).map(block=>{
                      const col=BLOCK_TYPES[block.type]||BLOCK_TYPES.life;
                      return(
                        <div key={block.id} style={{borderRadius:5,background:col.bg,borderLeft:`3px solid ${col.border}`,padding:"4px 6px",marginBottom:3}}>
                          <div style={{fontFamily:"'Lato',sans-serif",fontSize:".52rem",textTransform:"uppercase",color:col.border,fontWeight:700,marginBottom:2}}>{BLOCK_TYPES[block.type]?.label}</div>
                          {block.items.map((item,ii)=>(
                            <div key={ii} style={{display:"flex",gap:3,alignItems:"flex-start",marginBottom:1}}>
                              <div onClick={()=>onToggleCheck(day,block.id,ii)} style={{width:9,height:9,borderRadius:2,flexShrink:0,marginTop:2,border:`1px solid ${block.checks[ii]?col.border:"#ccc"}`,background:block.checks[ii]?col.border:"transparent",cursor:"pointer"}}/>
                              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".75rem",color:col.text,lineHeight:1.3,textDecoration:block.checks[ii]?"line-through":"none",opacity:block.checks[ii]?.5:1}}>{item}</span>
                            </div>
                          ))}
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Quick actions row */}
          <div style={{display:"grid",gridTemplateColumns:"62px repeat(5,1fr)",background:"var(--cream)",borderTop:"1px solid var(--sage-bg)"}}>
            <div style={{borderRight:"1px solid #ddd8ce"}}/>
            {SCHOOL_DAYS.map((day,di)=>(
              <div key={day} style={{padding:"5px 4px",display:"flex",gap:4,justifyContent:"center",borderRight:di<4?"1px solid #ddd8ce":"none"}}>
                <button onClick={()=>onCheckAll(day)} style={{background:"none",border:"none",fontSize:".58rem",color:"var(--sage)",cursor:"pointer",fontFamily:"'Lato',sans-serif",padding:"1px 3px"}}>✓</button>
                <button onClick={()=>onClearDay(day)} style={{background:"none",border:"none",fontSize:".58rem",color:"var(--muted)",cursor:"pointer",fontFamily:"'Lato',sans-serif",padding:"1px 3px"}}>↺</button>
              </div>
            ))}
          </div>

        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// DAY VIEW — matches printed schedule: time left, full items, color blocks
// ─────────────────────────────────────────────────────────────────────────────
function DayView({focusDay,setFocusDay,schedule,editMode,onToggleCheck,onMoveBlock,onAddBlock,onRemoveBlock,onUpdateTime,onUpdateType,onUpdateItem,onAddItem,onRemoveItem,onClearDay,onCheckAll}){
  const today=todayDayName();
  const blocks=schedule[focusDay]||[];
  const {done,total}=dayProgress(blocks);
  const allDone=total>0&&done===total;
  const drag=useRef(null);
  const [dragOver,setDragOver]=useState(null);

  function handleDragStart(e,idx){drag.current=idx;e.dataTransfer.effectAllowed="move";}
  function handleDrop(e,toIdx){
    e.preventDefault();
    if(drag.current===null||drag.current===toIdx)return;
    onMoveBlock(focusDay,drag.current,focusDay,toIdx);
    drag.current=null;setDragOver(null);
  }

  return(
    <div style={{padding:"0 0 36px"}}>
      {/* Day selector tabs */}
      <div style={{display:"flex",borderBottom:"2px solid var(--navy)",background:"var(--cream)"}}>
        {SCHOOL_DAYS.map(day=>{
          const isSel=day===focusDay,isToday=day===today;
          const {done:d,total:t}=dayProgress(schedule[day]||[]);
          return(
            <button key={day} onClick={()=>setFocusDay(day)}
              style={{flex:1,padding:"10px 4px",border:"none",background:isSel?"var(--navy)":isToday?"var(--gold-bg)":"var(--cream)",cursor:"pointer",borderBottom:isSel?"3px solid var(--gold)":isToday?"3px solid var(--gold)":"3px solid transparent",transition:"all .15s"}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:".78rem",fontWeight:700,color:isSel?"var(--cream)":isToday?"var(--navy)":"var(--muted)"}}>{day.slice(0,3)}</div>
              {t>0&&<div style={{fontFamily:"'Lato',sans-serif",fontSize:".52rem",color:isSel?"var(--sage-lt)":isToday?"var(--gold)":"var(--muted)",marginTop:1}}>{d}/{t}</div>}
            </button>
          );
        })}
      </div>

      {/* Day header */}
      <div style={{background:"var(--cream)",borderBottom:"2px solid var(--sage-bg)",padding:"14px 16px 12px",display:"flex",alignItems:"flex-end",justifyContent:"space-between"}}>
        <div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.5rem",color:"var(--navy)",fontStyle:"italic"}}>{focusDay}</div>
          {focusDay===today&&<div style={{fontFamily:"'Lato',sans-serif",fontSize:".6rem",textTransform:"uppercase",letterSpacing:".12em",color:"var(--gold)",marginTop:2}}>Today</div>}
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5}}>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>onCheckAll(focusDay)} className="btn btn-sage btn-sm">✓ All</button>
            <button onClick={()=>onClearDay(focusDay)} className="btn btn-ghost btn-sm">↺ Clear</button>
          </div>
          {total>0&&<div style={{fontFamily:"'Lato',sans-serif",fontSize:".65rem",color:allDone?"var(--gold)":"var(--muted)"}}>{done} of {total} complete{allDone?" ✦":""}</div>}
        </div>
      </div>

      {/* Progress bar */}
      {total>0&&(
        <div style={{height:4,background:"rgba(255,255,255,.1)",background:"var(--sage-bg)"}}>
          <div style={{height:"100%",background:allDone?"var(--gold)":"var(--sage)",width:`${(done/total)*100}%`,transition:"width .4s ease"}}/>
        </div>
      )}

      {/* Schedule grid — time column + block column */}
      <div style={{padding:"8px 0"}}>
        {blocks.map((block,idx)=>{
          const col=BLOCK_TYPES[block.type]||BLOCK_TYPES.life;
          const isDragTarget=dragOver===idx;
          const isDragging=drag.current===idx;
          const blockDone=block.items.filter((_,i)=>block.checks[i]).length;
          const blockAllDone=blockDone===block.items.length&&block.items.length>0;
          return(
            <div key={block.id}
              onDragOver={e=>{e.preventDefault();setDragOver(idx);}}
              onDrop={e=>handleDrop(e,idx)}
              style={{display:"flex",opacity:isDragging?.35:1,background:isDragTarget?"rgba(194,155,97,.06)":"transparent",transition:"all .12s",borderBottom:"1px solid var(--sage-bg)"}}
            >
              {/* Time column */}
              <div style={{width:68,flexShrink:0,padding:"10px 8px 10px 14px",display:"flex",flexDirection:"column",alignItems:"flex-end",justifyContent:"flex-start",borderRight:"2px solid var(--sage-bg)"}}>
                {editMode?(
                  <input value={block.time} onChange={e=>onUpdateTime(focusDay,block.id,e.target.value)}
                    style={{width:"100%",border:"none",borderBottom:"1px dashed var(--gold)",background:"transparent",fontFamily:"'Lato',sans-serif",fontSize:".62rem",color:"var(--muted)",textAlign:"right",outline:"none",padding:0}}/>
                ):(
                  <span style={{fontFamily:"'Lato',sans-serif",fontSize:".63rem",color:"var(--muted)",textAlign:"right",lineHeight:1.3}}>{block.time||"—"}</span>
                )}
                {blockAllDone&&<span style={{fontSize:".6rem",color:"var(--sage)",marginTop:3}}>✓</span>}
              </div>

              {/* Block content */}
              <div
                draggable={true}
                onDragStart={e=>handleDragStart(e,idx)}
                onDragEnd={()=>{drag.current=null;setDragOver(null);}}
                style={{flex:1,padding:"10px 14px 10px 12px",borderLeft:`3px solid ${col.border}`,background:col.bg,cursor:editMode?"grab":"default",marginLeft:0}}
              >
                {/* Block header */}
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:block.items.length?6:0}}>
                  {editMode&&(
                    <select value={block.type} onChange={e=>onUpdateType(focusDay,block.id,e.target.value)}
                      style={{border:"none",background:"transparent",fontFamily:"'Lato',sans-serif",fontSize:".58rem",textTransform:"uppercase",letterSpacing:".06em",color:col.border,fontWeight:700,cursor:"pointer",padding:0,outline:"none"}}>
                      {Object.entries(BLOCK_TYPES).map(([k,t])=><option key={k} value={k}>{t.label}</option>)}
                    </select>
                  )}
                  {!editMode&&<span style={{fontFamily:"'Lato',sans-serif",fontSize:".6rem",textTransform:"uppercase",letterSpacing:".07em",color:col.border,fontWeight:700}}>{BLOCK_TYPES[block.type]?.label}</span>}
                  {editMode&&<button onClick={()=>onRemoveBlock(focusDay,block.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--red)",fontSize:".75rem",padding:0,marginLeft:"auto",lineHeight:1}}>✕</button>}
                </div>

                {/* Items */}
                {block.items.map((item,ii)=>(
                  <div key={ii} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"3px 0",borderBottom:ii<block.items.length-1?"1px solid rgba(0,0,0,.04)":"none"}}>
                    <div onClick={()=>onToggleCheck(focusDay,block.id,ii)}
                      style={{width:15,height:15,borderRadius:3,flexShrink:0,marginTop:3,border:`1.5px solid ${block.checks[ii]?col.border:"#ccc"}`,background:block.checks[ii]?col.border:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>
                      {block.checks[ii]&&<span style={{color:"#fff",fontSize:8,lineHeight:1}}>✓</span>}
                    </div>
                    {editMode?(
                      <input value={item} onChange={e=>onUpdateItem(focusDay,block.id,ii,e.target.value)}
                        style={{flex:1,border:"none",borderBottom:"1px dashed "+col.border,background:"transparent",fontFamily:"'Cormorant Garamond',serif",fontSize:".95rem",color:col.text,outline:"none",padding:"0 2px",lineHeight:1.4,textDecoration:block.checks[ii]?"line-through":"none",opacity:block.checks[ii]?.5:1}}/>
                    ):(
                      <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".95rem",color:col.text,lineHeight:1.4,flex:1,textDecoration:block.checks[ii]?"line-through":"none",opacity:block.checks[ii]?.5:1}}>{item}</span>
                    )}
                    {editMode&&<button onClick={()=>onRemoveItem(focusDay,block.id,ii)} style={{background:"none",border:"none",cursor:"pointer",color:"#ccc",fontSize:".8rem",padding:0,flexShrink:0,lineHeight:1}}>×</button>}
                  </div>
                ))}
                {editMode&&(
                  <button onClick={()=>onAddItem(focusDay,block.id)} style={{marginTop:5,background:"none",border:"none",cursor:"pointer",fontFamily:"'Lato',sans-serif",fontSize:".62rem",color:col.border,padding:0}}>+ add item</button>
                )}
              </div>
            </div>
          );
        })}

        {editMode&&(
          <div style={{padding:"10px 14px"}}>
            <button onClick={()=>onAddBlock(focusDay)} style={{width:"100%",padding:"10px",borderRadius:8,border:"1px dashed #ddd8ce",background:"none",fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem",color:"var(--muted)",cursor:"pointer"}}>+ add block</button>
          </div>
        )}
      </div>

      {/* Completion banner */}
      {allDone&&(
        <div style={{margin:"0 14px 14px",textAlign:"center",padding:"18px",background:"var(--sage-bg)",borderRadius:12,border:"1px solid var(--sage-lt)"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.1rem",color:"var(--navy)",marginBottom:3}}>{focusDay} complete ✦</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".92rem",color:"var(--muted)",fontStyle:"italic"}}>Beauty. Meaning. Connection.</div>
        </div>
      )}
    </div>
  );
}

// Alias so ScheduleScreen still works with its existing prop name
function TrelloBoard(props){return <WeeklyGrid {...props}/>;}

// ─────────────────────────────────────────────────────────────────────────────
// STUDENTS TAB
// ─────────────────────────────────────────────────────────────────────────────
function StudentsTab({students,schedule,newStudentName,setNewStudentName,addStudent,removeStudent,toggleStudentLoop,onOpenDashboard}){
  const [expanded,setExpanded]=useState(null);
  const LOOPS=[
    {id:"beauty",label:"Beauty Loop",icon:"✦",color:"var(--gold)"},
    {id:"math",label:"Mathematics",icon:"∑",color:"var(--navy)"},
    {id:"language",label:"Language Arts",icon:"✍",color:"var(--sage)"},
    {id:"core",label:"Core Loop",icon:"🌍",color:"#6B4C6B"},
  ];
  return(
    <div style={{padding:"16px 14px 36px",maxWidth:560,margin:"0 auto"}}>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"var(--navy)",marginBottom:3}}>Student Roster</div>
      <div style={{fontSize:14,color:"var(--muted)",fontStyle:"italic",marginBottom:16,lineHeight:1.6,fontFamily:"'Cormorant Garamond',serif"}}>Each student taps their name to open their personal dashboard.</div>
      <div style={{display:"flex",gap:8,marginBottom:18}}>
        <input value={newStudentName} onChange={e=>setNewStudentName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addStudent()} placeholder="Add student name…" style={{flex:1,border:"1.5px solid #ddd8ce",borderRadius:8,padding:"8px 12px",fontFamily:"'Cormorant Garamond',serif",fontSize:15,outline:"none",background:"var(--cream)",color:"var(--navy)"}}/>
        <button onClick={addStudent} className="btn btn-sage">Add</button>
      </div>
      {students.map(student=>{
        const done=totalCompleted(student),badges=getBadges(done),isOpen=expanded===student.id;
        return(
          <div key={student.id} className="student-card">
            <div className="student-card-row">
              <div className="avatar-circle" style={{width:40,height:40,background:"var(--sage-bg)",border:"2px solid var(--sage)",fontSize:17,color:"var(--navy)"}}>{student.name[0]}</div>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"var(--navy)"}}>{student.name}</div>
                <div style={{fontFamily:"'Lato',sans-serif",fontSize:11,color:"var(--muted)",marginTop:1}}>
                  {student.loops.length} loops{done>0&&` · ${done} completed`}{badges.length>0&&" "+badges[badges.length-1].emoji}
                </div>
              </div>
              <button onClick={()=>onOpenDashboard(student.id)} className="btn btn-gold btn-sm">Open →</button>
              <button onClick={()=>setExpanded(isOpen?null:student.id)} className="btn btn-ghost btn-xs">{isOpen?"▲":"▼"}</button>
            </div>
            {isOpen&&(
              <div style={{borderTop:"1px solid var(--sage-bg)",padding:"11px 14px",background:"var(--sage-bg)"}}>
                <div style={{fontFamily:"'Lato',sans-serif",fontSize:10,color:"var(--navy)",fontWeight:700,marginBottom:8,letterSpacing:".08em",textTransform:"uppercase"}}>Assigned Loops</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                  {LOOPS.map(l=>{
                    const on=student.loops.includes(l.id);
                    return(
                      <div key={l.id} onClick={()=>toggleStudentLoop(student.id,l.id)} style={{background:on?l.color:"var(--white)",border:`1.5px solid ${on?l.color:"#ddd8ce"}`,borderRadius:20,padding:"4px 12px",fontSize:13,color:on?"#fff":"var(--muted)",cursor:"pointer",userSelect:"none",transition:"all .15s",fontFamily:"'Cormorant Garamond',serif"}}>
                        {l.icon} {l.label}
                      </div>
                    );
                  })}
                </div>
                <button onClick={()=>removeStudent(student.id)} style={{background:"none",border:"none",color:"var(--red)",fontSize:12,cursor:"pointer",fontFamily:"'Lato',sans-serif"}}>Remove student</button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// STUDENT DASHBOARD
// ─────────────────────────────────────────────────────────────────────────────
function StudentDashboard({student,schedule,onToggle,onBack}){
  const today=todayDayName();
  const [view,setView]=useState("today");
  const done=totalCompleted(student),badges=getBadges(done),next=nextBadge(done);
  const LOOP_TYPES={beauty:["beauty"],math:["math"],language:["language","morning"],core:["core","nature"]};
  function getStudentBlocks(day){return(schedule[day]||[]).filter(b=>student.loops.some(lid=>(LOOP_TYPES[lid]||[]).includes(b.type)));}
  const todayBlocks=getStudentBlocks(today);
  const todayItems=todayBlocks.flatMap(b=>b.items.map((item,ii)=>({item,key:`${today}|${b.id}|${ii}`})));
  const totalToday=todayItems.length;
  const doneToday=todayItems.filter(({key})=>student.completions[key]).length;
  return(
    <div style={{minHeight:"100vh",background:"var(--cream)"}}>
      {/* Header */}
      <div style={{background:"var(--navy)",padding:"16px 16px 22px"}}>
        <button onClick={onBack} style={{background:"none",border:"1px solid var(--sage-lt)",color:"var(--sage-lt)",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontFamily:"'Lato',sans-serif",fontSize:11,marginBottom:12}}>← Back</button>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
          <div className="avatar-circle" style={{width:46,height:46,background:"var(--navy-lt)",border:"2px solid var(--gold)",fontSize:20,color:"var(--gold)"}}>{student.name[0]}</div>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"var(--cream)"}}>{student.name}'s Day</div>
            <div style={{fontSize:11,color:"var(--sage-lt)",fontStyle:"italic",marginTop:2,fontFamily:"'Cormorant Garamond',serif"}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
          </div>
        </div>
        {totalToday>0&&(
          <>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:11,color:"var(--sage-lt)",fontFamily:"'Lato',sans-serif"}}>Today's Progress</span>
              <span style={{fontSize:11,color:"var(--gold-lt)",fontWeight:600,fontFamily:"'Lato',sans-serif"}}>{doneToday}/{totalToday}</span>
            </div>
            <div style={{background:"rgba(255,255,255,.12)",borderRadius:8,height:7,overflow:"hidden"}}>
              <div style={{background:"var(--gold)",height:"100%",borderRadius:8,transition:"width .5s",width:`${totalToday?(doneToday/totalToday)*100:0}%`}}/>
            </div>
          </>
        )}
        {badges.length>0&&(
          <div style={{display:"flex",gap:6,marginTop:9,flexWrap:"wrap"}}>
            {badges.map(b=>(
              <div key={b.label} className="badge-pill" style={{background:"rgba(194,155,97,.2)",border:"1px solid var(--gold)",color:"var(--gold-lt)"}}>{b.emoji} {b.label}</div>
            ))}
          </div>
        )}
        {next&&done>0&&<div style={{fontSize:10,color:"var(--navy-lt)",marginTop:4,fontStyle:"italic",fontFamily:"'Cormorant Garamond',serif"}}>{next.count-done} more to earn {next.emoji} {next.label}</div>}
      </div>
      {/* Sub-tabs */}
      <div style={{display:"flex",background:"var(--white)",borderBottom:"1px solid var(--sage-bg)"}}>
        {[["today","📖 Today"],["week","📅 This Week"]].map(([key,label])=>(
          <button key={key} onClick={()=>setView(key)} style={{flex:1,padding:"10px",border:"none",background:"none",cursor:"pointer",fontFamily:"'Cormorant Garamond',serif",fontSize:14,color:view===key?"var(--navy)":"var(--muted)",fontWeight:view===key?600:400,borderBottom:view===key?"3px solid var(--gold)":"3px solid transparent"}}>
            {label}
          </button>
        ))}
      </div>
      <div style={{padding:"12px 12px 28px"}}>
        {view==="today"&&(
          <div>
            {todayBlocks.length===0&&<div style={{textAlign:"center",color:"var(--muted)",fontStyle:"italic",padding:"24px 0",fontFamily:"'Cormorant Garamond',serif"}}>No lessons assigned for today.</div>}
            {todayBlocks.map(block=>{
              const col=BLOCK_TYPES[block.type]||BLOCK_TYPES.life;
              return(
                <div key={block.id} style={{background:col.bg,border:`1.5px solid ${col.border}`,borderRadius:10,marginBottom:9,overflow:"hidden"}}>
                  <div style={{background:col.border,padding:"5px 11px"}}>
                    <span style={{fontSize:10,color:"rgba(255,255,255,.9)",fontFamily:"'Lato',sans-serif",fontWeight:700,letterSpacing:".05em",textTransform:"uppercase"}}>{block.time&&`${block.time} · `}{BLOCK_TYPES[block.type]?.label}</span>
                  </div>
                  <div style={{padding:"5px 9px"}}>
                    {block.items.map((item,ii)=>{
                      const key=`${today}|${block.id}|${ii}`;
                      const checked=!!student.completions[key];
                      return(
                        <div key={ii} onClick={()=>onToggle(key)} style={{display:"flex",alignItems:"center",gap:9,padding:"6px 3px",cursor:"pointer",borderRadius:6,borderBottom:ii<block.items.length-1?`1px solid ${col.border}22`:"none"}}>
                          <div style={{width:19,height:19,borderRadius:"50%",flexShrink:0,border:`1.5px solid ${checked?col.border:"#ddd8ce"}`,background:checked?col.border:"var(--white)",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}>
                            {checked&&<span style={{color:"#fff",fontSize:10}}>✓</span>}
                          </div>
                          <span style={{fontFamily:"'Playfair Display',serif",fontSize:14,color:"var(--navy)",textDecoration:checked?"line-through":"none",opacity:checked?.5:1}}>{item}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
            {doneToday===totalToday&&totalToday>0&&(
              <div style={{marginTop:14,textAlign:"center",padding:"20px",background:"var(--sage-bg)",borderRadius:12,border:"1px solid var(--sage-lt)"}}>
                <div style={{fontSize:32,marginBottom:6}}>🎉</div>

              </div>
            )}

          <div>
            {SCHOOL_DAYS.map(day=>{

                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:items.length?6:0}}>

                    <span style={{fontSize:11,color:d===items.length&&items.length>0?"var(--sage)":"var(--muted)",fontFamily:"'Lato',sans-serif"}}>{d}/{items.length}{d===items.length&&items.length>0?" ✓":""}</span>
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    {items.map(({item,key})=>{
                      const checked=!!student.completions[key];
                      return(
                        <div key={key} onClick={()=>onToggle(key)} className="week-item-chip" style={{background:checked?"var(--sage-bg)":"var(--cream)",border:`1px solid ${checked?"var(--sage)":"#ddd8ce"}`,color:checked?"var(--navy)":"var(--muted)",textDecoration:checked?"line-through":"none"}}>
                          {checked&&<span style={{color:"var(--sage)",fontSize:10}}>✓ </span>}{item}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// RISE & SHINE PANEL
// ─────────────────────────────────────────────────────────────────────────────
function RiseAndShinePanel({rsItems,setRsItems,rsChecked,setRsChecked,mode}){
  const [open,setOpen]=useState(true);
  const [editing,setEditing]=useState(false);
  const [editingId,setEditingId]=useState(null);
  const [draftLabel,setDraftLabel]=useState("");
  const [draftDesc,setDraftDesc]=useState("");
  const [draftNote,setDraftNote]=useState("");
  const doneCount=rsItems.filter(it=>rsChecked[it.id]).length;
  const pct=rsItems.length?Math.round((doneCount/rsItems.length)*100):0;
  const allDone=rsItems.length>0&&doneCount===rsItems.length;
  function startEdit(item){setEditingId(item.id);setDraftLabel(item.label);setDraftDesc(item.desc);setDraftNote(item.note||"");}
  function saveEdit(id){setRsItems(p=>p.map(it=>it.id===id?{...it,label:draftLabel,desc:draftDesc,note:draftNote}:it));setEditingId(null);}
  function removeItem(id){setRsItems(p=>p.filter(it=>it.id!==id));}
  function addItem(){setRsItems(p=>[...p,{id:uid(),icon:"◆",label:"New Block",desc:"Describe this block",note:""}]);}
  return(
    <div className="rs-panel">
      <div className="rs-panel-hdr" onClick={()=>setOpen(p=>!p)}>
        <div style={{width:28,height:28,borderRadius:7,background:"var(--gold-lt)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".9rem",color:"var(--gold)",flexShrink:0}}>◉</div>
        <div style={{flex:1}}><div className="rs-panel-ttl">Morning Anchor</div><div className="rs-panel-meta">Independent morning work{mode==="student"&&rsItems.length>0?` · ${doneCount}/${rsItems.length} done`:""}</div></div>
        {allDone&&mode==="student"&&<span className="rs-note-badge">✓ All done!</span>}
        <span className={`rs-arrow ${open?"open":""}`}>▾</span>
      </div>
      {open&&(<>
        <div className="rs-body">
          {mode==="student"&&rsItems.length>0&&<div className="rs-progress"><div className="rs-progress-fill" style={{width:`${pct}%`}}/></div>}
          {rsItems.map(item=>(
            <div key={item.id} className="rs-item">
              {mode==="student"&&<div className={`rs-check ${rsChecked[item.id]?"done":""}`} onClick={()=>setRsChecked(p=>({...p,[item.id]:!p[item.id]}))}>{rsChecked[item.id]&&"✓"}</div>}
              <div style={{fontSize:"1rem",flexShrink:0,marginTop:2}}>{item.icon}</div>
              <div className="rs-item-content">
                {editingId===item.id?(
                  <div>
                    <div style={{display:"flex",gap:5,marginBottom:4}}>
                      <input className="rs-mini-input" style={{maxWidth:110}} value={draftLabel} onChange={e=>setDraftLabel(e.target.value)}/>
                      <input className="rs-mini-input" value={draftDesc} onChange={e=>setDraftDesc(e.target.value)}/>
                    </div>
                    <textarea className="rs-mini-input" style={{width:"100%",minHeight:52,resize:"vertical"}} value={draftNote} onChange={e=>setDraftNote(e.target.value)} placeholder="Note…"/>
                    <div style={{display:"flex",gap:5,marginTop:5}}>
                      <button className="btn btn-gold btn-xs" onClick={()=>saveEdit(item.id)}>Save</button>
                      <button className="btn btn-ghost btn-xs" onClick={()=>setEditingId(null)}>Cancel</button>
                    </div>
                  </div>
                ):(
                  <>
                    <div className={`rs-item-label ${rsChecked[item.id]&&mode==="student"?"done":""}`}>{item.label}</div>
                    <div className="rs-item-desc">{item.desc}</div>
                    {item.note&&<div className="rs-item-note">{item.note}</div>}
                  </>
                )}
              </div>
              {mode==="parent"&&editing&&editingId!==item.id&&(
                <div style={{display:"flex",gap:3,flexShrink:0,marginTop:2}}>
                  <button className="btn btn-ghost btn-xs" onClick={()=>startEdit(item)}>Edit</button>
                  <button className="btn btn-danger btn-xs" onClick={()=>removeItem(item.id)}>✕</button>
                </div>
              )}
            </div>
          ))}
        </div>
        <div className="rs-footer">
          {mode==="parent"&&(<>
            <button className="btn btn-ghost btn-sm" onClick={()=>setEditing(p=>!p)}>{editing?"✓ Done":"Edit Morning Anchor"}</button>
            {editing&&<button className="btn btn-sm" style={{background:"var(--gold-lt)",color:"var(--navy)",border:"1.5px solid var(--gold-lt)"}} onClick={addItem}>+ Add Block</button>}
          </>)}
          {mode==="student"&&allDone&&<div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".88rem",color:"var(--gold)",fontStyle:"italic"}}>Morning Anchor complete!</div>}
          {mode==="student"&&!allDone&&rsItems.length>0&&<div style={{fontFamily:"'Lato',sans-serif",fontSize:".68rem",color:"var(--muted)",fontStyle:"italic"}}>Tap each item to check it off.</div>}
        </div>
      </>)}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// SCHEDULE SCREEN (wraps Trello board + Day View + Students)
// ─────────────────────────────────────────────────────────────────────────────
function ScheduleScreen({schedule,setSchedule,students,setStudents,mode}){
  const [schedTab,setSchedTab]=useState("weekly");
  const [focusDay,setFocusDay]=useState(todayDayName());
  const [editMode,setEditMode]=useState(false);
  const [newStudentName,setNewStudentName]=useState("");
  const [activeStudentId,setActiveStudentId]=useState(null);
  const [weekKey,setWeekKey]=useState(getWeekKey());

  // Auto-reset checks weekly
  useEffect(()=>{
    const cur=getWeekKey();
    if(cur!==weekKey){
      setSchedule(s=>{const n=cloneSched(s);Object.values(n).forEach(blocks=>blocks.forEach(b=>{b.checks={};}));return n;});
      setStudents(ss=>ss.map(s=>({...s,completions:{}})));
      setWeekKey(cur);
    }
  },[weekKey]);

  // Schedule mutations
  function toggleCheck(day,blockId,itemIdx){setSchedule(s=>({...s,[day]:s[day].map(b=>b.id!==blockId?b:{...b,checks:{...b.checks,[itemIdx]:!b.checks[itemIdx]}})}));}
  function clearDay(day){setSchedule(s=>({...s,[day]:s[day].map(b=>({...b,checks:{}}))}));}
  function checkAllDay(day){setSchedule(s=>({...s,[day]:s[day].map(b=>{const checks={};b.items.forEach((_,i)=>{checks[i]=true;});return{...b,checks};})}));}
  function updateTime(day,blockId,time){setSchedule(s=>({...s,[day]:s[day].map(b=>b.id!==blockId?b:{...b,time})}));}
  function updateType(day,blockId,type){setSchedule(s=>({...s,[day]:s[day].map(b=>b.id!==blockId?b:{...b,type})}));}
  function updateItem(day,blockId,idx,val){setSchedule(s=>({...s,[day]:s[day].map(b=>{if(b.id!==blockId)return b;const items=[...b.items];items[idx]=val;return{...b,items};})}));}
  function addItem(day,blockId){setSchedule(s=>({...s,[day]:s[day].map(b=>b.id!==blockId?b:{...b,items:[...b.items,""]})}));}
  function removeItem(day,blockId,idx){setSchedule(s=>({...s,[day]:s[day].map(b=>{if(b.id!==blockId)return b;const items=b.items.filter((_,i)=>i!==idx);const checks={};Object.entries(b.checks).forEach(([k,v])=>{const n=Number(k);if(n<idx)checks[k]=v;else if(n>idx)checks[String(n-1)]=v;});return{...b,items,checks};})}));}
  function addBlock(day){setSchedule(s=>({...s,[day]:[...s[day],{id:uid(),time:"",type:"life",items:["New item"],checks:{}}]}));}
  function removeBlock(day,blockId){setSchedule(s=>({...s,[day]:s[day].filter(b=>b.id!==blockId)}));}
  function moveBlock(fromDay,fromIdx,toDay,toIdx){setSchedule(s=>{const n=cloneSched(s);const[block]=n[fromDay].splice(fromIdx,1);n[toDay].splice(toIdx,0,block);return n;});}
  function addStudent(){if(!newStudentName.trim())return;setStudents(ss=>[...ss,{id:Date.now(),name:newStudentName.trim(),loops:["math","language"],completions:{}}]);setNewStudentName("");}
  function removeStudent(id){setStudents(ss=>ss.filter(s=>s.id!==id));}
  function toggleStudentLoop(id,loopId){setStudents(ss=>ss.map(s=>s.id!==id?s:{...s,loops:s.loops.includes(loopId)?s.loops.filter(l=>l!==loopId):[...s.loops,loopId]}));}
  function toggleCompletion(studentId,key){setStudents(ss=>ss.map(s=>s.id!==studentId?s:{...s,completions:{...s.completions,[key]:!s.completions[key]}}));}

  const activeStudent=students.find(s=>s.id===activeStudentId);

  // Student dashboard is full-screen
  if(schedTab==="dashboard"&&activeStudent){
    return(
      <StudentDashboard student={activeStudent} schedule={schedule}
        onToggle={key=>toggleCompletion(activeStudent.id,key)}
        onBack={()=>{setSchedTab("students");setActiveStudentId(null);}}
      />
    );
  }

  const sharedProps={schedule,editMode,onToggleCheck:toggleCheck,onMoveBlock:moveBlock,onAddBlock:addBlock,onRemoveBlock:removeBlock,onUpdateTime:updateTime,onUpdateType:updateType,onUpdateItem:updateItem,onAddItem:addItem,onRemoveItem:removeItem,onClearDay:clearDay,onCheckAll:checkAllDay};

  return(
    <div>
      {/* Sub-header */}
      <div style={{background:"var(--white)",borderBottom:"2px solid var(--sage-bg)",position:"sticky",top:54,zIndex:200}}>
        <div style={{display:"flex",padding:"0 12px",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex"}}>
            {[["weekly","📋 Weekly"],["day","📖 Day View"],["students","👦 Students"]].map(([key,label])=>(
              <button key={key} onClick={()=>setSchedTab(key)} style={{fontFamily:"'Cormorant Garamond',serif",fontSize:13,letterSpacing:".04em",fontWeight:schedTab===key?600:400,color:schedTab===key?"var(--navy)":"var(--muted)",padding:"11px 12px",border:"none",background:"none",cursor:"pointer",borderBottom:schedTab===key?"3px solid var(--gold)":"3px solid transparent",marginBottom:-2,whiteSpace:"nowrap"}}>{label}</button>
            ))}
          </div>
          {(schedTab==="weekly"||schedTab==="day")&&(
            <button onClick={()=>setEditMode(e=>!e)} style={{background:editMode?"var(--gold)":"none",border:`1px solid ${editMode?"var(--gold)":"#ddd8ce"}`,color:editMode?"var(--navy)":"var(--muted)",borderRadius:6,padding:"5px 11px",cursor:"pointer",fontFamily:"'Lato',sans-serif",fontSize:11,fontWeight:700,transition:"all .2s"}}>
              {editMode?"✓ Done":"✎ Edit"}
            </button>
          )}
        </div>
      </div>

      {/* Content */}
      {schedTab==="weekly"&&(
        <TrelloBoard {...sharedProps} onDayClick={day=>{setFocusDay(day);setSchedTab("day");}}/>
      )}
      {schedTab==="day"&&(
        <DayView focusDay={focusDay} setFocusDay={setFocusDay} {...sharedProps}/>
      )}
      {schedTab==="students"&&(
        <StudentsTab students={students} schedule={schedule} newStudentName={newStudentName} setNewStudentName={setNewStudentName} addStudent={addStudent} removeStudent={removeStudent} toggleStudentLoop={toggleStudentLoop} onOpenDashboard={id=>{setActiveStudentId(id);setSchedTab("dashboard");}}/>
      )}
    </div>
  );
}
