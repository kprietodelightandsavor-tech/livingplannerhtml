  const crumbs={
    place:["Where are you? Describe it in plain, honest words.","What is the light doing? Morning, afternoon, overcast, golden?","What can you hear right now?","Is there a smell? Something in the air, the ground, the room?"],
    nature:["What is one living thing you can notice right now?","What is it doing? Describe the behavior or appearance \u2014 no interpretation yet.","Have you seen this before? Is something different about it today?"],
    moment:["What is the one thing from this day you keep returning to?","When did something make you stop \u2014 even for a breath?","Zoom in. What was the specific detail that made it real?"],
    person:["What did they do that you don't want to forget?","Is there something they said that should be written down exactly?"],
    wonder:["What question does this moment open in you? You don't have to answer it.","Did this experience remind you of something \u2014 a place, a person, a season?","What does this moment make you grateful for?"],
    connection:["Does this connect to anything you've been reading? A passage of Scripture?","Is there a quote that belongs here \u2014 something this moment brings forward?"],
    faith:["Where do you see grace in this moment?","What do you want to say thank you for?"],
  };

  return(
    <div>
      <div style={{marginBottom:"1rem"}}>
        <h2 style={{color:"var(--navy)"}}>Consider the Lilies</h2>
        <p style={{color:"var(--muted)",fontStyle:"italic",fontSize:".91rem"}}>a living record</p>
      </div>
      <div className="tabs">
        <button className={`tab ${tab==="about"?"active":""}`} onClick={()=>setTab("about")}>About</button>
        <button className={`tab ${tab==="write"?"active":""}`} onClick={()=>setTab("write")}>New Entry</button>
        <button className={`tab ${tab==="paint"?"active":""}`} onClick={()=>setTab("paint")}>Paint &amp; Sketch</button>
        <button className={`tab ${tab==="entries"?"active":""}`} onClick={()=>setTab("entries")}>My Entries</button>
      </div>

      {tab==="about"&&(
        <div>
          {/* Scripture banner */}
          <div style={{background:"var(--navy)",borderRadius:12,padding:"22px 20px",marginBottom:".9rem",textAlign:"center"}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.15rem",color:"var(--cream)",fontStyle:"italic",lineHeight:1.75,marginBottom:10}}>
              "Consider the lilies of the field, how they grow; they toil not, neither do they spin, and yet I say unto you that even Solomon in all his glory was not arrayed like one of these."
            </div>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:".62rem",color:"var(--gold)",textTransform:"uppercase",letterSpacing:".1em"}}>Matthew 6:28–29</div>
          </div>

          {/* What This Journal Is */}
          <div className="card">
            <div className="card-hdr"><div className="card-icon ci-lilac"><IcoCardLilies/></div><div><div className="card-ttl">What This Journal Is</div></div></div>
            <div className="card-body">
              <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem",lineHeight:1.75,color:"var(--ink)",marginBottom:12}}>
                This is not a diary. It is not a record of everything that happened. It is a <em>practice of attention</em> — the quiet discipline of noticing what is true, beautiful, and worth holding.
              </p>
              <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem",lineHeight:1.75,color:"var(--ink)",marginBottom:14}}>
                Charlotte Mason believed that education — and life — is about forming relations: between ourselves and the world, between what we see and what we know, between the ordinary and the transcendent. This journal lives in that spirit.
              </p>
              <div style={{background:"var(--cream)",borderRadius:8,padding:"11px 13px",borderLeft:"3px solid var(--sage)"}}>
                <div style={{fontFamily:"'Lato',sans-serif",fontSize:".62rem",textTransform:"uppercase",letterSpacing:".09em",color:"var(--sage)",marginBottom:6}}>The minimum faithful entry</div>
                <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".96rem",lineHeight:1.65,color:"var(--navy)"}}>
                  Where you were. One thing you noticed. One sentence about where it led.
                  <br/><br/><em>That is Consider the Lilies. The rest is gift.</em>
                </p>
              </div>
            </div>
            <div className="card-foot">
              <button className="btn btn-lilac" onClick={()=>setTab("write")}>Begin an Entry</button>
            </div>
          </div>

          {/* Three Layers card */}
          <div className="card">
            <div className="card-hdr"><div className="card-icon ci-lilac"><IcoCardLoop/></div><div><div className="card-ttl">The Three Layers of Noticing</div><div className="card-sub">Each entry asks only these three things</div></div></div>
            <div className="card-body" style={{padding:".75rem"}}>
              {LAYER_META.map((l,i)=>(
                <div key={l.n} style={{display:"flex",gap:12,padding:"11px",marginBottom:i<2?8:0,background:l.bg,borderRadius:10,border:`1px solid ${l.color}22`}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:"var(--white)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:"0 1px 6px rgba(0,0,0,.07)"}}>
                    {i===0?<IcoCardLeaf/>:i===1?<IcoCardSun/>:<IcoCardLoop/>}
                  </div>
                  <div>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:".9rem",color:"var(--navy)",marginBottom:3}}>Layer {l.n} — {l.name}</div>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".88rem",color:"var(--muted)",fontStyle:"italic",lineHeight:1.5}}>{l.desc}</div>
                  </div>
                </div>
              ))}
              <div style={{marginTop:10,fontFamily:"'Lato',sans-serif",fontSize:".69rem",color:"var(--muted)",fontStyle:"italic",lineHeight:1.6}}>
                You do not need to complete all three layers in one sitting. Give yourself a maximum of 20 minutes per entry.
              </div>
            </div>
            <div className="card-foot">
              <button className="btn btn-lilac" onClick={()=>setTab("write")}>Begin an Entry</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>setTab("paint")}>🎨 Paint Coach</button>
            </div>
          </div>

          {/* Paint Coach callout */}
          <div style={{background:"linear-gradient(135deg,#f0edf8,#eef2ea)",border:"1.5px dashed #c5bfda",borderRadius:12,padding:"14px 15px",marginBottom:".9rem",display:"flex",gap:12,alignItems:"flex-start"}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:"var(--white)",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 1px 6px rgba(0,0,0,.07)",fontSize:"1rem"}}>🎨</div>
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:".95rem",color:"var(--navy)",marginBottom:4}}>Watercolor &amp; Sketch Coach</div>
              <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".9rem",color:"var(--navy-lt)",fontStyle:"italic",lineHeight:1.65,margin:0}}>
                Upload a photo of what you're observing and receive step-by-step coaching on how to <em>see</em> it before you draw a single line.
              </p>
              <button onClick={()=>setTab("paint")} className="btn btn-lilac btn-sm" style={{marginTop:9}}>Open Paint Coach</button>
            </div>
          </div>

          {/* Charlotte Mason quote */}
          <div style={{background:"var(--cream)",borderRadius:10,padding:"14px 16px",marginBottom:".9rem",borderLeft:"3px solid var(--lilac)"}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem",color:"var(--navy)",fontStyle:"italic",lineHeight:1.7,marginBottom:6}}>
              "She is not an acquaintance to be taken up and laid down as occasion demands, but a friend whose society is continually revealing fresh riches."
            </div>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:".62rem",color:"var(--muted)",textTransform:"uppercase",letterSpacing:".08em"}}>— Charlotte Mason</div>
          </div>
        </div>
      )}

      {tab==="write"&&(
        <div>
          {/* Layer selector */}
          <div style={{display:"flex",gap:6,marginBottom:".9rem"}}>
            {LAYER_META.map(l=>(
              <button key={l.n} onClick={()=>setLayer(l.n)} style={{flex:1,padding:"9px 4px",borderRadius:9,border:`1.5px solid ${layer===l.n?l.color:"#ddd8ce"}`,background:layer===l.n?l.bg:"var(--white)",fontFamily:"'Lato',sans-serif",fontSize:".6rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:layer===l.n?"var(--navy)":"var(--muted)",cursor:"pointer",textAlign:"center",lineHeight:1.3}}>
                {l.name}
              </button>
            ))}
          </div>
          <div style={{fontFamily:"'Lato',sans-serif",fontSize:".65rem",textTransform:"uppercase",letterSpacing:".09em",color:"var(--muted)",marginBottom:10}}>
            {todayStr()} \u00b7 Layer {layer} \u2014 {LAYER_META[layer-1].name}
          </div>

          {layer===1&&(
            <div>
              <CrumbBox draft={draft} setDraft={setDraft} label="The Place" prompts={crumbs.place} field="place" placeholder="Where are you? Describe it in plain, honest words\u2026"/>
              <WatercolorNote text="Paint one thing from your nature observation \u2014 one leaf, the shape of a cloud, the colour of the sky at this specific moment. Small and imperfect is right. Tap 'Paint & Sketch' above for step-by-step coaching."/>
              <CrumbBox draft={draft} setDraft={setDraft} label="Nature Observation" prompts={crumbs.nature} field="nature" placeholder="What is one living thing you can notice right now?"/>
            </div>
          )}
          {layer===2&&(
            <div>
              <CrumbBox draft={draft} setDraft={setDraft} label="Find the Moment" prompts={crumbs.moment} field="moment" placeholder="What is the one thing from this day you keep returning to?"/>
              <WatercolorNote text="If the moment has a colour or a texture, try to capture it. A wash of warm amber for a firelit evening. Cool grey-blue for a quiet early morning. You are not illustrating \u2014 you are translating feeling into pigment."/>
              <CrumbBox draft={draft} setDraft={setDraft} label="If the Moment Involves Someone You Love" prompts={crumbs.person} field="person" placeholder="What did they do that you don't want to forget?"/>
            </div>
          )}
          {layer===3&&(
            <div>
              <CrumbBox draft={draft} setDraft={setDraft} label="The Wondering" prompts={crumbs.wonder} field="wonder" placeholder="What question does this moment open in you? You don't have to answer it\u2026"/>
              <CrumbBox draft={draft} setDraft={setDraft} label="The Connection" prompts={crumbs.connection} field="connection" placeholder="Does this connect to anything you've been reading?"/>
              <CrumbBox draft={draft} setDraft={setDraft} label="The Faith Thread" prompts={crumbs.faith} field="faith" placeholder="Where do you see grace in this moment?"/>
              <WatercolorNote text="Leave space on the page. White space in a journal is not emptiness \u2014 it is room for the thought to breathe."/>
              <div style={{marginBottom:"1rem"}}>
                <div style={{fontFamily:"'Lato',sans-serif",fontSize:".62rem",textTransform:"uppercase",letterSpacing:".1em",color:"var(--muted)",marginBottom:6}}>Commonplace \u2014 a quote or passage that belongs here</div>
                <textarea value={draft.quote} onChange={e=>setDraft(p=>({...p,quote:e.target.value}))} placeholder="Copy a passage that found you\u2026" style={{width:"100%",border:"1.5px solid #ddd8ce",borderRadius:8,padding:"9px 11px",fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem",color:"var(--ink)",background:"var(--white)",outline:"none",resize:"vertical",minHeight:60,lineHeight:1.6,marginBottom:6}}/>
                <input value={draft.quoteSource} onChange={e=>setDraft(p=>({...p,quoteSource:e.target.value}))} placeholder="\u2014 Author, Book\u2026" style={{width:"100%",border:"1.5px solid #ddd8ce",borderRadius:8,padding:"7px 11px",fontFamily:"'Cormorant Garamond',serif",fontSize:".9rem",color:"var(--muted)",background:"var(--white)",outline:"none"}}/>
              </div>
            </div>
          )}

          <div style={{display:"flex",gap:8,marginTop:4,flexWrap:"wrap"}}>
            {layer>1&&<button className="btn btn-ghost btn-sm" onClick={()=>setLayer(l=>l-1)}>\u2190 Previous Layer</button>}
            {layer<3&&<button className="btn btn-lilac" onClick={()=>setLayer(l=>l+1)}>Next Layer \u2192</button>}
            <button className="btn btn-sage" onClick={saveDraft} disabled={saved} style={{marginLeft:"auto"}}>{saved?"\u2713 Saved!":"Save Entry"}</button>
          </div>
          <div style={{background:"var(--cream)",borderRadius:8,padding:"11px 13px",marginTop:"1rem",borderLeft:"3px solid var(--lilac)"}}>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:".6rem",textTransform:"uppercase",letterSpacing:".09em",color:"var(--muted)",marginBottom:5}}>A word about overwhelm</div>
            <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".9rem",color:"var(--ink)",lineHeight:1.65,fontStyle:"italic"}}>You will not always do all three layers. Some entries will be a sketch and four words. All of these are complete entries.</p>
          </div>
        </div>
      )}

      {tab==="paint"&&(
        <div>
          <div style={{marginBottom:"1rem"}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.05rem",color:"var(--navy)",marginBottom:4}}>Watercolor &amp; Sketch Coach</div>
            <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".95rem",color:"var(--muted)",fontStyle:"italic",lineHeight:1.6,margin:0}}>"Paint one thing from your nature observation. Not the whole scene \u2014 one thing. Small and imperfect is right. This is a notation, not a painting."</p>
          </div>
          <WatercolorCoach/>
        </div>
      )}

      {tab==="entries"&&(
        <div>
          {entries.length===0&&(
            <div className="empty">
              <div className="empty-icon" style={{color:"var(--navy-lt)"}}><IcoCardLilies/></div>
              <p>No entries yet. Begin with Layer One \u2014 just where you are.</p>
              <button className="btn btn-lilac" style={{marginTop:10}} onClick={()=>setTab("write")}>Start an Entry</button>
            </div>
          )}
          {entries.map(e=>(
            <div key={e.id} style={{background:"var(--white)",borderRadius:12,padding:"14px 16px",marginBottom:".75rem",boxShadow:"var(--sh)",borderLeft:`3px solid ${e.layer===1?"var(--sage)":e.layer===2?"var(--gold)":"var(--navy-lt)"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontFamily:"'Lato',sans-serif",fontSize:".6rem",textTransform:"uppercase",letterSpacing:".08em",color:"var(--muted)"}}>Layer {e.layer} \u2014 {LAYER_META[e.layer-1]?.name}</div>
                <div style={{fontFamily:"'Lato',sans-serif",fontSize:".62rem",color:"var(--muted)"}}>{e.date}</div>
              </div>
              {e.place&&<div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".95rem",lineHeight:1.6,color:"var(--ink)",marginBottom:6,fontStyle:"italic"}}>{e.place.slice(0,140)}{e.place.length>140?"\u2026":""}</div>}
              {e.moment&&<div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".95rem",lineHeight:1.6,color:"var(--ink)",marginBottom:6}}>{e.moment.slice(0,140)}{e.moment.length>140?"\u2026":""}</div>}
              {e.wonder&&<div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".95rem",lineHeight:1.6,color:"var(--ink)",marginBottom:6,fontStyle:"italic"}}>{e.wonder.slice(0,140)}{e.wonder.length>140?"\u2026":""}</div>}
              {e.quote&&<div style={{background:"var(--cream)",borderRadius:6,padding:"7px 10px",marginTop:6,fontFamily:"'Cormorant Garamond',serif",fontSize:".9rem",fontStyle:"italic",color:"var(--navy)"}}>"{e.quote.slice(0,100)}{e.quote.length>100?"\u2026":""}"<span style={{display:"block",fontFamily:"'Lato',sans-serif",fontSize:".62rem",color:"var(--muted)",marginTop:3,fontStyle:"normal"}}>\u2014 {e.quoteSource||"source"}</span></div>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────────────────────────────
function App(){
  const [authUser,setAuthUser]=useState(()=>getStoredUser());
  const [dataLoaded,setDataLoaded]=useState(false);

  function handleAuth(user){
    setAuthUser(user);
    if(user.role==="student")setMode("student");
    else setMode("parent");
  }
  function handleLogout(){clearStoredUser();setAuthUser(null);setDataLoaded(false);}

  const [page,setPage]=useState("home");
  const [mode,setMode]=useState("parent");
  const [isPro,setIsPro]=useState(()=>{try{return localStorage.getItem("lrp_pro")==="true";}catch{return false;}});
  const [showPaywall,setShowPaywall]=useState(false);
  const [showMore,setShowMore]=useState(false);
  const [licenseCode,setLicenseCode]=useState("");
  const [licenseError,setLicenseError]=useState("");
  const [showLicense,setShowLicense]=useState(false);

  function activateLicense(code){
    const c=code.trim().toUpperCase();
    const valid=c.startsWith("LRP-")&&c.length>=8||c==="BETAACCESS2026"||c==="LIVINGRHYTHM47"||c==="DSEARLYBIRD";
    if(valid){setIsPro(true);try{localStorage.setItem("lrp_pro","true");localStorage.setItem("lrp_code",c);}catch{}setShowPaywall(false);setShowLicense(false);setLicenseError("");setLicenseCode("");}
    else{setLicenseError("That code wasn't recognized. Check your Payhip receipt and try again.");}
  }

  const [narrations,setNarrations]=useState([]);
  const [homeschoolChildren,setHomeschoolChildren]=useState([
    {id:"c1",name:"Emma",grade:"8th",form:"Form III (Grades 7–9)",books:[]},
    {id:"c2",name:"Nico",grade:"10th",form:"Form IV–VI (Grades 10–12)",books:[]},
    {id:"c3",name:"Marcos",grade:"2nd",form:"Form I (Grades 1–3)",books:[]},
  ]);
  const [rsItems,setRsItems]=useState(DEFAULT_RS);
  const [rsChecked,setRsChecked]=useState({});
  const [outdoorHours,setOutdoorHours]=useState({goal:15,days:{}});
  const [habit,setHabit]=useState(null);
  const [habitLog,setHabitLog]=useState({});

  // Schedule & students state (for Trello planner)
  const [schedule,setSchedule]=useState(()=>makeInitialSchedule());
  const [scheduleStudents,setScheduleStudents]=useState(()=>makeDefaultStudents());

  // Load data from localStorage when user is known
  useEffect(()=>{
    if(!authUser)return;
    const data=loadLocalData(authUser.id);
    if(data){
      if(data.children&&data.children.length)setHomeschoolChildren(data.children);
      if(data.rsItems)setRsItems(data.rsItems);
      if(data.rsChecked)setRsChecked(data.rsChecked);
      if(data.outdoorHours)setOutdoorHours(data.outdoorHours);
      if(data.habit!==undefined)setHabit(data.habit);
      if(data.habitLog)setHabitLog(data.habitLog);
      if(data.narrations)setNarrations(data.narrations);
      if(data.schedule)setSchedule(data.schedule);
      if(data.scheduleStudents)setScheduleStudents(data.scheduleStudents);
    }
    setDataLoaded(true);
  },[authUser?.id]);

  // Auto-save to localStorage
  const saveTimerRef=useRef(null);
  useEffect(()=>{
    if(!authUser||!dataLoaded)return;
    if(saveTimerRef.current)clearTimeout(saveTimerRef.current);
    saveTimerRef.current=setTimeout(()=>{
      saveLocalData(authUser.id,{children:homeschoolChildren,rsItems,rsChecked,outdoorHours,habit,habitLog,narrations,schedule,scheduleStudents});
    },1500);
    return()=>{if(saveTimerRef.current)clearTimeout(saveTimerRef.current);};
  },[homeschoolChildren,rsItems,rsChecked,outdoorHours,habit,habitLog,narrations,schedule,scheduleStudents,dataLoaded]);

  if(!authUser)return <AuthScreen onAuth={handleAuth}/>;

  const NAV=[
    {id:"home",label:"Home",Icon:IcoHome},
    {id:"schedule",label:"Schedule",Icon:IcoSchedule},
    {id:"narration",label:"Narrate",Icon:IcoNarrate},
    {id:"outdoor",label:"Outdoor",Icon:IcoOutdoor},
    {id:"lilies",label:"Lilies",Icon:IcoLilies},
  ];
  const MORE=[
    {id:"books",label:"Books",Icon:IcoBooks},
    {id:"habits",label:"Habits",Icon:IcoHabits},
  ];

  const PRO_FEATURES=["narration","habits"];
  function navigate(id){
    if(!isPro&&PRO_FEATURES.includes(id)){setShowPaywall(true);setShowMore(false);return;}
    setPage(id);setShowMore(false);window.scrollTo(0,0);
  }

  // Schedule screen uses wide layout (no padding, full width for Trello board)
  const isWide=page==="schedule";

  function renderPage(){
    switch(page){
      case"home":return <Home children={homeschoolChildren} narrations={narrations} schedule={schedule} beautyLoop={[]} daySchedules={{}} onNav={navigate} mode={mode} rsItems={rsItems} setRsItems={setRsItems} rsChecked={rsChecked} setRsChecked={setRsChecked} outdoorHours={outdoorHours} setOutdoorHours={setOutdoorHours} habit={habit} habitLog={habitLog}/>;
      case"schedule":return <ScheduleScreen schedule={schedule} setSchedule={setSchedule} students={scheduleStudents} setStudents={setScheduleStudents} mode={mode}/>;
      case"narration":return <NarrationCoach children={homeschoolChildren} narrations={narrations} setNarrations={setNarrations} mode={mode}/>;
      case"outdoor":return <OutdoorTimeScreen outdoorHours={outdoorHours} setOutdoorHours={setOutdoorHours} mode={mode}/>;
      case"lilies":return <LiliesJournal/>;
      case"books":return <BookFinder/>;
      case"habits":return <HabitTracker habit={habit} setHabit={setHabit} log={habitLog} setLog={setHabitLog}/>;
      default:return null;
    }
  }

  return(
    <div className="app">
      <header className="hdr">
        <div className="hdr-brand"><Logo/><div className="brand-name">Living <em>Rhythm</em></div></div>
        <div className="hdr-right">
          <span className={`tier ${isPro?"pro":"free"}`}>{isPro?"Pro":"Free"}</span>
          {authUser.role==="student"?(
            <span style={{fontFamily:"'Lato',sans-serif",fontSize:".62rem",textTransform:"uppercase",letterSpacing:".1em",padding:"3px 10px",borderRadius:20,fontWeight:700,background:"rgba(122,143,111,.3)",color:"var(--sage-lt)"}}>Student</span>
          ):(
            <div className="mode-toggle">
              <button className={`mode-btn ${mode==="parent"?"active":""}`} onClick={()=>setMode("parent")}>Parent</button>
              <button className={`mode-btn ${mode==="student"?"active":""}`} onClick={()=>setMode("student")}>Student</button>
            </div>
          )}
          <button className="logout-btn" onClick={handleLogout} title={`Signed in as ${authUser.name}`}>
            <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M13 3h3a1 1 0 011 1v12a1 1 0 01-1 1h-3"/><polyline points="8 17 3 12 8 7"/><line x1="3" y1="12" x2="15" y2="12"/></svg>
          </button>
        </div>
      </header>

      {isWide
        ?<main className="main-wide">{renderPage()}</main>
        :<main className="main">{renderPage()}</main>
      }

      <nav className="bnav">
        {NAV.map(({id,label,Icon})=>(
          <button key={id} className={`bnav-btn ${page===id?"active":""}`} onClick={()=>navigate(id)} style={{position:"relative"}}>
            <Icon/>
            {label}
            {!isPro&&["narration"].includes(id)&&<span style={{position:"absolute",top:4,right:6,background:"var(--gold)",color:"var(--navy)",borderRadius:4,fontSize:".45rem",fontWeight:700,padding:"1px 4px",fontFamily:"'Lato',sans-serif",letterSpacing:".04em"}}>PRO</span>}
          </button>
        ))}
        <button className={`bnav-btn ${MORE.some(n=>n.id===page)||showMore?"active":""}`} onClick={()=>setShowMore(p=>!p)}>
          <IcoMore/>
          More
        </button>
      </nav>

      {showMore&&(
        <div style={{position:"fixed",bottom:60,right:0,left:0,background:"var(--white)",borderTop:"1px solid var(--sage-bg)",zIndex:299,padding:".75rem 1rem",display:"flex",gap:".5rem",flexWrap:"wrap",boxShadow:"0 -4px 20px rgba(0,0,0,.08)"}}>
          {MORE.map(({id,label,Icon})=>(<button key={id} className={`btn ${page===id?"btn-sage":"btn-ghost"} btn-sm`} style={{gap:6}} onClick={()=>navigate(id)}><Icon/> {label}</button>))}
          {!isPro&&<button className="btn btn-gold btn-sm" onClick={()=>setShowPaywall(true)}>Upgrade to Pro</button>}
        </div>
      )}

      {showPaywall&&(
        <div className="pw-overlay" onClick={()=>{setShowPaywall(false);setShowLicense(false);setLicenseError("");}}>
          <div className="pw-card" onClick={e=>e.stopPropagation()}>
            {!showLicense?(
              <>
                <div style={{fontFamily:"'Lato',sans-serif",fontSize:".6rem",textTransform:"uppercase",letterSpacing:".12em",color:"var(--gold)",marginBottom:8}}>✦ Living Rhythm Pro</div>
                <h2 style={{fontFamily:"'Playfair Display',serif",color:"var(--navy)",marginBottom:".5rem",fontSize:"1.2rem",lineHeight:1.3}}>Your CM mentor,<br/>in your pocket.</h2>
                <p style={{color:"var(--muted)",fontSize:".88rem",fontStyle:"italic",marginBottom:"1.25rem",lineHeight:1.6,fontFamily:"'Cormorant Garamond',serif"}}>AI Narration Coaching, Consider the Lilies journal, CM Habit Tracker, and unlimited children.</p>
                <div style={{background:"var(--cream)",borderRadius:10,padding:"14px",marginBottom:"1rem",textAlign:"center"}}>
                  <div style={{fontFamily:"'Lato',sans-serif",fontSize:".6rem",textTransform:"uppercase",letterSpacing:".1em",color:"var(--muted)",marginBottom:4}}>One-time purchase</div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:"2rem",color:"var(--navy)",fontWeight:700}}>$47</div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".88rem",color:"var(--muted)",fontStyle:"italic"}}>yours forever — no subscription</div>
                </div>
                <a href="https://payhip.com/b/NMQ4D" target="_blank" style={{display:"block",background:"var(--gold)",color:"var(--navy)",borderRadius:10,padding:"13px",fontFamily:"'Lato',sans-serif",fontSize:".8rem",fontWeight:700,textAlign:"center",textDecoration:"none",marginBottom:8,letterSpacing:".04em"}}>Get Pro Access — $47 →</a>
                <button onClick={()=>setShowLicense(true)} style={{width:"100%",padding:"10px",borderRadius:10,border:"1.5px solid #ddd8ce",background:"var(--white)",fontFamily:"'Lato',sans-serif",fontSize:".75rem",cursor:"pointer",color:"var(--navy)",marginBottom:6}}>I already have a license code</button>
                <button onClick={()=>setShowPaywall(false)} style={{width:"100%",padding:"8px",borderRadius:10,border:"none",background:"none",fontFamily:"'Lato',sans-serif",fontSize:".72rem",cursor:"pointer",color:"var(--muted)"}}>Maybe later</button>
              </>
            ):(
              <>
                <div style={{fontFamily:"'Playfair Display',serif",color:"var(--navy)",fontSize:"1.1rem",marginBottom:".5rem"}}>Enter your license code</div>
                <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:".92rem",color:"var(--muted)",fontStyle:"italic",lineHeight:1.6,marginBottom:"1rem"}}>You'll find your code in your Payhip receipt email.</p>
                <input value={licenseCode} onChange={e=>setLicenseCode(e.target.value)} placeholder="e.g. LRP-XXXX-XXXX" style={{width:"100%",padding:"11px 12px",borderRadius:10,border:`1.5px solid ${licenseError?"#c00":"#ddd8ce"}`,fontFamily:"'Lato',sans-serif",fontSize:".9rem",marginBottom:6,outline:"none",boxSizing:"border-box"}}/>
                {licenseError&&<div style={{color:"#c00",fontFamily:"'Lato',sans-serif",fontSize:".72rem",marginBottom:8}}>{licenseError}</div>}
                <button onClick={()=>activateLicense(licenseCode)} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:"var(--sage)",color:"white",fontFamily:"'Lato',sans-serif",fontSize:".8rem",fontWeight:700,cursor:"pointer",marginBottom:8}}>Activate Pro</button>
                <button onClick={()=>{setShowLicense(false);setLicenseError("");}} style={{width:"100%",padding:"8px",borderRadius:10,border:"none",background:"none",fontFamily:"'Lato',sans-serif",fontSize:".72rem",cursor:"pointer",color:"var(--muted)"}}>← Back</button>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
